<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes tarifs et disponibilites - HoteSmart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #fff;
      padding: 16px 24px;
      border-bottom: 1px solid #e5e5e7;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 18px;
      color: #1d1d1f;
      font-weight: 600;
    }
    header .badge {
      background: #ff9500;
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    main {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .intro {
      background: #fff;
      padding: 16px 20px;
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .intro h2 {
      font-size: 15px;
      color: #1d1d1f;
      margin-bottom: 6px;
    }
    .intro p {
      font-size: 13px;
      color: #6e6e73;
      line-height: 1.5;
    }
    .iframe-container {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      flex: 1;
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }
    iframe {
      width: 100%;
      flex: 1;
      border: none;
      min-height: 600px;
    }
    .status {
      padding: 40px;
      text-align: center;
      color: #6e6e73;
      font-size: 14px;
    }
    .status.error {
      color: #ff3b30;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mes tarifs et disponibilites</h1>
    <span class="badge">Test</span>
  </header>
  <main>
    <div class="intro">
      <h2>Page de test - Phase 1 migration</h2>
      <p>Cette page integre l'interface de saisie des tarifs et disponibilites. Edition en bulk possible, persistence automatique.</p>
    </div>
    <div class="iframe-container">
      <div id="status" class="status">Chargement de l'interface...</div>
      <iframe id="channel-frame" style="display:none;" allow="clipboard-read; clipboard-write"></iframe>
    </div>
  </main>

  <script>
    (async function loadChannelInterface() {
      const statusEl = document.getElementById('status');
      const iframeEl = document.getElementById('channel-frame');

      try {
        // 1. Demander un token au backend serverless
        const tokenResponse = await fetch('/api/channel-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        if (!tokenResponse.ok) {
          throw new Error('Token request failed: ' + tokenResponse.status);
        }

        const { token, property_id } = await tokenResponse.json();
        if (!token || !property_id) {
          throw new Error('Invalid token response');
        }

        // 2. Construire l'URL iframe (marque blanche, sans header/footer)
        const baseUrl = 'https://staging.channex.io';
        const params = new URLSearchParams({
          oauth_session_key: token,
          property_id: property_id,
          redirect_to: '/inventory',
          app_mode: 'headless',
          lng: 'en'
        });
        const iframeUrl = baseUrl + '/auth/exchange?' + params.toString();

        // 3. Charger l'iframe
        iframeEl.src = iframeUrl;
        iframeEl.style.display = 'block';
        statusEl.style.display = 'none';

      } catch (error) {
        console.error('Erreur de chargement:', error);
        statusEl.textContent = 'Impossible de charger l\'interface. Reessayez plus tard.';
        statusEl.classList.add('error');
      }
    })();
  </script>
</body>
</html>
