<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Base de connaissance</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .section-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
    .faq-table { width: 100%; border-collapse: collapse; }
    .faq-table th { font-size: 11px; font-weight: 500; color: var(--text2); padding: 8px 12px; border-bottom: 0.5px solid var(--border); text-align: left; }
    .faq-table td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); font-size: 13px; vertical-align: top; }
    .faq-table tr:last-child td { border-bottom: none; }
    .faq-table td input, .faq-table td textarea { width: 100%; border: none; background: transparent; font-size: 13px; color: var(--text); resize: none; font-family: inherit; }
    .faq-table td textarea { min-height: 40px; }
    .faq-table tr:hover { background: var(--bg2); }
    .btn-add-row { margin-top: 12px; }
    .btn-delete { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0 4px; }
    .btn-delete:hover { color: #E24B4A; }
    .property-select { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .fixed-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .fixed-field { display: flex; flex-direction: column; gap: 4px; }
    .fixed-label { font-size: 11px; color: var(--text2); font-weight: 500; }
    .save-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 0.5px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; margin: 0 -24px; }
    .save-status { font-size: 12px; color: var(--text2); }
    .badge-auto { background: #EEEDFE; color: #3C3489; font-size: 10px; padding: 1px 6px; border-radius: 20px; margin-left: 6px; }
    .import-notice { background: #E1F5EE; border: 0.5px solid var(--green); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: #1a6644; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Base de connaissance</div>
        <div class="page-sub">Informations utilisées par l'Agent AI pour répondre</div>
      </div>
    </div>

    <div class="content">

      <div class="property-select">
        <label class="form-label" style="margin:0">Bien :</label>
        <select class="form-input" id="property-select" style="width:auto;min-width:200px">
          <option value="">Chargement...</option>
        </select>
        <button class="btn" id="btn-import-beds24" style="display:none">⬇️ Importer depuis Beds24</button>
      </div>

      <div class="import-notice" id="import-notice"></div>

      <!-- Infos fixes -->
      <div class="section-card">
        <div class="section-title">Infos pratiques</div>
        <div class="fixed-grid" id="fixed-fields">
          <div class="fixed-field">
            <label class="fixed-label">Code WiFi (réseau)</label>
            <input class="form-input" id="wifi-name" placeholder="ex: HosteSmart_5G">
          </div>
          <div class="fixed-field">
            <label class="fixed-label">Code WiFi (mot de passe)</label>
            <input class="form-input" id="wifi-pass" placeholder="ex: monmotdepasse123">
          </div>
          <div class="fixed-field">
            <label class="fixed-label">Code d'entrée / digicode</label>
            <input class="form-input" id="entry-code" placeholder="ex: 1234A">
          </div>
          <div class="fixed-field">
            <label class="fixed-label">Parking</label>
            <input class="form-input" id="parking" placeholder="ex: Gratuit rue de l'Horloge, 50m">
          </div>
          <div class="fixed-field">
            <label class="fixed-label">Transports proches</label>
            <input class="form-input" id="transport" placeholder="ex: Bus ligne 3, arrêt Mairie">
          </div>
          <div class="fixed-field">
            <label class="fixed-label">Contact urgence</label>
            <input class="form-input" id="emergency" placeholder="ex: 06 XX XX XX XX">
          </div>
          <div class="fixed-field" style="grid-column: span 2">
            <label class="fixed-label">Règles de la maison</label>
            <textarea class="form-input" id="rules" rows="3" placeholder="ex: Pas de fête, silence après 22h, animaux acceptés sur demande..."></textarea>
          </div>
          <div class="fixed-field" style="grid-column: span 2">
            <label class="fixed-label">Restaurants & activités recommandés</label>
            <textarea class="form-input" id="recommendations" rows="3" placeholder="ex: Restaurant Le Bigourdan (5 min à pied), Thermes de Bagnères..."></textarea>
          </div>
        </div>
      </div>

      <!-- FAQ dynamique -->
      <div class="section-card">
        <div class="section-title">
          FAQ dynamique
          <span class="badge-auto" id="auto-badge" style="display:none">✨ Suggestions auto disponibles</span>
        </div>
        <table class="faq-table">
          <thead>
            <tr>
              <th style="width:35%">Sujet / Question</th>
              <th>Réponse de l'agent</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody id="faq-body">
            <tr>
              <td colspan="3" style="text-align:center;color:var(--text2);font-size:12px">Sélectionnez un bien pour charger la FAQ</td>
            </tr>
          </tbody>
        </table>
        <button class="btn btn-add-row" id="btn-add-row">+ Ajouter une ligne</button>
      </div>

      <div class="save-bar">
        <span class="save-status" id="save-status">Non sauvegardé</span>
        <div style="display:flex;gap:8px">
          <a class="btn" href="/apps/agent-ai/analyze.html">✨ Analyser l'historique</a>
          <button class="btn btn-primary" id="btn-save">Sauvegarder</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { supabase } from '/shared/supabase.js'
  import { initErrorHandler } from '/shared/error-handler.js'
  import { logger } from '/shared/logger.js'

  initErrorHandler()

  let currentSession = null
  let currentPropertyId = null
  let properties = []

  async function init() {
    currentSession = await requireAuth()
    if (!currentSession) return

    await renderSidebar('agent-ai-knowledge')
    await loadProperties()

    document.getElementById('btn-add-row').addEventListener('click', () => addFaqRow())
    document.getElementById('btn-save').addEventListener('click', save)
    document.getElementById('btn-import-beds24').addEventListener('click', importFromBeds24)
    document.getElementById('property-select').addEventListener('change', (e) => {
      currentPropertyId = e.target.value
      if (currentPropertyId) {
        document.getElementById('btn-import-beds24').style.display = 'inline-flex'
        loadKnowledge()
      }
    })
  }

  async function loadProperties() {
    const res = await fetch('/api/beds24', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentSession.access_token}` },
      body: JSON.stringify({ action: 'getProperties' })
    })
    const data = await res.json()
    properties = data.properties || []

    const select = document.getElementById('property-select')
    select.innerHTML = '<option value="">Choisir un bien...</option>' +
      properties.map(p => `<option value="${p.id}">${p.name}</option>`).join('')

    if (properties.length === 1) {
      select.value = properties[0].id
      currentPropertyId = properties[0].id
      document.getElementById('btn-import-beds24').style.display = 'inline-flex'
      loadKnowledge()
    }
  }

  async function loadKnowledge() {
    const { data, error } = await supabase
      .from('knowledge')
      .select('*')
      .eq('user_id', currentSession.user.id)
      .eq('property_id', currentPropertyId)
      .order('created_at')

    if (error) { logger.error('Knowledge', 'Erreur chargement', error); return }

    const fixed = data.filter(d => d.type === 'fixed')
    const faqs  = data.filter(d => d.type === 'faq')

    const map = {
      'wifi-name': 'wifi_name', 'wifi-pass': 'wifi_pass',
      'entry-code': 'entry_code', 'parking': 'parking',
      'transport': 'transport', 'emergency': 'emergency',
      'rules': 'rules', 'recommendations': 'recommendations'
    }
    fixed.forEach(row => {
      const id = Object.keys(map).find(k => map[k] === row.key)
      if (id) document.getElementById(id).value = row.value || ''
    })

    const tbody = document.getElementById('faq-body')
    tbody.innerHTML = ''
    if (faqs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text2);font-size:12px">Aucune FAQ — ajoutez une ligne</td></tr>'
    } else {
      faqs.forEach(row => addFaqRow(row))
    }

    document.getElementById('save-status').textContent = 'Chargé'
  }

  async function importFromBeds24() {
    const property = properties.find(p => String(p.id) === String(currentPropertyId))
    if (!property) return

    const btn = document.getElementById('btn-import-beds24')
    btn.disabled = true; btn.textContent = '⏳ Import...'

    let imported = []

    // Remplir les champs fixes si vides
    const emergency = document.getElementById('emergency')
    if (!emergency.value && property.phone) {
      emergency.value = property.phone
      imported.push('Contact urgence')
    }

    const rules = document.getElementById('rules')
    if (!rules.value) {
      const parts = []
      if (property.checkInStart) parts.push(`Arrivée à partir de ${property.checkInStart}`)
      if (property.checkOutEnd)   parts.push(`Départ avant ${property.checkOutEnd}`)
      if (parts.length) { rules.value = parts.join('\n'); imported.push('Règles (check-in/out)') }
    }

    // FAQ auto depuis Beds24
    const autoFaqs = []

    if (property.checkInStart && property.checkOutEnd) {
      autoFaqs.push({
        key: 'Heure d\'arrivée et départ',
        value: `L'arrivée se fait à partir de ${property.checkInStart}. Le départ est avant ${property.checkOutEnd}.`
      })
    }

    if (property.address && property.city) {
      autoFaqs.push({
        key: 'Adresse du logement',
        value: `${property.address}, ${property.city} ${property.postcode || ''}`.trim()
      })
    }

    if (property.phone) {
      autoFaqs.push({
        key: 'Contact hôte',
        value: `Vous pouvez nous contacter au ${property.phone}${property.contactFirstName ? ` (${property.contactFirstName})` : ''}.`
      })
    }

    if (property.propertyType) {
      const types = { townhome: 'maison de ville', apartment: 'appartement', house: 'maison', villa: 'villa' }
      autoFaqs.push({
        key: 'Type de logement',
        value: `Vous séjournez dans ${types[property.propertyType] || property.propertyType} situé à ${property.city}.`
      })
    }

    // Ajouter les FAQ qui n'existent pas déjà
    const tbody = document.getElementById('faq-body')
    const existingKeys = [...tbody.querySelectorAll('input[type=text]')].map(i => i.value.toLowerCase())

    autoFaqs.forEach(faq => {
      const alreadyExists = existingKeys.some(k => k.includes(faq.key.toLowerCase().substring(0, 10)))
      if (!alreadyExists) {
        addFaqRow({ key: faq.key, value: faq.value })
        imported.push(faq.key)
      }
    })

    // Afficher notice
    const notice = document.getElementById('import-notice')
    if (imported.length > 0) {
      notice.textContent = `✅ ${imported.length} champ(s) importé(s) depuis Beds24 : ${imported.join(', ')}. Pensez à sauvegarder !`
      notice.style.display = 'block'
      document.getElementById('save-status').textContent = '⚠️ Import non sauvegardé'
      setTimeout(() => { notice.style.display = 'none' }, 8000)
    } else {
      notice.textContent = 'ℹ️ Tous les champs sont déjà remplis — rien à importer.'
      notice.style.display = 'block'
      setTimeout(() => { notice.style.display = 'none' }, 4000)
    }

    btn.disabled = false; btn.textContent = '⬇️ Importer depuis Beds24'
  }

  function addFaqRow(row = {}) {
    const tbody = document.getElementById('faq-body')
    const empty = tbody.querySelector('td[colspan]')
    if (empty) empty.parentElement.remove()

    const tr = document.createElement('tr')
    tr.dataset.id = row.id || ''
    tr.innerHTML = `
      <td><input type="text" placeholder="ex: Horaires check-out" value="${(row.key || '').replace(/"/g, '&quot;')}"></td>
      <td><textarea placeholder="ex: Départ avant 11h">${row.value || ''}</textarea></td>
      <td><button class="btn-delete" onclick="this.closest('tr').remove()">×</button></td>
    `
    tbody.appendChild(tr)
  }

  async function save() {
    if (!currentPropertyId) return alert('Sélectionnez un bien')
    const btn = document.getElementById('btn-save')
    btn.textContent = 'Sauvegarde...'; btn.disabled = true

    const map = {
      'wifi-name': 'wifi_name', 'wifi-pass': 'wifi_pass',
      'entry-code': 'entry_code', 'parking': 'parking',
      'transport': 'transport', 'emergency': 'emergency',
      'rules': 'rules', 'recommendations': 'recommendations'
    }

    const fixedRows = Object.entries(map).map(([id, key]) => ({
      user_id: currentSession.user.id, property_id: currentPropertyId,
      type: 'fixed', key, value: document.getElementById(id)?.value || ''
    }))

    const faqRows = [...document.querySelectorAll('#faq-body tr[data-id]')].map(tr => ({
      user_id: currentSession.user.id, property_id: currentPropertyId,
      type: 'faq',
      key:   tr.querySelector('input').value,
      value: tr.querySelector('textarea').value
    })).filter(r => r.key.trim())

    await supabase.from('knowledge')
      .delete()
      .eq('user_id', currentSession.user.id)
      .eq('property_id', currentPropertyId)

    const { error } = await supabase.from('knowledge').insert([...fixedRows, ...faqRows])

    btn.textContent = 'Sauvegarder'; btn.disabled = false
    document.getElementById('save-status').textContent = error ? '❌ Erreur sauvegarde' : '✅ Sauvegardé'
    if (error) logger.error('Knowledge', 'Erreur sauvegarde', error)
  }

  init()
</script>
</body>
</html>
