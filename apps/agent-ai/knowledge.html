<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Base de connaissance</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .property-select { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .section-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }

    .faq-list { display: flex; flex-direction: column; gap: 8px; }
    .faq-row { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
    .faq-row:hover { border-color: var(--green); }
    .faq-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .faq-input-key { font-size: 13px; font-weight: 500; border: none; background: transparent; color: var(--text); width: 100%; font-family: inherit; border-bottom: 0.5px solid var(--border); padding-bottom: 6px; }
    .faq-input-key:focus { outline: none; border-bottom-color: var(--green); }
    .faq-input-value { font-size: 12px; color: var(--text2); border: none; background: transparent; width: 100%; font-family: inherit; resize: none; min-height: 50px; line-height: 1.6; }
    .faq-input-value:focus { outline: none; color: var(--text); }
    .faq-delete { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 0; flex-shrink: 0; line-height: 1; margin-top: 2px; }
    .faq-delete:hover { color: #E24B4A; }
    .badge-beds24 { background: #E1F5EE; color: var(--green); font-size: 10px; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; margin-top: 4px; }

    .save-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 0.5px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; margin: 0 -24px; }
    .save-status { font-size: 12px; color: var(--text2); }
    .notice { background: #E1F5EE; border: 0.5px solid var(--green); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: #1a6644; margin-bottom: 16px; display: none; }
    .empty-state { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .count-badge { font-size: 11px; color: var(--text2); background: var(--bg2); border: 0.5px solid var(--border); padding: 2px 8px; border-radius: 20px; }
  </style>
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">📚 Base de connaissance</div>
        <div class="page-sub" id="topStatus">Informations utilisées par l'Agent AI</div>
      </div>
    </div>

    <div class="content">
      <div class="property-select">
        <label class="form-label" style="margin:0">Bien :</label>
        <select class="form-input" id="property-select" style="width:auto;min-width:200px">
          <option value="">Chargement...</option>
        </select>
        <button class="btn" id="btn-import" style="display:none">⬇️ Importer depuis Beds24</button>
        <button class="btn" id="btn-add" style="display:none">+ Ajouter</button>
      </div>

      <div class="notice" id="notice"></div>

      <div class="section-card">
        <div class="section-header">
          <div class="section-title" style="margin:0">FAQ</div>
          <span class="count-badge" id="count-badge">0 entrées</span>
        </div>
        <div class="faq-list" id="faq-list">
          <div class="empty-state">Sélectionnez un bien pour charger la base de connaissance</div>
        </div>
      </div>

      <div class="save-bar">
        <span class="save-status" id="save-status">—</span>
        <button class="btn btn-primary" id="btn-save">Sauvegarder</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { supabase } from '/shared/supabase.js'
  import { initErrorHandler } from '/shared/error-handler.js'

  initErrorHandler()

  let session = null
  let currentPropId = null
  let properties = []

  async function init() {
    session = await requireAuth()
    if (!session) return
    await renderSidebar('agent-ai-knowledge')
    await loadProperties()

    document.getElementById('property-select').addEventListener('change', e => {
      currentPropId = e.target.value
      if (currentPropId) {
        document.getElementById('btn-import').style.display = 'inline-flex'
        document.getElementById('btn-add').style.display = 'inline-flex'
        loadFaq()
      }
    })
    document.getElementById('btn-import').addEventListener('click', importFromBeds24)
    document.getElementById('btn-add').addEventListener('click', () => addRow('', ''))
    document.getElementById('btn-save').addEventListener('click', save)
  }

  async function loadProperties() {
    const res = await fetch('/api/beds24', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ action: 'getProperties' })
    })
    const data = await res.json()
    properties = data.properties || []

    const select = document.getElementById('property-select')
    select.innerHTML = '<option value="">Choisir un bien...</option>' +
      properties.map(p => `<option value="${p.id}">${p.name}</option>`).join('')

    if (properties.length === 1) {
      select.value = properties[0].id
      currentPropId = properties[0].id
      document.getElementById('btn-import').style.display = 'inline-flex'
      document.getElementById('btn-add').style.display = 'inline-flex'
      loadFaq()
    }
  }

  async function loadFaq() {
    const list = document.getElementById('faq-list')
    list.innerHTML = '<div class="empty-state">Chargement…</div>'

    const { data, error } = await supabase
      .from('knowledge')
      .select('*')
      .eq('user_id', session.user.id)
      .eq('property_id', String(currentPropId))
      .order('created_at')

    if (error) { list.innerHTML = `<div class="empty-state">❌ ${error.message}</div>`; return }

    list.innerHTML = ''
    const faqs = data || []

    if (faqs.length === 0) {
      list.innerHTML = '<div class="empty-state">Aucune entrée — cliquez sur "⬇️ Importer depuis Beds24" ou "+ Ajouter"</div>'
    } else {
      faqs.forEach(row => addRow(row.key, row.value))
    }

    updateCount()
    const propName = properties.find(p => String(p.id) === String(currentPropId))?.name || ''
    document.getElementById('save-status').textContent = `${faqs.length} entrée(s) chargée(s)`
    document.getElementById('topStatus').textContent = `${faqs.length} entrée(s) · ${propName}`
  }

  function addRow(key = '', value = '', fromBeds24 = false) {
    const list = document.getElementById('faq-list')
    const empty = list.querySelector('.empty-state')
    if (empty) empty.remove()

    const div = document.createElement('div')
    div.className = 'faq-row'
    div.innerHTML = `
      <div class="faq-fields">
        <input class="faq-input-key" type="text" placeholder="Sujet ou question (ex: Heure d'arrivée)" value="${escAttr(key)}">
        <textarea class="faq-input-value" placeholder="Réponse de l'agent AI…" rows="2">${escHtml(value)}</textarea>
      </div>
      ${fromBeds24 ? '<span class="badge-beds24">Beds24</span>' : ''}
      <button class="faq-delete" title="Supprimer">×</button>
    `
    div.querySelector('.faq-delete').addEventListener('click', () => {
      div.remove(); updateCount(); markUnsaved()
    })
    div.querySelector('.faq-input-key').addEventListener('input', markUnsaved)
    div.querySelector('.faq-input-value').addEventListener('input', markUnsaved)
    list.appendChild(div)
    updateCount()
  }

  async function importFromBeds24() {
    const property = properties.find(p => String(p.id) === String(currentPropId))
    if (!property) return

    const btn = document.getElementById('btn-import')
    btn.disabled = true; btn.textContent = '⏳ Import...'

    const existing = [...document.querySelectorAll('.faq-input-key')].map(i => i.value.toLowerCase())

    const faqs = []

    // Infos de base
    if (property.address && property.city) {
      faqs.push({ key: 'Adresse du logement', value: `${property.address}, ${property.city} ${property.postcode || ''}`.trim() })
    }
    if (property.checkInStart) {
      faqs.push({ key: 'Heure d\'arrivée', value: `L'arrivée se fait à partir de ${property.checkInStart}${property.checkInEnd && property.checkInEnd !== '00:00' ? ` et au plus tard à ${property.checkInEnd}` : ''}.` })
    }
    if (property.checkOutEnd) {
      faqs.push({ key: 'Heure de départ', value: `Le départ doit se faire avant ${property.checkOutEnd}.` })
    }
    if (property.phone || property.contactLastName) {
      const tel1 = property.phone || ''
      const tel2 = property.contactLastName?.startsWith('0') ? property.contactLastName : ''
      const prenom = property.contactFirstName ? `${property.contactFirstName} : ` : ''
      faqs.push({ key: 'Contact hôte', value: `${prenom}${[tel1, tel2].filter(Boolean).join(' / ')}` })
    }
    if (property.email) {
      faqs.push({ key: 'Email hôte', value: property.email })
    }

    // Type de logement
    const types = { townhome: 'maison de ville', apartment: 'appartement', house: 'maison', villa: 'villa' }
    if (property.propertyType && types[property.propertyType]) {
      faqs.push({ key: 'Type de logement', value: `Vous séjournez dans une ${types[property.propertyType]} à ${property.city}.` })
    }

    // Équipements
    const features = (property.featureCodes || []).flat()
    const equipMap = {
      'WIFI':             'WiFi disponible dans le logement.',
      'PARKING_POSSIBLE': 'Parking possible à proximité.',
      'WASHER':           'Lave-linge disponible.',
      'DRYER':            'Sèche-linge disponible.',
      'DISHWASHER':       'Lave-vaisselle disponible.',
      'KITCHEN':          'Cuisine équipée disponible.',
      'COFFEE_MAKER':     'Cafetière disponible.',
      'IRON_BOARD':       'Fer à repasser et planche disponibles.',
      'HAIR_DRYER':       'Sèche-cheveux disponible.',
      'LINENS':           'Linge de lit fourni.',
      'TOWELS':           'Serviettes de bain fournies.',
      'TOILETRIES':       'Articles de toilette fournis.',
      'TV':               'Télévision disponible.',
      'GAME_ROOM':        'Salle de jeux disponible (billard, babyfoot...).',
      'FOOSBALL':         'Babyfoot disponible.',
      'PRIVATE_ENTRANCE': 'Entrée privée.',
      'HEATING':          'Chauffage disponible.',
      'WOOD_STOVE':       'Poêle à bois disponible.',
    }
    const equipList = features.filter(f => equipMap[f]).map(f => equipMap[f])
    if (equipList.length > 0) {
      faqs.push({ key: 'Équipements disponibles', value: equipList.join('\n') })
    }

    // Règles
    const regles = []
    if (!features.includes('SMOKING_ALLOWED')) regles.push('Interdiction de fumer dans le logement.')
    if (features.includes('PETS_CONSIDERED')) regles.push('Animaux acceptés sur demande — contactez-nous avant réservation.')
    else regles.push('Les animaux de compagnie ne sont pas autorisés.')
    if (features.includes('CHILDREN_WELCOME')) regles.push('Les enfants sont les bienvenus.')
    if (regles.length > 0) {
      faqs.push({ key: 'Règles du logement', value: regles.join('\n') })
    }

    // Ajouter uniquement les nouvelles entrées
    let added = 0
    faqs.forEach(faq => {
      const alreadyExists = existing.some(k => k.includes(faq.key.toLowerCase().substring(0, 8)))
      if (!alreadyExists) { addRow(faq.key, faq.value, true); added++ }
    })

    const notice = document.getElementById('notice')
    notice.style.display = 'block'
    if (added > 0) {
      notice.textContent = `✅ ${added} entrée(s) importée(s) depuis Beds24. Pensez à sauvegarder !`
      markUnsaved()
      setTimeout(() => { notice.style.display = 'none' }, 8000)
    } else {
      notice.textContent = 'ℹ️ Tout est déjà importé — rien à ajouter.'
      setTimeout(() => { notice.style.display = 'none' }, 4000)
    }

    btn.disabled = false; btn.textContent = '⬇️ Importer depuis Beds24'
  }

  async function save() {
    if (!currentPropId) return alert('Sélectionnez un bien')
    const btn = document.getElementById('btn-save')
    btn.textContent = 'Sauvegarde...'; btn.disabled = true

    const rows = [...document.querySelectorAll('.faq-row')].map(row => ({
      user_id:     session.user.id,
      property_id: String(currentPropId),
      type:        'faq',
      key:         row.querySelector('.faq-input-key').value.trim(),
      value:       row.querySelector('.faq-input-value').value.trim()
    })).filter(r => r.key)

    await supabase.from('knowledge').delete()
      .eq('user_id', session.user.id)
      .eq('property_id', String(currentPropId))

    const { error } = await supabase.from('knowledge').insert(rows)

    btn.textContent = 'Sauvegarder'; btn.disabled = false
    document.getElementById('save-status').textContent = error
      ? '❌ Erreur : ' + error.message
      : `✅ ${rows.length} entrée(s) sauvegardée(s)`
    updateCount()
  }

  function updateCount() {
    const n = document.querySelectorAll('.faq-row').length
    document.getElementById('count-badge').textContent = `${n} entrée${n > 1 ? 's' : ''}`
  }

  function markUnsaved() {
    document.getElementById('save-status').textContent = '⚠️ Modifications non sauvegardées'
  }

  function escAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;') }
  function escHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

  init()
</script>
</body>
</html>
