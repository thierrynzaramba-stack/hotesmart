<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Messagerie</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .msg-layout { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 120px); gap:0; border:0.5px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; background:var(--bg); }

    /* Liste conversations */
    .conv-list { border-right:0.5px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .conv-list-header { padding:14px 16px; border-bottom:0.5px solid var(--border); background:var(--bg2); display:flex; align-items:center; gap:8px; }
    .conv-list-header select { flex:1; font-size:12px; padding:4px 8px; border:0.5px solid var(--border); border-radius:var(--radius); background:var(--bg); color:var(--text); font-family:inherit; }
    .conv-items { flex:1; overflow-y:auto; }
    .conv-item { padding:12px 16px; border-bottom:0.5px solid var(--border); cursor:pointer; transition:background 0.1s; }
    .conv-item:hover { background:var(--bg2); }
    .conv-item.active { background:#E1F5EE; border-left:3px solid var(--green); }
    .conv-item-name { font-size:13px; font-weight:500; margin-bottom:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .conv-item-meta { font-size:11px; color:var(--text2); line-height:1.5; }
    .conv-item-preview { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:3px; }
    .platform-badge { font-size:9px; padding:1px 6px; border-radius:10px; font-weight:500; }
    .platform-airbnb  { background:#FF5A5F22; color:#FF5A5F; }
    .platform-booking { background:#003B9522; color:#003B95; }
    .platform-direct  { background:#E1F5EE; color:var(--green); }
    .unread-dot { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; }

    /* Vue conversation */
    .conv-view { display:flex; flex-direction:column; overflow:hidden; }
    .conv-view-header { padding:14px 18px; border-bottom:0.5px solid var(--border); background:var(--bg2); }
    .conv-view-title { font-size:14px; font-weight:500; }
    .conv-view-meta { font-size:11px; color:var(--text2); margin-top:2px; }
    .conv-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }

    /* Bulles */
    .msg-bubble-wrap { display:flex; flex-direction:column; }
    .msg-bubble-wrap.guest  { align-items:flex-start; }
    .msg-bubble-wrap.host   { align-items:flex-end; }
    .msg-bubble-wrap.ai     { align-items:flex-end; }
    .msg-bubble-wrap.auto   { align-items:center; }
    .msg-bubble-wrap.system { align-items:center; }
    .msg-source { font-size:10px; color:var(--text2); margin-bottom:3px; display:flex; align-items:center; gap:4px; }
    .msg-bubble { padding:9px 13px; border-radius:14px; font-size:13px; line-height:1.6; max-width:70%; white-space:pre-wrap; word-break:break-word; }
    .msg-bubble.guest  { background:var(--bg2); border:0.5px solid var(--border); border-bottom-left-radius:4px; }
    .msg-bubble.host   { background:#E6F1FB; color:#0C447C; border-bottom-right-radius:4px; }
    .msg-bubble.ai     { background:#E1F5EE; color:#085041; border:0.5px solid #9FE1CB; border-bottom-right-radius:4px; }
    .msg-bubble.auto   { background:#FAEEDA; color:#633806; border:0.5px solid #FAC775; border-radius:10px; font-size:12px; max-width:90%; text-align:center; }
    .msg-bubble.system { background:var(--bg2); color:var(--text2); border-radius:10px; font-size:11px; max-width:90%; text-align:center; font-style:italic; }
    .msg-time { font-size:10px; color:var(--text2); margin-top:3px; }

    /* Zone rédaction */
    .conv-compose { border-top:0.5px solid var(--border); padding:14px 16px; background:var(--bg); }
    .compose-hint { font-size:11px; color:var(--text2); margin-bottom:8px; line-height:1.6; }
    .compose-hint code { background:var(--bg2); border:0.5px solid var(--border); padding:1px 5px; border-radius:4px; font-size:11px; color:#3C3489; }
    .compose-textarea { width:100%; min-height:70px; max-height:160px; resize:vertical; font-size:13px; line-height:1.6; font-family:inherit; border:0.5px solid var(--border); border-radius:var(--radius); padding:10px 12px; background:var(--bg2); color:var(--text); }
    .compose-textarea:focus { outline:none; border-color:var(--green); background:var(--bg); }
    .compose-actions { display:flex; gap:8px; margin-top:8px; align-items:center; }
    .btn-improve { background:#EEEDFE; color:#3C3489; border-color:#AFA9EC; }
    .btn-improve:hover { background:#d8d6fc; }
    .compose-status { font-size:11px; color:var(--text2); flex:1; }

    /* Instruction AI mise en évidence dans le textarea */
    .instruction-badge { display:inline-block; background:#EEEDFE; color:#3C3489; border:0.5px solid #AFA9EC; border-radius:4px; font-size:10px; padding:1px 6px; margin-left:4px; }

    .empty-conv { flex:1; display:flex; align-items:center; justify-content:center; color:var(--text2); font-size:13px; flex-direction:column; gap:8px; }
    .empty-conv .icon { font-size:40px; }
    .loading { text-align:center; padding:20px; color:var(--text2); font-size:13px; }
  </style>
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">💬 Messagerie</div>
        <div class="page-sub" id="topStatus">Chargement…</div>
      </div>
      <button class="btn" onclick="loadConversations()">↻ Actualiser</button>
    </div>
    <div class="content" style="padding:0;height:calc(100vh - 120px)">
      <div class="msg-layout">

        <div class="conv-list">
          <div class="conv-list-header">
            <select id="prop-select" onchange="loadConversations()">
              <option value="">Tous les biens</option>
            </select>
          </div>
          <div class="conv-items" id="conv-items">
            <div class="loading">Chargement…</div>
          </div>
        </div>

        <div class="conv-view" id="conv-view">
          <div class="empty-conv">
            <div class="icon">💬</div>
            <p>Sélectionnez une conversation</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth }      from '/components/auth-guard.js'
  import { renderSidebar }    from '/components/sidebar.js'
  import { supabase }         from '/shared/supabase.js'
  import { initErrorHandler } from '/shared/error-handler.js'

  initErrorHandler()
  const session = await requireAuth()
  if (!session) throw new Error('Non authentifié')
  await renderSidebar('agent-ai-messagerie')
  window._session  = session
  window._supabase = supabase

  const res  = await fetch('/api/beds24', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
    body: JSON.stringify({ action: 'getProperties' })
  })
  const data = await res.json()
  const select = document.getElementById('prop-select')
  ;(data.properties || []).forEach(p => {
    const opt = document.createElement('option')
    opt.value = p.id; opt.textContent = p.name
    select.appendChild(opt)
  })

  window.loadConversations()
</script>

<script>
  let conversations = []
  let currentConvId = null

  window.loadConversations = async () => {
    const propId = document.getElementById('prop-select').value
    document.getElementById('topStatus').textContent = 'Chargement…'
    document.getElementById('conv-items').innerHTML = '<div class="loading">Chargement…</div>'

    try {
      const props = propId ? [propId] : ['169567', '209413']

      const [beds24Results, convRes] = await Promise.all([
        Promise.all(props.map(pid =>
          fetch('/api/beds24', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window._session.access_token}` },
            body: JSON.stringify({ action: 'getMessages', propertyId: pid })
          }).then(r => r.json()).then(d => d.messages || [])
        )),
        window._supabase.from('conversations').select('*')
          .eq('user_id', window._session.user.id)
          .not('book_id', 'like', 'SIM_%')
          .order('created_at', { ascending: false })
          .limit(100)
      ])

      const beds24Messages = beds24Results.flat()
      const supaConvs      = convRes.data || []

      const convMap = {}

      beds24Messages.forEach(msg => {
        const bookId = String(msg.bookId)
        if (!convMap[bookId]) {
          convMap[bookId] = {
            bookId,
            guestName:  msg.guestFirstName ? `${msg.guestFirstName} ${msg.guestName || ''}`.trim() : 'Voyageur',
            firstNight: msg.firstNight,
            lastNight:  msg.lastNight,
            platform:   detectPlatform(msg),
            thread:     msg.thread || [],
            aiReplies:  [],
            lastTime:   msg.thread?.[msg.thread.length - 1]?.time || msg.messageTime || new Date().toISOString()
          }
        }
      })

      supaConvs.forEach(c => {
        const bookId = String(c.book_id)
        if (!convMap[bookId]) {
          convMap[bookId] = {
            bookId,
            guestName:  c.guest_name || 'Voyageur',
            firstNight: null, lastNight: null,
            platform:   'direct',
            thread:     [],
            aiReplies:  [],
            lastTime:   c.created_at
          }
        }
        convMap[bookId].aiReplies.push(c)
        if (new Date(c.created_at) > new Date(convMap[bookId].lastTime)) {
          convMap[bookId].lastTime = c.created_at
        }
      })

      conversations = Object.values(convMap).sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime))
      document.getElementById('topStatus').textContent = `${conversations.length} conversation${conversations.length !== 1 ? 's' : ''}`
      renderConvList()

    } catch (err) {
      document.getElementById('conv-items').innerHTML = `<div class="loading">❌ ${err.message}</div>`
    }
  }

  function detectPlatform(msg) {
    // Utiliser les champs Beds24 en priorité
    const channel = (msg.channel || '').toLowerCase()
    const agent   = (msg.agent   || '').toLowerCase()
    const referer = (msg.referer || '').toLowerCase()
    const combined = channel + ' ' + agent + ' ' + referer

    if (combined.includes('airbnb'))  return 'airbnb'
    if (combined.includes('booking')) return 'booking'
    if (combined.includes('vrbo') || combined.includes('homeaway')) return 'vrbo'

    // Fallback : analyser les messages
    const text = (msg.thread || []).map(t => (t.message || '')).join(' ').toLowerCase()
    if (text.includes('airbnb'))  return 'airbnb'
    if (text.includes('booking')) return 'booking'

    return 'direct'
  }

  function renderConvList() {
    const items = document.getElementById('conv-items')
    if (!conversations.length) {
      items.innerHTML = '<div class="loading">Aucune conversation récente</div>'
      return
    }
    items.innerHTML = conversations.map(conv => {
      const isActive  = conv.bookId === currentConvId
      const lastMsg   = conv.thread[conv.thread.length - 1]
      const lastReply = conv.aiReplies[0]
      const preview   = lastMsg?.message?.substring(0, 55) || lastReply?.agent_reply?.substring(0, 55) || '—'
      const hasUnread = lastMsg?.source === 'guest'
      const platform  = conv.platform
      const platformLabel = platform === 'airbnb' ? 'Airbnb' : platform === 'booking' ? 'Booking' : 'Direct'
      const date = conv.firstNight ? formatDateShort(conv.firstNight) + ' → ' + formatDateShort(conv.lastNight) : ''

      return `
        <div class="conv-item ${isActive ? 'active' : ''}" onclick="selectConv('${conv.bookId}')">
          <div class="conv-item-name">
            ${hasUnread ? '<span class="unread-dot"></span>' : ''}
            ${escHtml(conv.guestName)}
            <span class="platform-badge platform-${platform}">${platformLabel}</span>
          </div>
          ${date ? `<div class="conv-item-meta">${date}</div>` : ''}
          <div class="conv-item-preview">${escHtml(preview)}</div>
        </div>`
    }).join('')
  }

  window.selectConv = (bookId) => {
    currentConvId = bookId
    renderConvList()
    renderConvView(bookId)
  }

  function renderConvView(bookId) {
    const conv = conversations.find(c => c.bookId === bookId)
    if (!conv) return

    // Fusionner et trier tous les messages
    const allMessages = []

    conv.thread.forEach(m => {
      allMessages.push({ type: m.source === 'guest' ? 'guest' : 'host', content: m.message, time: m.time })
    })

    conv.aiReplies.forEach(c => {
      const isAuto = c.guest_message?.startsWith('[AUTO:')
      allMessages.push({
        type:    isAuto ? 'auto' : 'ai',
        content: c.agent_reply,
        label:   isAuto ? c.guest_message : null,
        time:    c.created_at
      })
    })

    allMessages.sort((a, b) => new Date(a.time) - new Date(b.time))

    const platformLabel = conv.platform === 'airbnb' ? 'Airbnb' : conv.platform === 'booking' ? 'Booking.com' : 'Direct'

    document.getElementById('conv-view').innerHTML = `
      <div class="conv-view-header">
        <div class="conv-view-title">👤 ${escHtml(conv.guestName)}</div>
        <div class="conv-view-meta">
          ${platformLabel} · #${bookId}${conv.firstNight ? ` · ${formatDateShort(conv.firstNight)} → ${formatDateShort(conv.lastNight)}` : ''}
        </div>
      </div>

      <div class="conv-messages" id="conv-messages">
        ${allMessages.length
          ? allMessages.map(m => renderBubble(m)).join('')
          : '<div class="empty-conv"><p>Aucun message</p></div>'}
      </div>

      <div class="conv-compose">
        <textarea class="compose-textarea" id="compose-text"
          placeholder="Écrivez votre message… ou utilisez ((consigne)) pour guider l'IA"></textarea>
        <div class="compose-actions">
          <button class="btn btn-improve" onclick="improveMessage('${bookId}')">✨ Améliorer</button>
          <button class="btn btn-primary" onclick="sendMessage('${bookId}')">✉️ Envoyer</button>
          <span style="font-size:10px;color:var(--text2);line-height:1.5">
            Consigne IA : <code style="background:var(--bg2);border:0.5px solid var(--border);padding:1px 4px;border-radius:3px;color:#3C3489">((votre instruction))</code>
          </span>
          <span class="compose-status" id="compose-status"></span>
        </div>
      </div>
    `

    // Scroll bas
    const mc = document.getElementById('conv-messages')
    if (mc) mc.scrollTop = mc.scrollHeight
  }

  function renderBubble(m) {
    const time = m.time ? new Date(m.time).toLocaleString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : ''
    const sourceLabel = {
      guest:  '👤 Voyageur',
      host:   '🏠 Hôte',
      ai:     '🤖 GuestFlow AI',
      auto:   '⚙️ Message automatique',
      system: '⚙️ Système'
    }[m.type] || m.type

    return `
      <div class="msg-bubble-wrap ${m.type}">
        <div class="msg-source">${sourceLabel}${m.label ? ` <span style="opacity:0.6;font-style:italic">${escHtml(m.label)}</span>` : ''}</div>
        <div class="msg-bubble ${m.type}">${escHtml(m.content)}</div>
        <div class="msg-time">${time}</div>
      </div>`
  }

  // ── Améliorer avec historique + consignes ((...)) ─────────────────────────
  window.improveMessage = async (bookId) => {
    const textarea = document.getElementById('compose-text')
    const rawText  = textarea?.value?.trim()
    if (!rawText) return setStatus('Écrivez d\'abord un message')

    // Extraire les consignes ((...))
    const instructions = []
    const cleanText = rawText.replace(/\(\(([^)]+)\)\)/g, (_, inst) => {
      instructions.push(inst.trim())
      return ''
    }).trim()

    const btn = document.querySelector('.btn-improve')
    btn.disabled = true; btn.textContent = '⏳…'
    setStatus('Amélioration en cours…')

    try {
      const conv = conversations.find(c => c.bookId === bookId)
      const guestName = conv?.guestName || 'le voyageur'

      // Construire l'historique récent (5 derniers messages)
      const allMessages = []
      conv?.thread?.forEach(m => allMessages.push({ role: m.source === 'guest' ? 'guest' : 'host', content: m.message, time: m.time }))
      conv?.aiReplies?.forEach(c => allMessages.push({ role: 'host', content: c.agent_reply, time: c.created_at }))
      allMessages.sort((a, b) => new Date(a.time) - new Date(b.time))
      const recentHistory = allMessages.slice(-5).map(m => `${m.role === 'guest' ? '👤 Voyageur' : '🏠 Hôte'}: "${m.content}"`).join('\n')

      // Construire le prompt
      let systemPrompt = `Tu es un assistant de conciergerie LCD. Améliore ce message pour qu'il soit chaleureux, professionnel et naturel. Adresse-toi à ${guestName}.`

      if (recentHistory) {
        systemPrompt += `\n\nHistorique récent de la conversation :\n${recentHistory}`
      }

      if (instructions.length) {
        systemPrompt += `\n\nConsignes spécifiques de l'hôte :\n${instructions.map((i, n) => `${n+1}. ${i}`).join('\n')}`
      }

      systemPrompt += '\n\nRéponds UNIQUEMENT avec le message amélioré, sans commentaire ni explication.'

      const res = await fetch('/api/grok', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window._session.access_token}` },
        body: JSON.stringify({
          systemPrompt,
          messages: [{ role: 'user', content: `Message à améliorer : "${cleanText || rawText}"` }]
        })
      })
      const data = await res.json()

      if (data.reply) {
        textarea.value = data.reply
        setStatus(instructions.length ? `✅ Amélioré avec ${instructions.length} consigne${instructions.length > 1 ? 's' : ''}` : '✅ Message amélioré')
      }
    } catch (err) {
      setStatus('❌ ' + err.message)
    } finally {
      btn.disabled = false; btn.textContent = '✨ Améliorer'
    }
  }

  // ── Envoyer ───────────────────────────────────────────────────────────────
  window.sendMessage = async (bookId) => {
    const textarea = document.getElementById('compose-text')
    const text = textarea?.value?.trim()
    if (!text) return setStatus('Écrivez un message')

    // Vérifier s'il reste des consignes non traitées
    if (text.includes('((') && text.includes('))')) {
      const confirm = window.confirm('Votre message contient encore des consignes ((...)) — voulez-vous d\'abord cliquer sur ✨ Améliorer ?')
      if (confirm) return
    }

    const btn = document.querySelector('.btn-primary')
    btn.disabled = true; btn.textContent = '⏳ Envoi…'
    setStatus('Envoi en cours…')

    try {
      const res = await fetch('/api/beds24', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window._session.access_token}` },
        body: JSON.stringify({ action: 'sendMessage', bookingId: bookId, message: text })
      })
      const data = await res.json()

      if (data.success) {
        const conv = conversations.find(c => c.bookId === bookId)
        await window._supabase.from('conversations').insert({
          user_id:       window._session.user.id,
          property_id:   conv?.property_id || null,
          guest_name:    conv?.guestName || 'Voyageur',
          guest_message: '[Envoi manuel hôte]',
          agent_reply:   text,
          book_id:       bookId
        })
        textarea.value = ''
        setStatus('✅ Message envoyé')
        await loadConversations()
        selectConv(bookId)
      } else {
        setStatus('❌ ' + (data.error || 'Erreur inconnue'))
      }
    } catch (err) {
      setStatus('❌ ' + err.message)
    } finally {
      btn.disabled = false; btn.textContent = '✉️ Envoyer'
    }
  }

  function setStatus(msg) {
    const el = document.getElementById('compose-status')
    if (el) el.textContent = msg
    setTimeout(() => { if (document.getElementById('compose-status')) document.getElementById('compose-status').textContent = '' }, 4000)
  }

  function formatDateShort(dateStr) {
    if (!dateStr) return '—'
    return new Date(dateStr).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' })
  }

  function escHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
</script>
</body>
</html>
