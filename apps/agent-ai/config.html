<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — GuestFlow AI · Configuration</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .prop-tabs { display:flex; gap:0; border-bottom:0.5px solid var(--border); margin-bottom:24px; }
    .prop-tab { padding:10px 20px; font-size:13px; cursor:pointer; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; font-family:inherit; background:none; border-top:none; border-left:none; border-right:none; }
    .prop-tab:hover { color:var(--text); }
    .prop-tab.active { color:var(--text); border-bottom-color:var(--green); font-weight:500; }

    .mode-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:20px 24px; margin-bottom:20px; display:flex; align-items:center; gap:16px; }
    .mode-card.test-mode { border-color:#F59E0B; background:#FFFBEB; }
    .mode-card.auto-mode { border-color:var(--green); background:#E1F5EE; }
    .mode-info { flex:1; }
    .mode-title { font-size:14px; font-weight:500; margin-bottom:4px; }
    .mode-desc { font-size:12px; color:var(--text2); line-height:1.6; }
    .mode-badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; flex-shrink:0; }
    .badge-test { background:#FFF3CD; color:#856404; border:0.5px solid #F59E0B; }
    .badge-auto { background:#E1F5EE; color:#085041; border:0.5px solid var(--green); }

    .toggle { position:relative; width:44px; height:24px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; inset:0; background:#ccc; border-radius:24px; cursor:pointer; transition:0.2s; }
    .toggle-slider:before { content:''; position:absolute; width:18px; height:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.2s; }
    input:checked + .toggle-slider { background:var(--green); }
    input:checked + .toggle-slider:before { transform:translateX(20px); }

    .alert-section { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); margin-bottom:16px; overflow:hidden; }
    .alert-section-header { display:flex; align-items:center; gap:10px; padding:14px 18px; background:var(--bg2); border-bottom:0.5px solid var(--border); }
    .alert-type-label { font-size:13px; font-weight:500; flex:1; }
    .badge-type { padding:2px 8px; border-radius:20px; font-size:11px; font-weight:500; }
    .badge-intervention { background:#fdecea; color:#E24B4A; }
    .badge-info { background:#FFF3CD; color:#856404; }

    .channels-grid { display:grid; grid-template-columns:1fr 1fr; }
    .channel-block { padding:18px 20px; border-right:0.5px solid var(--border); }
    .channel-block:last-child { border-right:none; }
    .channel-title { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    .channel-title span { font-size:13px; font-weight:500; flex:1; }
    .channel-block.disabled textarea,
    .channel-block.disabled .field-label,
    .channel-block.disabled .field-hint { opacity:0.35; pointer-events:none; }

    .field-label { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
    .field-hint { font-size:11px; color:var(--text2); margin-top:5px; line-height:1.5; }

    .save-bar { display:flex; align-items:center; gap:12px; margin-top:8px; }

    /* Bloc consignes Agent AI */
    .prompting-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:20px 24px; margin-bottom:20px; }
    .prompting-title { font-size:14px; font-weight:500; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
    .prompting-intro { font-size:12px; color:var(--text2); line-height:1.6; margin-bottom:16px; }
    .prompting-block { margin-bottom:16px; }
    .prompting-block:last-child { margin-bottom:12px; }
    .prompting-block-title { font-size:12px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .prompting-block-desc { font-size:11px; color:var(--text2); margin-bottom:8px; line-height:1.5; }
    .prompting-textarea { width:100%; font-family:inherit; font-size:13px; padding:10px 12px; border:0.5px solid var(--border); border-radius:var(--radius); resize:vertical; min-height:100px; background:var(--bg2); color:var(--text); line-height:1.5; box-sizing:border-box; }
    .prompting-textarea:focus { outline:none; border-color:var(--green); background:var(--bg); }
    .prompting-save-bar { display:flex; align-items:center; gap:12px; margin-top:10px; }
    .prompting-save-bar button { padding:8px 16px; }
    .prompting-status { font-size:11px; color:var(--text2); }
    .prompting-status.ok { color:var(--green); }
    .prompting-status.error { color:#E24B4A; }

    /* Responsive mobile */
    @media (max-width: 768px) {
      .prompting-card { padding:16px 14px; }
      .prompting-textarea { font-size:16px; }
      .prompting-save-bar { flex-direction:column; align-items:stretch; }
      .prompting-save-bar button { width:100%; min-height:44px; }
    }
    .save-status { font-size:12px; color:var(--text2); }
    .save-status.ok  { color:var(--green); }
    .save-status.err { color:#E24B4A; }

    .notice { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:20px; }
    .section-label { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin:24px 0 12px; }
    .toast-msg { position:fixed; bottom:24px; right:24px; background:var(--green); color:white; padding:10px 18px; border-radius:var(--radius); font-size:13px; z-index:999; display:none; }

    @media (max-width:640px) {
      .channels-grid { grid-template-columns:1fr; }
      .channel-block { border-right:none; border-bottom:0.5px solid var(--border); }
      .channel-block:last-child { border-bottom:none; }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">🤖 GuestFlow AI — Configuration</div>
        <div class="page-sub">Mode d'envoi et alertes par logement</div>
      </div>
    </div>
    <div class="content">

      <div class="notice">
        💡 En <strong>Mode Test</strong> tous les messages passent par validation avant envoi.
        En <strong>Mode Auto</strong> les réponses connues sont envoyées automatiquement —
        seules les interventions et infos manquantes restent dans la To-do.
      </div>

      <div class="prop-tabs" id="propTabs"></div>
      <div id="configPanel"></div>

      <div class="save-bar">
        <button class="btn btn-primary" id="btnSave" onclick="saveConfig()">Enregistrer</button>
        <span class="save-status" id="saveStatus"></span>
      </div>

    </div>
  </div>
</div>
<div class="toast-msg" id="toast"></div>

<script type="module">
  import { requireAuth }      from '/components/auth-guard.js'
  import { renderSidebar }    from '/components/sidebar.js'
  import { supabase }         from '/shared/supabase.js'
  import { initErrorHandler } from '/shared/error-handler.js'

  initErrorHandler()
  const session = await requireAuth()
  if (!session) throw new Error('Non authentifié')
  await renderSidebar('agent-ai-config')
  window._session  = session
  window._supabase = supabase
  window.init()
</script>

<script>
  const PROPERTIES = [
    { id: '169567', name: 'Cœur de vie 23' },
    { id: '209413', name: 'La bulle' }
  ]
  const ALERT_TYPES = [
    { key: 'intervention', label: '🚨 Intervention requise',  badgeClass: 'badge-intervention' },
    { key: 'info_unknown', label: '❓ Information manquante', badgeClass: 'badge-info' }
  ]

  let currentProp = PROPERTIES[0].id
  let config = {}
  let promptingConfig = { global: '', overrides: {} }

  window.init = async () => {
    renderTabs()
    await loadConfig()
    await loadPrompting()
    renderPanel()
  }

  async function loadPrompting() {
    try {
      const { data, error } = await window._supabase
        .from('agent_prompting')
        .select('property_id, instructions')
        .eq('user_id', window._session.user.id)
      if (error) throw error
      promptingConfig = { global: '', overrides: {} }
      ;(data || []).forEach(row => {
        if (row.property_id === null) promptingConfig.global = row.instructions || ''
        else promptingConfig.overrides[row.property_id] = row.instructions || ''
      })
    } catch (err) {
      console.warn('[Prompting] load error:', err.message)
    }
  }

  window.savePrompting = async () => {
    const statusEl = document.getElementById('prompting-status')
    statusEl.textContent = 'Enregistrement...'
    statusEl.className = 'prompting-status'

    const globalText = document.getElementById('prompting-global').value.trim()
    const overrideText = document.getElementById('prompting-override').value.trim()
    const userId = window._session.user.id

    try {
      // Global : upsert ou delete si vide
      if (globalText) {
        // upsert manuel : on tente delete + insert (pas d unique sur NULL dans PG)
        await window._supabase
          .from('agent_prompting')
          .delete()
          .eq('user_id', userId)
          .is('property_id', null)
        const { error: err1 } = await window._supabase
          .from('agent_prompting')
          .insert({ user_id: userId, property_id: null, instructions: globalText })
        if (err1) throw err1
        promptingConfig.global = globalText
      } else {
        await window._supabase
          .from('agent_prompting')
          .delete()
          .eq('user_id', userId)
          .is('property_id', null)
        promptingConfig.global = ''
      }

      // Override du logement courant
      if (overrideText) {
        await window._supabase
          .from('agent_prompting')
          .delete()
          .eq('user_id', userId)
          .eq('property_id', currentProp)
        const { error: err2 } = await window._supabase
          .from('agent_prompting')
          .insert({ user_id: userId, property_id: currentProp, instructions: overrideText })
        if (err2) throw err2
        promptingConfig.overrides[currentProp] = overrideText
      } else {
        await window._supabase
          .from('agent_prompting')
          .delete()
          .eq('user_id', userId)
          .eq('property_id', currentProp)
        delete promptingConfig.overrides[currentProp]
      }

      statusEl.textContent = '✓ Consignes enregistrées'
      statusEl.className = 'prompting-status ok'
      setTimeout(() => { statusEl.textContent = '' }, 3000)
    } catch (err) {
      console.error('[Prompting] save error:', err)
      statusEl.textContent = '❌ Erreur : ' + err.message
      statusEl.className = 'prompting-status error'
    }
  }

  function renderTabs() {
    document.getElementById('propTabs').innerHTML = PROPERTIES.map(p => `
      <button class="prop-tab ${p.id === currentProp ? 'active' : ''}"
              onclick="selectProp('${p.id}')">${p.name}</button>
    `).join('')
  }

  window.selectProp = id => {
    currentProp = id; renderTabs(); renderPanel()
  }

  async function loadConfig() {
    try {
      const res = await fetch('/api/agent-config', {
        headers: { 'Authorization': `Bearer ${window._session?.access_token}` }
      })
      if (res.ok) config = (await res.json()).config || {}
    } catch(e) { console.warn('[agent-config] load error:', e) }

    PROPERTIES.forEach(p => {
      if (!config[p.id]) config[p.id] = {}
      // Mode par défaut : test
      if (!config[p.id].mode) config[p.id].mode = 'test'
      ALERT_TYPES.forEach(t => {
        if (!config[p.id][t.key]) config[p.id][t.key] = {
          sms_enabled: false, sms_lines: '',
          email_enabled: false, email_lines: ''
        }
        const c = config[p.id][t.key]
        if (!c.sms_lines && c.sms_numbers?.length) c.sms_lines = c.sms_numbers.join('\n')
        if (!c.sms_lines) c.sms_lines = ''
        if (!c.email_lines && c.email_addresses?.length) c.email_lines = c.email_addresses.join('\n')
        if (!c.email_lines) c.email_lines = ''
      })
    })
    renderPanel()
  }

  function renderPanel() {
    const isAuto = config[currentProp].mode === 'auto'
    document.getElementById('configPanel').innerHTML = `

      <!-- Mode d'envoi -->
      <div class="mode-card ${isAuto ? 'auto-mode' : 'test-mode'}" id="mode-card">
        <div class="mode-info">
          <div class="mode-title">${isAuto ? '🚀 Mode Auto' : '🧪 Mode Test'}</div>
          <div class="mode-desc">
            ${isAuto
              ? 'Les réponses connues (sympathie, info FAQ) sont envoyées automatiquement. Seules les interventions et infos manquantes restent dans la To-do.'
              : 'Tous les messages générés par l\'IA passent par la To-do list pour validation avant d\'être envoyés au voyageur.'}
          </div>
        </div>
        <span class="mode-badge ${isAuto ? 'badge-auto' : 'badge-test'}">${isAuto ? 'Auto' : 'Test'}</span>
        <label class="toggle">
          <input type="checkbox" ${isAuto ? 'checked' : ''} onchange="toggleMode(this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Alertes -->
      <div class="section-label">Alertes notifications</div>
      ${ALERT_TYPES.map(type => buildSection(type)).join('')}

      <!-- Consignes de l'Agent AI -->
      <div class="prompting-card">
        <div class="prompting-title">🤖 Consignes de l'Agent AI</div>
        <div class="prompting-intro">
          Définissez le ton, la longueur des réponses et les règles de style de votre Agent AI.
          Les consignes générales s'appliquent à tous vos logements. Vous pouvez ensuite affiner
          pour ce logement spécifique — l'override prime en cas de conflit.
        </div>

        <div class="prompting-block">
          <div class="prompting-block-title">Consignes générales <span style="color:var(--text2);font-weight:normal;font-size:11px">— tous logements</span></div>
          <div class="prompting-block-desc">
            Exemples : ton, longueur, tutoiement, règles de style.
          </div>
          <textarea class="prompting-textarea" id="prompting-global" rows="6"
                    placeholder="Ex :&#10;- Réponds en français avec un ton chaleureux et direct.&#10;- Si le voyageur pose une question, réponds avec la longueur nécessaire sans remplissage.&#10;- Si le voyageur confirme ou remercie, réponds très court (1 phrase max).&#10;- Ne reprends jamais le message du voyageur dans ta réponse.&#10;- Tutoie par défaut sauf si le voyageur vouvoie.">${escHtml(promptingConfig.global || '')}</textarea>
        </div>

        <div class="prompting-block">
          <div class="prompting-block-title">Consignes spécifiques pour ce logement <span style="color:var(--text2);font-weight:normal;font-size:11px">— optionnel</span></div>
          <div class="prompting-block-desc">
            S'ajoute aux consignes générales. Prime en cas de conflit.
          </div>
          <textarea class="prompting-textarea" id="prompting-override" rows="4"
                    placeholder="Ex : Pour ce studio centre-ville, mentionner le parking Place des Thermes (2 min à pied). Préciser qu'il n'y a pas d'ascenseur, 3e étage.">${escHtml(promptingConfig.overrides[currentProp] || '')}</textarea>
        </div>

        <div class="prompting-save-bar">
          <button class="btn btn-primary" onclick="savePrompting()">Enregistrer les consignes</button>
          <span class="prompting-status" id="prompting-status"></span>
        </div>
      </div>
    `
  }

  function buildSection(type) {
    const cfg = config[currentProp][type.key]
    return `
    <div class="alert-section">
      <div class="alert-section-header">
        <span class="badge-type ${type.badgeClass}">${type.key === 'intervention' ? 'Intervention' : 'Info manquante'}</span>
        <span class="alert-type-label">${type.label}</span>
      </div>
      <div class="channels-grid">
        <div class="channel-block ${cfg.sms_enabled ? '' : 'disabled'}" id="sms-block-${type.key}">
          <div class="channel-title">
            <span>📱 SMS (Brevo)</span>
            <label class="toggle">
              <input type="checkbox" ${cfg.sms_enabled ? 'checked' : ''}
                     onchange="toggleChannel('${type.key}','sms',this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="field-label">Destinataires SMS</div>
          <textarea class="form-input" rows="3" style="resize:vertical;font-size:12px"
                    onchange="updateLines('${type.key}','sms',this.value)"
                    placeholder="Thierry : +33612345678&#10;Marie : +33698765432">${escHtml(cfg.sms_lines)}</textarea>
          <div class="field-hint">Une ligne par destinataire · Format : Nom : +33XXXXXXXXX</div>
        </div>
        <div class="channel-block ${cfg.email_enabled ? '' : 'disabled'}" id="email-block-${type.key}">
          <div class="channel-title">
            <span>✉️ Email</span>
            <label class="toggle">
              <input type="checkbox" ${cfg.email_enabled ? 'checked' : ''}
                     onchange="toggleChannel('${type.key}','email',this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="field-label">Destinataires Email</div>
          <textarea class="form-input" rows="3" style="resize:vertical;font-size:12px"
                    onchange="updateLines('${type.key}','email',this.value)"
                    placeholder="Thierry : thierry@mail.com&#10;Marie : marie@mail.com">${escHtml(cfg.email_lines)}</textarea>
          <div class="field-hint">Une ligne par destinataire · Format : Nom : email@mail.com</div>
        </div>
      </div>
    </div>`
  }

  window.toggleMode = (isAuto) => {
    config[currentProp].mode = isAuto ? 'auto' : 'test'
    renderPanel()
  }

  window.toggleChannel = (typeKey, channel, enabled) => {
    config[currentProp][typeKey][channel === 'sms' ? 'sms_enabled' : 'email_enabled'] = enabled
    document.getElementById(`${channel}-block-${typeKey}`).classList.toggle('disabled', !enabled)
  }

  window.updateLines = (typeKey, channel, value) => {
    config[currentProp][typeKey][channel === 'sms' ? 'sms_lines' : 'email_lines'] = value
  }

  window.saveConfig = async () => {
    const btn    = document.getElementById('btnSave')
    const status = document.getElementById('saveStatus')
    btn.disabled = true; btn.textContent = 'Enregistrement…'
    status.textContent = ''; status.className = 'save-status'
    try {
      const res = await fetch('/api/agent-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window._session?.access_token}` },
        body: JSON.stringify({ config })
      })
      if (!res.ok) throw new Error(await res.text())
      status.textContent = '✓ Enregistré'; status.className = 'save-status ok'
      showToast('✅ Configuration sauvegardée')
      setTimeout(() => { status.textContent = '' }, 3000)
    } catch(e) {
      status.textContent = '✗ ' + e.message; status.className = 'save-status err'
    } finally {
      btn.disabled = false; btn.textContent = 'Enregistrer'
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.style.background = isError ? '#E24B4A' : 'var(--green)'
    t.style.display = 'block'
    setTimeout(() => { t.style.display = 'none' }, 3500)
  }

  function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
</script>
</body>
</html>
