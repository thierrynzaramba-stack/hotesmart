<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Agent AI</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .msg-container { display: flex; flex-direction: column; gap: 12px; }
    .msg-card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg); }
    .msg-card-header { padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); }
    .msg-card-guest { font-size: 13px; font-weight: 500; }
    .msg-card-meta { font-size: 11px; color: var(--text2); }
    .msg-card-body { padding: 14px 16px; }
    .msg-guest { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }
    .msg-reply-box { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; font-size: 12px; color: var(--text); line-height: 1.5; margin-top: 8px; min-height: 60px; }
    .msg-actions { display: flex; gap: 8px; margin-top: 10px; }
    .badge-pending { background: var(--amber-bg); color: var(--amber); font-size: 10px; padding: 2px 8px; border-radius: 20px; }
    .badge-sent { background: var(--green-bg); color: var(--green); font-size: 10px; padding: 2px 8px; border-radius: 20px; }
    .property-select { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .no-messages { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
  </style>
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Agent AI voyageurs</div>
        <div class="page-sub">Réponses automatiques aux messages</div>
      </div>
    </div>

    <div class="content">

      <div class="property-select">
        <label class="form-label" style="margin:0">Bien :</label>
        <select class="form-input" id="property-select" style="width:auto;min-width:200px">
          <option value="">Chargement...</option>
        </select>
        <button class="btn" id="btn-refresh">↻ Actualiser</button>
      </div>

      <div class="section-title">Messages en attente</div>
      <div id="messages-container">
        <div class="no-messages">Sélectionnez un bien pour voir les messages</div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { initErrorHandler } from '/shared/error-handler.js'
  import { logger } from '/shared/logger.js'

  initErrorHandler()

  let currentSession = null
  let properties = []

  async function init() {
    currentSession = await requireAuth()
    if (!currentSession) return

    await renderSidebar('agent-ai')
    await loadProperties()

    document.getElementById('btn-refresh').addEventListener('click', () => {
      const propId = document.getElementById('property-select').value
      if (propId) loadMessages(propId)
    })

    document.getElementById('property-select').addEventListener('change', (e) => {
      if (e.target.value) loadMessages(e.target.value)
    })
  }

  async function loadProperties() {
    const res = await fetch('/api/beds24', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${currentSession.access_token}`
      },
      body: JSON.stringify({ action: 'getProperties' })
    })
    const data = await res.json()
    properties = data.properties || []

    const select = document.getElementById('property-select')
    select.innerHTML = '<option value="">Choisir un bien...</option>' +
      properties.map(p => `<option value="${p.id}">${p.name}</option>`).join('')

    if (properties.length === 1) {
      select.value = properties[0].id
      loadMessages(properties[0].id)
    }

    logger.info('Agent AI', `${properties.length} biens chargés`)
  }

  async function loadMessages(propertyId) {
    const container = document.getElementById('messages-container')
    container.innerHTML = '<div class="no-messages">Chargement des messages...</div>'

    const res = await fetch('/api/beds24', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${currentSession.access_token}`
      },
      body: JSON.stringify({ action: 'getMessages', propertyId })
    })

    const data = await res.json()
    const messages = data.messages || []

    logger.info('Agent AI', `${messages.length} messages chargés`)

    if (messages.length === 0) {
      container.innerHTML = '<div class="no-messages">✓ Aucun message en attente</div>'
      return
    }

    container.innerHTML = '<div class="msg-container">' +
      messages.map(msg => renderMessageCard(msg)).join('') +
      '</div>'

    // Attache les événements
    document.querySelectorAll('.btn-generate').forEach(btn => {
      btn.addEventListener('click', () => generateReply(btn.dataset.msgId, btn.dataset.guestMsg, btn.dataset.guestName, btn.dataset.propId))
    })

    document.querySelectorAll('.btn-send').forEach(btn => {
      btn.addEventListener('click', () => sendReply(btn.dataset.msgId, btn.dataset.propId))
    })
  }

  function renderMessageCard(msg) {
    const guestMsg = msg.guestMessage || msg.message || '(message vide)'
    const guestName = msg.guestFirstName ? `${msg.guestFirstName} ${msg.guestName || ''}` : 'Voyageur'
    const propId = document.getElementById('property-select').value

    return `
      <div class="msg-card" id="card-${msg.bookId || msg.id}">
        <div class="msg-card-header">
          <div>
            <div class="msg-card-guest">${guestName}</div>
            <div class="msg-card-meta">Réservation #${msg.bookId || msg.id} · ${msg.firstNight || ''} → ${msg.lastNight || ''}</div>
          </div>
          <span class="badge-pending">En attente</span>
        </div>
        <div class="msg-card-body">
          <div class="msg-guest">💬 ${guestMsg}</div>
          <div class="msg-reply-box" id="reply-${msg.bookId || msg.id}">
            Cliquez sur "Générer" pour créer une réponse automatique...
          </div>
          <div class="msg-actions">
            <button class="btn btn-primary btn-generate" 
              data-msg-id="${msg.bookId || msg.id}"
              data-guest-msg="${encodeURIComponent(guestMsg)}"
              data-guest-name="${guestName}"
              data-prop-id="${propId}">
              ✨ Générer
            </button>
            <button class="btn btn-send" style="display:none;background:#fff3cd;color:#856404;border-color:#ffc107"
              data-msg-id="${msg.bookId || msg.id}"
              data-prop-id="${propId}">
              ✓ Envoyer
            </button>
            <button class="btn" onclick="this.closest('.msg-card').style.display='none'">
              Ignorer
            </button>
          </div>
        </div>
      </div>
    `
  }

  async function generateReply(msgId, guestMsgEncoded, guestName, propId) {
    const guestMsg = decodeURIComponent(guestMsgEncoded)
    const replyBox = document.getElementById(`reply-${msgId}`)
    const property = properties.find(p => p.id == propId)

    replyBox.textContent = '⏳ Génération en cours...'

    const systemPrompt = `Tu es un assistant de conciergerie pour la location courte durée. 
Tu réponds aux messages des voyageurs au nom de l'hôte.
Bien : ${property?.name || 'appartement'}
Adresse : ${property?.address || ''}, ${property?.city || ''}
Check-in : ${property?.checkInStart || '16h'} - Check-out : ${property?.checkOutEnd || '10h'}
Réponds en français, de façon chaleureuse et professionnelle. Sois concis (2-3 phrases max).`

    const res = await fetch('/api/grok', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${currentSession.access_token}`
      },
      body: JSON.stringify({
        systemPrompt,
        messages: [{ role: 'user', content: `Message du voyageur ${guestName} : "${guestMsg}"` }]
      })
    })

    const data = await res.json()

    if (data.reply) {
      replyBox.textContent = data.reply
      replyBox.contentEditable = true
      replyBox.style.border = '0.5px solid var(--green)'

      const sendBtn = document.querySelector(`[data-msg-id="${msgId}"].btn-send`)
      if (sendBtn) sendBtn.style.display = 'inline-flex'

      logger.info('Agent AI', 'Réponse générée', { msgId })
    } else {
      replyBox.textContent = 'Erreur lors de la génération — réessayez'
      logger.error('Agent AI', 'Erreur génération', data)
    }
  }

  async function sendReply(msgId, propId) {
  const replyBox = document.getElementById(`reply-${msgId}`)

  const card = document.getElementById(`card-${msgId}`)
  card.querySelector('.badge-pending').className = 'badge-sent'
  card.querySelector('.badge-sent').textContent = '✓ Simulé'
  logger.info('Agent AI', 'SIMULATION — message non envoyé', { msgId })

        action: 'sendMessage',
        bookingId: msgId,
        message
      })
    })

    const data = await res.json()

    if (data.success) {
      const card = document.getElementById(`card-${msgId}`)
      card.querySelector('.badge-pending').className = 'badge-sent'
      card.querySelector('.badge-sent').textContent = '✓ Envoyé'
      card.querySelector('.btn-send').style.display = 'none'
      replyBox.contentEditable = false
      replyBox.style.border = 'none'
      logger.info('Agent AI', 'Message envoyé', { msgId })
    } else {
      logger.error('Agent AI', 'Erreur envoi', data)
    }
  }

  init()
</script>

</body>
</html>
