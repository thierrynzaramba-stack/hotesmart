<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart Clean</title>
  <meta name="theme-color" content="#C97B5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Clean">
  <link rel="manifest" id="dynamic-manifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="/public/style.css">
  <style>
    /* Toggle 3 vues - cache par defaut (visible seulement sur mobile) */
    .view-toggle { display: none; }

    .menage-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }

    .mini-cal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; position: sticky; top: 0; }
    .mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .mini-cal-title { font-size: 13px; font-weight: 500; }
    .mini-cal-nav { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 14px; padding: 2px 6px; border-radius: var(--radius); }
    .mini-cal-nav:hover { background: var(--bg2); }
    .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .mini-cal-day-label { font-size: 9px; color: var(--text3); text-align: center; padding: 2px 0; font-weight: 500; }
    .mini-cal-day { font-size: 10px; text-align: center; padding: 3px 0; border-radius: 4px; cursor: pointer; color: var(--text2); position: relative; }
    .mini-cal-day:hover { background: var(--bg2); }
    .mini-cal-day.today { background: var(--primary); color: white; font-weight: 600; }
    .mini-cal-day.has-menage { background: #FFF3CD; color: #856404; font-weight: 500; }
    .mini-cal-day.has-menage.done { background: #D1FAE5; color: #065F46; }
    .mini-cal-day.selected-week { background: var(--bg2); border: 0.5px solid var(--border2); }
    .mini-cal-day.other-month { opacity: 0.3; }

    .cal-tooltip { position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: var(--text); color: white; font-size: 10px; padding: 4px 8px; border-radius: 6px; white-space: nowrap; z-index: 200; pointer-events: none; display: none; line-height: 1.5; text-align: left; }
    .mini-cal-day:hover .cal-tooltip { display: block; }

    .filter-title { font-size: 10px; color: var(--text2); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; }
    .filter-item input { cursor: pointer; accent-color: var(--primary); }
    .filter-label { font-size: 12px; color: var(--text); }
    .filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .planning-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .week-nav { display: flex; align-items: center; gap: 8px; }
    .week-nav button { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 10px; cursor: pointer; font-size: 13px; color: var(--text); }
    .week-nav button:hover { background: var(--bg2); }
    .week-label { font-size: 14px; font-weight: 500; min-width: 200px; text-align: center; }

    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-col { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; min-height: 200px; }
    .day-col.today { border-color: var(--primary); }
    .day-header { padding: 8px 10px; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
    .day-name { font-size: 10px; color: var(--text2); font-weight: 500; text-transform: uppercase; }
    .day-number { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .day-col.today .day-number { color: var(--primary); }
    .day-body { padding: 6px; display: flex; flex-direction: column; gap: 4px; }

    .menage-card { border-radius: var(--radius); padding: 6px 8px; font-size: 11px; cursor: pointer; transition: opacity 0.15s; position: relative; }
    .menage-card:hover { opacity: 0.85; }
    .menage-card.done { opacity: 0.6; }
    .menage-card.done .menage-card-title { text-decoration: line-through; }
    .menage-card.obsolete { opacity: 0.4; background: #E5E7EB !important; color: #6B7280 !important; cursor: not-allowed; }
    .menage-card.obsolete .menage-card-title { text-decoration: line-through; }
    .menage-card.obsolete::after { content: "⏭"; position: absolute; top: 4px; right: 4px; font-size: 10px; }
    .menage-card-prop { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; opacity: 0.8; margin-bottom: 2px; }
    .menage-card-title { font-weight: 500; line-height: 1.3; }
    .menage-card-time { font-size: 9px; opacity: 0.7; margin-top: 2px; }
    .menage-card-check { position: absolute; top: 4px; right: 4px; font-size: 10px; }
    .menage-card-comment { position: absolute; bottom: 4px; right: 4px; font-size: 9px; }
    .menage-card-pending { position: absolute; top: 4px; left: 4px; font-size: 9px; opacity: 0.8; }

    .prop-color-0 { background: #DBEAFE; color: #1E40AF; }
    .prop-color-1 { background: #D1FAE5; color: #065F46; }
    .prop-color-2 { background: #FEF3C7; color: #92400E; }
    .prop-color-3 { background: #FCE7F3; color: #9D174D; }
    .prop-color-0.done { background: #EFF6FF; }
    .prop-color-1.done { background: #ECFDF5; }

    .day-empty { font-size: 11px; color: var(--text3); text-align: center; padding: 20px 8px; }

    .week-stats { display: flex; gap: 12px; margin-bottom: 16px; }
    .week-stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; }
    .week-stat strong { font-size: 18px; font-weight: 600; display: block; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 24px; width: 400px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
    .modal-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

    .modal-error   { background: #FEE2E2; border: 0.5px solid #DC2626; color: #991B1B; border-radius: var(--radius); padding: 10px 12px; margin-top: 12px; font-size: 12px; line-height: 1.5; display: none; }
    .modal-error.visible { display: block; }
    .modal-success { background: #D1FAE5; border: 0.5px solid #059669; color: #065F46; border-radius: var(--radius); padding: 10px 12px; margin-top: 12px; font-size: 12px; line-height: 1.5; display: none; }
    .modal-success.visible { display: block; }
    .modal-warning { background: #FEF3C7; border: 0.5px solid #D97706; color: #92400E; border-radius: var(--radius); padding: 10px 12px; margin-top: 12px; font-size: 12px; line-height: 1.5; display: none; }
    .modal-warning.visible { display: block; }

    .admin-note { background: #FFF3CD; border: 0.5px solid #F59E0B; border-radius: var(--radius); padding: 10px 12px; margin-top: 14px; font-size: 12px; color: #92400E; line-height: 1.5; }
    .admin-note-title { font-weight: 600; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Bandeau global "actions en attente" */
    .sync-banner { background: #FEF3C7; border: 0.5px solid #D97706; color: #92400E; border-radius: var(--radius); padding: 8px 12px; margin-bottom: 12px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
    .sync-banner.offline { background: #FEE2E2; border-color: #DC2626; color: #991B1B; }
    .sync-banner-spinner { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Fil d'actualités */
    .news-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; }
    .news-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .news-title { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .news-badge { background: #E24B4A; color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; }
    .news-close { background: none; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 12px; padding: 4px 10px; font-family: inherit; transition: all 0.15s; }
    .news-close:hover { border-color: var(--green); color: var(--green); }
    .news-list { display: flex; flex-direction: column; gap: 8px; }
    .news-item { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; transition: opacity 0.15s; }
    .news-item:hover { opacity: 0.85; }
    .news-item.unread { border-left: 3px solid var(--primary); }
    .news-item.read { opacity: 0.6; }
    .news-icon { font-size: 16px; flex-shrink: 0; }
    .news-content { flex: 1; }
    .news-content-title { font-size: 12px; font-weight: 500; }
    .news-content-sub { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
    .news-time { font-size: 10px; color: var(--text2); flex-shrink: 0; white-space: nowrap; }
    .news-empty { font-size: 12px; color: var(--text2); text-align: center; padding: 16px; }

    /* ============================================ */
    /* RESPONSIVE MOBILE - breakpoint 900px         */
    /* ============================================ */
    @media (max-width: 900px) {
      /* Layout principal en colonne unique */
      .menage-layout { grid-template-columns: 1fr; gap: 12px; }

      /* Sidebar (mini-cal + filtres) masquee sur mobile */
      .menage-layout > div:first-child { display: none; }

      /* Header planning : stack vertical */
      .planning-header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        margin-bottom: 12px;
      }
      .week-nav {
        justify-content: space-between;
        width: 100%;
      }
      .week-nav button {
        font-size: 12px;
        padding: 8px 10px;
        flex-shrink: 0;
      }
      .week-label {
        flex: 1;
        min-width: 0;
        font-size: 13px;
      }
      .planning-header > .btn {
        width: 100%;
      }

      /* Stats semaine : passe en wrap */
      .week-stats {
        flex-wrap: wrap;
        gap: 8px;
      }
      .week-stat {
        flex: 1;
        min-width: 100px;
        font-size: 11px;
        padding: 8px 10px;
      }
      .week-stat strong { font-size: 16px; }

      /* Grille semaine : 1 colonne, jours empiles */
      .week-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      /* Cartes jour adaptees mobile */
      .day-col {
        min-height: auto;
        border-radius: var(--radius-lg);
      }
      /* Jours vides masques en mobile vue Semaine */
      .day-col.is-empty {
        display: none;
      }
      .day-header {
        padding: 10px 14px;
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .day-name {
        font-size: 12px;
      }
      .day-number {
        font-size: 16px;
      }
      .day-body {
        padding: 8px;
        gap: 6px;
      }

      /* Cartes menage : taille tactile minimale */
      .menage-card {
        padding: 10px 12px;
        font-size: 13px;
        min-height: 44px;
      }
      .menage-card-prop {
        font-size: 10px;
      }
      .menage-card-time {
        font-size: 10px;
      }

      /* Toggle 3 vues (mobile uniquement) */
      .view-toggle {
        display: flex;
        background: var(--bg);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 3px;
        margin-bottom: 12px;
        gap: 0;
      }
      .view-toggle button {
        flex: 1;
        padding: 8px 4px;
        border: none;
        background: transparent;
        font-size: 12px;
        color: var(--text2);
        font-family: inherit;
        cursor: pointer;
        border-radius: calc(var(--radius-lg) - 4px);
        font-weight: 500;
        transition: all 0.15s;
      }
      .view-toggle button.active {
        background: var(--primary);
        color: white;
      }
      .view-toggle button:not(.active):hover {
        background: var(--bg2);
        color: var(--text);
      }

      /* News panel : compact mobile */
      .news-panel {
        padding: 12px;
        margin-bottom: 12px;
      }

      /* Sync banner : compact */
      .sync-banner {
        font-size: 11px;
        padding: 8px 10px;
      }

      /* Modal : presque plein ecran */
      .modal {
        width: 100%;
        max-width: 100%;
        margin: 0;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        max-height: 85vh;
      }
      .modal-overlay {
        align-items: flex-end;
      }

      /* Topbar plus compacte */
      .topbar {
        padding: 12px 16px;
      }
      .page-title {
        font-size: 16px;
      }
      .page-sub {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

<div class="layout">
  <div class="main" style="margin-left:0">
    <div class="topbar">
      <div>
        <div class="page-title">🧹 Planning ménages</div>
        <div class="page-sub" id="presta-label">Chargement...</div>
      </div>
    </div>

    <div class="content">
      <div class="menage-layout">

        <div>
          <div class="mini-cal">
            <div class="mini-cal-header">
              <button class="mini-cal-nav" id="mini-prev">‹</button>
              <div class="mini-cal-title" id="mini-cal-title"></div>
              <button class="mini-cal-nav" id="mini-next">›</button>
            </div>
            <div class="mini-cal-grid" id="mini-cal-grid">
              <div class="mini-cal-day-label">L</div>
              <div class="mini-cal-day-label">M</div>
              <div class="mini-cal-day-label">M</div>
              <div class="mini-cal-day-label">J</div>
              <div class="mini-cal-day-label">V</div>
              <div class="mini-cal-day-label">S</div>
              <div class="mini-cal-day-label">D</div>
            </div>
          </div>

          <div class="mini-cal" style="margin-top:12px">
            <div class="filter-title">Biens affichés</div>
            <div id="filter-list">
              <div style="font-size:11px;color:var(--text2)">Chargement...</div>
            </div>
          </div>
        </div>

        <div>
          <!-- Bandeau sync (cache si rien a syncer) -->
          <div class="sync-banner" id="sync-banner" style="display:none"></div>

          <!-- Fil d'actualités -->
          <div class="news-panel" id="news-panel" style="display:none">
            <div class="news-header">
              <div class="news-title">
                🔔 Nouveautés
                <span class="news-badge" id="news-count" style="display:none">0</span>
              </div>
              <button class="news-close" id="news-close">✓ Tout marquer lu</button>
            </div>
            <div class="news-list" id="news-list"></div>
          </div>

          <!-- Toggle 3 vues (mobile uniquement, cache en CSS sur desktop) -->
          <div class="view-toggle" id="view-toggle">
            <button data-view="mois">Mois</button>
            <button data-view="semaine" class="active">Semaine</button>
            <button data-view="jour">Jour</button>
          </div>

          <div class="planning-header">
            <div class="week-nav">
              <button id="btn-prev-week">← Semaine préc.</button>
              <div class="week-label" id="week-label"></div>
              <button id="btn-next-week">Semaine suiv. →</button>
            </div>
            <button class="btn" id="btn-today">Aujourd'hui</button>
          </div>

          <div class="week-stats" id="week-stats"></div>

          <div class="week-grid" id="week-grid">
            <div style="grid-column:span 7;text-align:center;padding:40px;color:var(--text2)">Chargement...</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
    <div id="modal-note"></div>
    <div class="modal-error"   id="modal-error"></div>
    <div class="modal-success" id="modal-success"></div>
    <div class="modal-warning" id="modal-warning"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="modal-done">✓ Marquer fait</button>
      <button class="btn" id="modal-close">Fermer</button>
    </div>
  </div>
</div>

<script type="module">
// PWA: enregistrement service worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((err) => console.warn("SW registration failed:", err));
  });
}

  import { initErrorHandler } from '/shared/error-handler.js'
  initErrorHandler()

  const PROP_COLORS = ['prop-color-0', 'prop-color-1', 'prop-color-2', 'prop-color-3']
  const JOURS = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim']
  const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre']

  // Cles localStorage. v2 pour ne pas etre pollue par l ancienne clef qui
  // melangeait verite serveur et clic visuel.
  const LS_DONE_SERVER = 'menages-done-server-v2'   // miroir verite serveur, format `${booking_id}|${departure_date}`
  const LS_PENDING     = 'menages-pending-v2'       // file [{action, booking_id, property_id, departure_date, ts}]

  let properties = []
  let bookings = []
  let doneSet = new Set()              // ids menage afficheS comme fait (= union miroir + pending)
  let serverDoneSet = new Set()        // miroir serveur
  let pendingQueue = []                // file actions en attente
  let commentsMap = {}
  let visibilityDays = 30
  let currentWeekStart = getMonday(new Date())
  let miniCalDate = new Date()
  let activeProps = new Set()
  let selectedMenage = null
  let newsItems = []
  let currentToken = null
  let isFlushingQueue = false
  // Vue active mobile : 'mois' | 'semaine' | 'jour'. Persistee en localStorage.
  let currentView = (() => {
    try {
      const v = localStorage.getItem('menages-current-view')
      return (v === 'mois' || v === 'semaine' || v === 'jour') ? v : 'semaine'
    } catch (e) { return 'semaine' }
  })()
  function setCurrentView(v) {
    if (v !== 'mois' && v !== 'semaine' && v !== 'jour') return
    currentView = v
    try { localStorage.setItem('menages-current-view', v) } catch (e) {}
    document.querySelectorAll('#view-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.view === v)
    })
    // En Étape 3 et 4 on branchera ici le re-render selon la vue.
  }

  function getToken() {
    const fromUrl = new URLSearchParams(window.location.search).get('token');
    if (fromUrl) {
      try { localStorage.setItem('hotesmart-clean-token', fromUrl); } catch(e) {}
      return fromUrl;
    }
    try { return localStorage.getItem('hotesmart-clean-token'); } catch(e) { return null; }
  }
  // PWA: injection du manifest dynamique selon le token courant
  (function injectManifest() {
    const t = getToken();
    const link = document.getElementById('dynamic-manifest');
    if (link) link.href = t ? '/api/manifest?token=' + encodeURIComponent(t) : '/api/manifest';
  })();

  async function init() {
    // Listener du toggle 3 vues + restauration de la vue persistee
    document.querySelectorAll('#view-toggle button').forEach(b => {
      b.addEventListener('click', () => setCurrentView(b.dataset.view))
    })
    setCurrentView(currentView)

    currentToken = getToken()
    if (!currentToken) {
      document.querySelector('.content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">❌ Lien invalide</div>'
      return
    }

    loadLocalState()
    await loadData(currentToken)
    rebuildDoneSet()
    renderFilters()
    renderNews()
    renderMiniCal()
    renderWeek()
    renderSyncBanner()

    document.getElementById('btn-prev-week').addEventListener('click', () => { currentWeekStart = addDays(currentWeekStart, -7); renderWeek(); renderMiniCal() })
    document.getElementById('btn-next-week').addEventListener('click', () => { currentWeekStart = addDays(currentWeekStart, 7); renderWeek(); renderMiniCal() })
    document.getElementById('btn-today').addEventListener('click', () => { currentWeekStart = getMonday(new Date()); miniCalDate = new Date(); renderWeek(); renderMiniCal() })
    document.getElementById('mini-prev').addEventListener('click', () => { miniCalDate = new Date(miniCalDate.getFullYear(), miniCalDate.getMonth() - 1, 1); renderMiniCal() })
    document.getElementById('mini-next').addEventListener('click', () => { miniCalDate = new Date(miniCalDate.getFullYear(), miniCalDate.getMonth() + 1, 1); renderMiniCal() })
    document.getElementById('modal-close').addEventListener('click', closeModal)
    document.getElementById('modal-done').addEventListener('click', onModalDoneClick)
    document.getElementById('modal').addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) closeModal() })
    document.getElementById('news-close').addEventListener('click', markAllNewsRead)

    // Sync au retour de connexion
    window.addEventListener('online',  () => { console.log('[Sync] Online');  flushPendingQueue() })
    window.addEventListener('offline', () => { console.log('[Sync] Offline'); renderSyncBanner() })

    // Tentative de flush au demarrage si on a des actions en attente
    if (pendingQueue.length > 0) flushPendingQueue()
  }

  // ─── Local storage : chargement / persistance ──────────────────────────────
  function loadLocalState() {
    try { const raw = localStorage.getItem(LS_DONE_SERVER); if (raw) serverDoneSet = new Set(JSON.parse(raw)) } catch(e) {}
    try { const raw = localStorage.getItem(LS_PENDING);     if (raw) pendingQueue  = JSON.parse(raw)         } catch(e) {}
  }
  function saveServerDoneSet() { localStorage.setItem(LS_DONE_SERVER, JSON.stringify([...serverDoneSet])) }
  function savePendingQueue()  { localStorage.setItem(LS_PENDING,     JSON.stringify(pendingQueue))       }

  // doneSet (le visuel) = (serverDoneSet + pending markDone) - (pending markUndone)
  function rebuildDoneSet() {
    const s = new Set()
    for (const key of serverDoneSet) {
      const [bookingId, departureDate] = key.split('|')
      s.add(`${bookingId}-${departureDate}`)
    }
    for (const action of pendingQueue) {
      const id = `${action.booking_id}-${action.departure_date}`
      if (action.action === 'markDone')   s.add(id)
      if (action.action === 'markUndone') s.delete(id)
    }
    doneSet = s
  }

  // ─── Bandeau de sync ────────────────────────────────────────────────────────
  function renderSyncBanner() {
    const el = document.getElementById('sync-banner')
    if (!navigator.onLine) {
      el.className = 'sync-banner offline'
      el.innerHTML = '📡 Hors ligne. Vos actions seront envoyees au retour de la connexion.'
      el.style.display = 'flex'
      return
    }
    if (pendingQueue.length > 0) {
      el.className = 'sync-banner'
      el.innerHTML = `<span class="sync-banner-spinner">⏳</span> ${pendingQueue.length} action(s) en attente d envoi...`
      el.style.display = 'flex'
      return
    }
    el.style.display = 'none'
  }

  // ─── Flush de la file d actions ────────────────────────────────────────────
  async function flushPendingQueue() {
    if (isFlushingQueue) return
    if (!navigator.onLine) { renderSyncBanner(); return }
    if (pendingQueue.length === 0) { renderSyncBanner(); return }

    isFlushingQueue = true
    renderSyncBanner()

    const queue = [...pendingQueue]
    for (const action of queue) {
      try {
        const res = await fetch(`/api/menages-public?token=${currentToken}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(action)
        })

        if (res.ok) {
          const payload = await res.json().catch(() => ({}))
          if (!payload.error) {
            const key = `${action.booking_id}|${action.departure_date}`
            if (action.action === 'markDone')   serverDoneSet.add(key)
            if (action.action === 'markUndone') serverDoneSet.delete(key)
            saveServerDoneSet()
            removeFromPending(action)
          } else {
            console.error('[Sync] Erreur metier, action retiree:', action, payload.error)
            removeFromPending(action)
            rebuildDoneSet()
          }
        } else if (res.status >= 400 && res.status < 500) {
          // Erreur 4xx : pas la peine de retenter (token, garde-fou departure futur...)
          const payload = await res.json().catch(() => ({}))
          console.error('[Sync] Erreur 4xx, action abandonnee:', action, payload.error)
          removeFromPending(action)
          rebuildDoneSet()
        }
        // 5xx ou autre : on garde dans la file pour retry plus tard
      } catch (err) {
        console.error('[Sync] Erreur reseau pendant flush:', err)
        break  // inutile de continuer si on a perdu la connexion en cours
      }
    }

    isFlushingQueue = false
    renderSyncBanner()
    renderWeek()
    renderMiniCal()
  }

  function removeFromPending(action) {
    pendingQueue = pendingQueue.filter(a =>
      !(a.action === action.action && a.booking_id === action.booking_id && a.departure_date === action.departure_date)
    )
    savePendingQueue()
  }

  function enqueuePending(action) {
    // On retire d abord toute action conflictuelle pour le meme menage
    pendingQueue = pendingQueue.filter(a =>
      !(a.booking_id === action.booking_id && a.departure_date === action.departure_date)
    )
    pendingQueue.push({ ...action, ts: Date.now() })
    savePendingQueue()
  }

  // ─── Chargement initial ────────────────────────────────────────────────────
  async function loadData(token) {
    let res
    try {
      res = await fetch(`/api/menages-public?token=${token}`)
    } catch (err) {
      // Pas de reseau au demarrage : mode degraded, on reste avec le cache
      console.warn('[Init] Hors ligne, mode degraded')
      document.getElementById('presta-label').textContent = '(Hors ligne — donnees en cache)'
      return
    }
    if (!res.ok) {
      document.querySelector('.content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">❌ Token invalide</div>'
      return
    }
    const data = await res.json()

    document.getElementById('presta-label').textContent = data.label || 'Planning ménages'
    visibilityDays = data.visibility_days || 30

    const propMap = new Map()
    ;(data.bookings || []).forEach(b => {
      if (!propMap.has(b.propId)) propMap.set(b.propId, { id: b.propId, name: b.propName })
    })
    properties = [...propMap.values()]
    activeProps = new Set(properties.map(p => p.id))
    bookings = data.bookings || []

    ;(data.comments || []).forEach(c => { commentsMap[`${c.booking_id}-${c.departure_date}`] = c.comment })

    newsItems = data.events || []

    // Verite serveur : on remplace le miroir local
    if (Array.isArray(data.done)) {
      serverDoneSet = new Set(data.done.map(d => `${d.booking_id}|${d.departure_date}`))
      saveServerDoneSet()
    }
  }

  function getMenages() {
    const menages = []
    for (const b of bookings) {
      if (!activeProps.has(b.propId)) continue
      if (!b.departure) continue
      const dep = new Date(b.departure)
      const propIdx = properties.findIndex(p => p.id === b.propId)
      const id = `${b.id}-${b.departure}`
      const isPending = pendingQueue.some(a => a.booking_id === String(b.id) && a.departure_date === b.departure)
      menages.push({
        id, date: dep, dateStr: b.departure,
        propId: b.propId, propName: b.propName, propIdx,
        guestName: b.firstName ? `${b.firstName} ${b.lastName || ''}`.trim() : 'Voyageur',
        arrival: b.arrival, departure: b.departure,
        numAdult: b.numAdult || 0, numChild: b.numChild || 0,
        bookId: b.id, done: doneSet.has(id), pending: isPending,
        comment: commentsMap[`${b.id}-${b.departure}`] || ''
      })
    }
    return menages
  }

  function renderFilters() {
    const list = document.getElementById('filter-list')
    list.innerHTML = properties.map((p, i) => `
      <div class="filter-item">
        <input type="checkbox" id="filter-${p.id}" ${activeProps.has(p.id) ? 'checked' : ''}>
        <div class="filter-dot" style="background:${getDotColor(i)}"></div>
        <label class="filter-label" for="filter-${p.id}">${p.name}</label>
      </div>
    `).join('')
    properties.forEach(p => {
      document.getElementById(`filter-${p.id}`).addEventListener('change', (e) => {
        if (e.target.checked) activeProps.add(p.id)
        else activeProps.delete(p.id)
        renderWeek(); renderMiniCal()
      })
    })
  }

  function renderNews() {
    const unread = newsItems.filter(n => !n.read)
    const panel  = document.getElementById('news-panel')
    const count  = document.getElementById('news-count')
    const list   = document.getElementById('news-list')

    if (newsItems.length === 0) { panel.style.display = 'none'; return }
    panel.style.display = 'block'
    count.textContent = unread.length
    count.style.display = unread.length === 0 ? 'none' : 'inline'

    const icons  = { new: '🆕', modified: '✏️', cancelled: '❌', note: '📝' }
    const labels = { new: 'Nouvelle réservation', modified: 'Réservation modifiée', cancelled: 'Annulation', note: "Note de l'employeur" }

    list.innerHTML = newsItems.map(n => {
      const d = new Date(n.created_at)
      const timeStr = d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }) + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })

      let detail = n.property_name || ''
      if (n.event_data) {
        if (n.event_type === 'note') {
          detail = `${n.property_name} · ${n.event_data.guestName || ''}\nArrivée : ${n.event_data.arrival || '—'} · Départ : ${n.event_data.departure || '—'}\n📝 ${n.event_data.comment || ''}`
        } else {
          detail = `${n.property_name} · ${n.event_data.guestName || ''} · ${n.event_data.arrival || ''} → ${n.event_data.departure || ''}`
          if (n.event_type === 'modified' && n.event_data.changes) {
            const changes = []
            if (n.event_data.changes.arrival)   changes.push(`arrivée : ${n.event_data.changes.arrival.before} → ${n.event_data.changes.arrival.after}`)
            if (n.event_data.changes.departure)  changes.push(`départ : ${n.event_data.changes.departure.before} → ${n.event_data.changes.departure.after}`)
            if (n.event_data.changes.numAdult)   changes.push(`adultes : ${n.event_data.changes.numAdult.before} → ${n.event_data.changes.numAdult.after}`)
            if (n.event_data.changes.numChild)   changes.push(`enfants : ${n.event_data.changes.numChild.before} → ${n.event_data.changes.numChild.after}`)
            if (changes.length) detail += `\n${changes.join(', ')}`
          }
        }
      }

      return `
        <div class="news-item ${n.read ? 'read' : 'unread'}" data-id="${n.id}">
          <div class="news-icon">${icons[n.event_type] || '📋'}</div>
          <div class="news-content">
            <div class="news-content-title">${labels[n.event_type] || n.event_type}</div>
            <div class="news-content-sub">${detail.replace(/\n/g, '<br>')}</div>
          </div>
          <div class="news-time">${timeStr}</div>
        </div>
      `
    }).join('')

    list.querySelectorAll('.news-item').forEach(item => {
      item.addEventListener('click', async () => {
        const id = item.dataset.id
        const n = newsItems.find(n => String(n.id) === String(id))
        if (n && !n.read) {
          n.read = true
          await fetch(`/api/menages-public?token=${currentToken}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'markRead', event_ids: [id] })
          }).catch(() => {})
          renderNews()
        }
      })
    })
  }

  async function markAllNewsRead() {
    const unreadIds = newsItems.filter(n => !n.read).map(n => n.id)
    if (unreadIds.length === 0) return
    newsItems.forEach(n => { n.read = true })
    await fetch(`/api/menages-public?token=${currentToken}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'markRead', event_ids: unreadIds })
    }).catch(() => {})
    renderNews()
  }

  function renderWeek() {
    const today = new Date(); today.setHours(0,0,0,0)
    const weekEnd = addDays(currentWeekStart, 6)
    const menages = getMenages()

    document.getElementById('week-label').textContent = `${formatDate(currentWeekStart)} — ${formatDate(weekEnd)}`

    const weekMenages = menages.filter(m => m.date >= currentWeekStart && m.date <= weekEnd)
    const done = weekMenages.filter(m => m.done).length
    document.getElementById('week-stats').innerHTML = `
      <div class="week-stat"><strong>${weekMenages.length}</strong>ménages cette semaine</div>
      <div class="week-stat"><strong>${done}</strong>effectués</div>
      <div class="week-stat"><strong>${weekMenages.length - done}</strong>restants</div>
    `

    const grid = document.getElementById('week-grid')
    grid.innerHTML = ''

    for (let i = 0; i < 7; i++) {
      const day = addDays(currentWeekStart, i)
      day.setHours(0,0,0,0)
      const isToday = day.getTime() === today.getTime()
      const dayMenages = menages.filter(m => { const md = new Date(m.date); md.setHours(0,0,0,0); return md.getTime() === day.getTime() })

      const col = document.createElement('div')
      col.className = `day-col${isToday ? ' today' : ''}${dayMenages.length === 0 ? ' is-empty' : ''}`
      col.innerHTML = `
        <div class="day-header">
          <div class="day-name">${JOURS[i]}</div>
          <div class="day-number">${day.getDate()}</div>
        </div>
        <div class="day-body">
          ${dayMenages.length === 0 ? '<div class="day-empty">—</div>' :
            dayMenages.map(m => {
              const obs = isMenageObsolete(m, menages)
              return `
              <div class="menage-card ${PROP_COLORS[m.propIdx % 4]} ${m.done ? 'done' : ''} ${obs ? 'obsolete' : ''}" data-id="${m.id}" style="cursor:pointer">
                <div class="menage-card-prop">${m.propName}</div>
                <div class="menage-card-title">Ménage départ</div>
                <div class="menage-card-time">${m.guestName}</div>
                ${m.done ? '<div class="menage-card-check">✓</div>' : ''}
                ${m.pending ? '<div class="menage-card-pending">⏳</div>' : ''}
                ${m.comment ? '<div class="menage-card-comment">📝</div>' : ''}
              </div>
            `
            }).join('')
          }
        </div>
      `
      grid.appendChild(col)
    }

    grid.querySelectorAll('.menage-card').forEach(card => {
      card.addEventListener('click', () => {
        selectedMenage = getMenages().find(m => m.id === card.dataset.id)
        openModal(selectedMenage)
      })
    })
  }

  function renderMiniCal() {
    const menages = getMenages()
    const menageDates = new Map()
    menages.forEach(m => {
      if (!menageDates.has(m.dateStr)) menageDates.set(m.dateStr, [])
      menageDates.get(m.dateStr).push(m)
    })

    document.getElementById('mini-cal-title').textContent = `${MOIS[miniCalDate.getMonth()]} ${miniCalDate.getFullYear()}`

    const grid = document.getElementById('mini-cal-grid')
    const headers = Array.from(grid.children).slice(0, 7)
    grid.innerHTML = ''; headers.forEach(h => grid.appendChild(h))

    const firstDay = new Date(miniCalDate.getFullYear(), miniCalDate.getMonth(), 1)
    const lastDay  = new Date(miniCalDate.getFullYear(), miniCalDate.getMonth() + 1, 0)
    const today    = new Date(); today.setHours(0,0,0,0)

    let startOffset = (firstDay.getDay() + 6) % 7
    for (let i = 0; i < startOffset; i++) {
      const prev = new Date(firstDay); prev.setDate(prev.getDate() - (startOffset - i))
      const d = document.createElement('div')
      d.className = 'mini-cal-day other-month'; d.textContent = prev.getDate()
      grid.appendChild(d)
    }

    for (let d = 1; d <= lastDay.getDate(); d++) {
      const date = new Date(miniCalDate.getFullYear(), miniCalDate.getMonth(), d)
      date.setHours(0,0,0,0)
      const dateStr    = toDateStr(date)
      const dayMenages = menageDates.get(dateStr) || []
      const hasMenage  = dayMenages.length > 0
      const isDone     = hasMenage && dayMenages.every(m => m.done)
      const isToday    = date.getTime() === today.getTime()
      const weekEnd    = addDays(currentWeekStart, 6)
      const inWeek     = date >= currentWeekStart && date <= weekEnd

      const el = document.createElement('div')
      el.className = ['mini-cal-day', isToday ? 'today' : '', hasMenage && !isToday ? (isDone ? 'has-menage done' : 'has-menage') : '', inWeek && !isToday ? 'selected-week' : ''].filter(Boolean).join(' ')
      el.textContent = d

      if (hasMenage) {
        const tooltip = document.createElement('div')
        tooltip.className = 'cal-tooltip'
        tooltip.textContent = dayMenages.map(m => `${m.propName} · ${m.guestName}`).join('\n')
        el.appendChild(tooltip)
      }

      el.addEventListener('click', () => { currentWeekStart = getMonday(date); renderWeek(); renderMiniCal() })
      grid.appendChild(el)
    }
  }

  function isMenageObsolete(m, allMenages) {
    if (m.done) return false
    const today = new Date(); today.setHours(0,0,0,0)
    const menageDate = new Date(m.date); menageDate.setHours(0,0,0,0)
    const laterDone = allMenages.some(other =>
      other.propId === m.propId && other.id !== m.id && other.done &&
      new Date(other.date) > menageDate
    )
    if (laterDone) return true
    const laterArrived = bookings.some(b =>
      b.propId === m.propId && b.id !== m.bookId && b.arrival &&
      new Date(b.arrival) > menageDate && new Date(b.arrival) <= today
    )
    return laterArrived
  }

  // Garde-fou cote front : on bloque le clic markDone sur un menage futur.
  // Comparaison string YYYY-MM-DD (cf. convention dates pures du projet).
  function isMenageFuture(m) {
    return m.dateStr > toDateStr(new Date())
  }

  function openModal(m) {
    document.getElementById('modal-title').textContent = `Ménage — ${m.propName}`
    document.getElementById('modal-sub').textContent = formatDate(m.date)
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-row"><span>Voyageur</span><span>${m.guestName}</span></div>
      <div class="modal-row"><span>Adultes</span><span>${m.numAdult || '—'}</span></div>
      <div class="modal-row"><span>Enfants</span><span>${m.numChild > 0 ? m.numChild + ' enfant(s) 👶' : 'Aucun'}</span></div>
      <div class="modal-row"><span>Arrivée</span><span>${m.arrival || '—'}</span></div>
      <div class="modal-row"><span>Départ</span><span>${m.departure || '—'}</span></div>
      <div class="modal-row"><span>Statut</span><span>${m.done ? '✅ Effectué' : (m.pending ? '⏳ En attente d envoi' : '⏳ À faire')}</span></div>
    `

    const noteEl = document.getElementById('modal-note')
    noteEl.innerHTML = m.comment
      ? `<div class="admin-note"><div class="admin-note-title">📝 Note de l'employeur</div>${m.comment}</div>`
      : ''

    hideModalMessages()

    const obsolete = isMenageObsolete(m, getMenages())
    const future   = isMenageFuture(m)

    const btn = document.getElementById('modal-done')
    btn.style.opacity = ''

    if (m.done) {
      btn.textContent = '↩ Marquer non fait'
      btn.className = 'btn'
      btn.disabled = false
    } else if (obsolete) {
      btn.textContent = '⏭ Obsolète (un voyageur suivant est déjà arrivé)'
      btn.className = 'btn'
      btn.disabled = true
      btn.style.opacity = '0.4'
    } else if (future) {
      btn.textContent = '🔒 Le voyageur n est pas encore parti'
      btn.className = 'btn'
      btn.disabled = true
      btn.style.opacity = '0.4'
    } else {
      btn.textContent = '✓ Marquer fait'
      btn.className = 'btn btn-primary'
      btn.disabled = false
    }

    document.getElementById('modal').style.display = 'flex'
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; selectedMenage = null; hideModalMessages() }

  // ─── Helpers messages modal ────────────────────────────────────────────────
  function showModalError(msg)   { setModalMessage('error',   msg) }
  function showModalSuccess(msg) { setModalMessage('success', msg) }
  function showModalWarning(msg) { setModalMessage('warning', msg) }
  function setModalMessage(type, msg) {
    ;['error','success','warning'].forEach(t => {
      const el = document.getElementById(`modal-${t}`)
      if (t === type) { el.textContent = msg; el.classList.add('visible') }
      else { el.classList.remove('visible') }
    })
  }
  function hideModalMessages() {
    ;['error','success','warning'].forEach(t => document.getElementById(`modal-${t}`).classList.remove('visible'))
  }

  // ─── Routage du clic du bouton modal-done ──────────────────────────────────
  async function onModalDoneClick() {
    if (!selectedMenage) return
    if (selectedMenage.done) await doMarkUndone()
    else await doMarkDone()
  }

  // ─── markDone : tente serveur, sinon enqueue offline ───────────────────────
  async function doMarkDone() {
    const menage = selectedMenage
    const btn = document.getElementById('modal-done')
    const originalText = btn.textContent

    if (!menage.bookId || !menage.propId || !menage.dateStr) {
      showModalError('Donnees manquantes (booking_id, property_id ou departure_date).')
      return
    }
    if (isMenageFuture(menage)) {
      showModalError('Le voyageur n est pas encore parti. Impossible de marquer fait.')
      return
    }

    btn.disabled = true
    btn.textContent = '⏳ Envoi en cours...'
    hideModalMessages()

    const action = {
      action: 'markDone',
      booking_id: String(menage.bookId),
      property_id: String(menage.propId),
      departure_date: menage.dateStr
    }

    try {
      const res = await fetchWithRetry(`/api/menages-public?token=${currentToken}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(action)
      }, 1)

      if (!res.ok) {
        let serverMsg = ''
        try { const errBody = await res.json(); serverMsg = errBody.error || '' } catch(e) {}
        showModalError(serverMsg || `Erreur serveur ${res.status}`)
        btn.disabled = false
        btn.textContent = originalText
        return
      }

      const payload = await res.json().catch(() => ({}))
      if (payload.error) {
        showModalError(`Erreur : ${payload.error}`)
        btn.disabled = false
        btn.textContent = originalText
        return
      }

      // Succes serveur : on met a jour le miroir
      const key = `${action.booking_id}|${action.departure_date}`
      serverDoneSet.add(key)
      saveServerDoneSet()
      rebuildDoneSet()
      showModalSuccess('Menage marque comme fait')
      setTimeout(() => { closeModal(); renderWeek(); renderMiniCal(); renderSyncBanner() }, 800)

    } catch (err) {
      // Erreur reseau : on enqueue pour envoi differe
      console.warn('[markDone] Reseau KO, mise en file:', err)
      enqueuePending(action)
      rebuildDoneSet()
      showModalWarning('Hors ligne : action enregistree, sera envoyee au retour de la connexion.')
      setTimeout(() => { closeModal(); renderWeek(); renderMiniCal(); renderSyncBanner() }, 1200)
    }
  }

  // ─── markUndone : tente serveur, sinon enqueue ─────────────────────────────

  }

  // ─── Fetch avec retry simple ───────────────────────────────────────────────
  async function fetchWithRetry(url, options, retries = 1) {
    try { return await fetch(url, options) }
    catch (err) {
      if (retries > 0) {
        await new Promise(r => setTimeout(r, 1500))
        return fetchWithRetry(url, options, retries - 1)
      }
      throw err
    }
  }

  // ─── Helpers dates ─────────────────────────────────────────────────────────
  function getMonday(date) { const d = new Date(date); d.setHours(0,0,0,0); const day = d.getDay(); d.setDate(d.getDate() + ((day === 0) ? -6 : 1 - day)); return d }
  function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate() + n); return d }
  function formatDate(date) { return date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' }) }
  function toDateStr(date) {
    // YYYY-MM-DD en heure locale (pas UTC, pour rester coherent avec departure
    // de Beds24 qui est en heure locale du bien). On evite toISOString() qui
    // shifte en UTC et peut faire passer la date du jour au lendemain.
    const y = date.getFullYear()
    const m = String(date.getMonth() + 1).padStart(2, '0')
    const d = String(date.getDate()).padStart(2, '0')
    return `${y}-${m}-${d}`
  }
  function getDotColor(i) { return ['#3B82F6', '#10B981', '#F59E0B', '#EC4899'][i % 4] }

  init()
</script>
