<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — SMS</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .sms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .sms-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .sms-card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 18px;
    }

    .templates {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .template-btn {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 10px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .template-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
    }

    .char-count.warn { color: orange; }
    .char-count.over { color: #E24B4A; }

    .toast {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }

    .toast.success { background: #E1F5EE; color: var(--green); border: 0.5px solid var(--green); }
    .toast.error   { background: #fdecea; color: #E24B4A; border: 0.5px solid #E24B4A; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-mini {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .stat-mini-value { font-size: 20px; font-weight: 500; color: var(--green); }
    .stat-mini-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .stat-mini-value.danger { color: #E24B4A; }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filter-row select { flex: 1; }

    .sms-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 420px;
      overflow-y: auto;
    }

    .sms-item {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .sms-item-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .sms-to {
      font-size: 12px;
      font-weight: 500;
      color: var(--green);
      font-family: monospace;
    }

    .sms-time { font-size: 11px; color: var(--text2); }

    .sms-message {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .sms-footer {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge { padding: 2px 7px; border-radius: 10px; font-size: 11px; }
    .badge-ok      { background: #E1F5EE; color: var(--green); }
    .badge-error   { background: #fdecea; color: #E24B4A; }
    .badge-context { background: var(--bg2); border: 0.5px solid var(--border); color: var(--text2); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
      font-size: 13px;
    }

    .refresh-btn {
      background: none;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 10px;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .refresh-btn:hover { border-color: var(--green); color: var(--green); }
  </style>
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">💬 SMS</div>
        <div class="page-sub" id="status">Module Twilio · Prêt à envoyer</div>
      </div>
    </div>

    <div class="content">
      <div class="sms-grid">

        <!-- Panneau envoi -->
        <div class="sms-card">
          <div class="sms-card-title">✉️ Nouveau SMS</div>

          <div class="form-group">
            <label class="form-label">Destinataire</label>
            <input class="form-input" type="tel" id="to" placeholder="+33 6 12 34 56 78">
          </div>

          <div class="form-group">
            <label class="form-label">Bien concerné (optionnel)</label>
            <select class="form-input" id="property_id">
              <option value="">— Aucun —</option>
              <option value="169567">Cœur de vie 23</option>
              <option value="209413">La bulle</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Contexte</label>
            <select class="form-input" id="context">
              <option value="manuel">Manuel</option>
              <option value="agent-ai">Agent AI</option>
              <option value="menages">Ménages</option>
              <option value="cron">Automatique</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Templates rapides</label>
            <div class="templates">
              <button class="template-btn" onclick="useTemplate('checkin')">🔑 Check-in</button>
              <button class="template-btn" onclick="useTemplate('checkout')">👋 Check-out</button>
              <button class="template-btn" onclick="useTemplate('menage')">🧹 Ménage</button>
              <button class="template-btn" onclick="useTemplate('bienvenue')">🏠 Bienvenue</button>
              <button class="template-btn" onclick="useTemplate('incident')">⚠️ Incident</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Message</label>
            <textarea class="form-input" id="message" rows="4" placeholder="Votre message…" oninput="updateCount()" style="resize:vertical"></textarea>
            <div class="char-count" id="charCount">0 / 160</div>
          </div>

          <button class="btn btn-primary" id="sendBtn" onclick="sendSms()" style="width:100%">
            Envoyer le SMS
          </button>

          <div class="toast" id="toast"></div>
        </div>

        <!-- Historique -->
        <div class="sms-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <div class="sms-card-title" style="margin-bottom:0">📋 Historique</div>
            <button class="refresh-btn" onclick="loadHistory()">↻ Actualiser</button>
          </div>

          <div class="stats-row">
            <div class="stat-mini">
              <div class="stat-mini-value" id="statTotal">—</div>
              <div class="stat-mini-label">Total</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value" id="statSuccess">—</div>
              <div class="stat-mini-label">Réussis</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-value danger" id="statError">—</div>
              <div class="stat-mini-label">Erreurs</div>
            </div>
          </div>

          <div class="filter-row">
            <select class="form-input" id="filterProperty" onchange="loadHistory()">
              <option value="">Tous les biens</option>
              <option value="169567">Cœur de vie 23</option>
              <option value="209413">La bulle</option>
            </select>
          </div>

          <div class="sms-list" id="smsList">
            <div class="empty-state">Chargement…</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { initErrorHandler } from '/shared/error-handler.js'

  initErrorHandler()

  const session = await requireAuth()
  if (!session) throw new Error('Non authentifié')

  await renderSidebar('sms')

  window._session = session
  window.loadHistory()
</script>

<script>
  const templates = {
    checkin:   "Bonjour, voici vos informations d'arrivée : le code de la boîte à clés est [CODE]. Bon séjour ! 🏠",
    checkout:  "Bonjour, c'est l'heure du départ. Merci de laisser les clés dans la boîte et de bien fermer la porte. À bientôt ! 👋",
    menage:    "Bonjour, un ménage est prévu aujourd'hui au logement. Merci de vous y rendre à [HEURE]. 🧹",
    bienvenue: "Bienvenue dans votre logement ! N'hésitez pas à nous contacter si vous avez besoin de quoi que ce soit. Bon séjour ! 🏠✨",
    incident:  "Bonjour, nous avons signalé un incident dans votre logement. Notre équipe va vous contacter rapidement. Merci. ⚠️"
  }

  window.useTemplate = key => {
    document.getElementById('message').value = templates[key]
    updateCount()
  }

  window.updateCount = () => {
    const len = document.getElementById('message').value.length
    const el  = document.getElementById('charCount')
    el.textContent = `${len} / 160`
    el.className = 'char-count' + (len > 320 ? ' over' : len > 160 ? ' warn' : '')
  }

  window.sendSms = async () => {
    const to          = document.getElementById('to').value.trim()
    const message     = document.getElementById('message').value.trim()
    const property_id = document.getElementById('property_id').value
    const context     = document.getElementById('context').value

    if (!to || !message) return showToast('Numéro et message requis.', 'error')

    const btn = document.getElementById('sendBtn')
    btn.disabled = true
    btn.textContent = 'Envoi en cours…'

    try {
      const res  = await fetch('/api/sms', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${window._session?.access_token}`
        },
        body: JSON.stringify({ to, message, property_id: property_id || null, context })
      })
      const data = await res.json()

      if (data.success) {
        showToast(`✅ SMS envoyé ! SID : ${data.sid}`, 'success')
        document.getElementById('message').value = ''
        document.getElementById('to').value = ''
        updateCount()
        setTimeout(window.loadHistory, 1000)
      } else {
        showToast(`❌ ${data.error}`, 'error')
      }
    } catch (err) {
      showToast(`❌ Erreur réseau : ${err.message}`, 'error')
    } finally {
      btn.disabled = false
      btn.textContent = 'Envoyer le SMS'
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = `toast ${type}`
    t.style.display = 'block'
    setTimeout(() => { t.style.display = 'none' }, 5000)
  }

  window.loadHistory = async () => {
    const property_id = document.getElementById('filterProperty').value
    const url = '/api/sms' + (property_id ? `?property_id=${property_id}` : '?limit=50')

    try {
      const res  = await fetch(url, {
        headers: { 'Authorization': `Bearer ${window._session?.access_token}` }
      })
      const data = await res.json()
      renderHistory(data.logs || [])
    } catch {
      document.getElementById('smsList').innerHTML = '<div class="empty-state">Erreur de chargement</div>'
    }
  }

  function renderHistory(logs) {
    document.getElementById('statTotal').textContent   = logs.length
    document.getElementById('statSuccess').textContent = logs.filter(l => l.status !== 'error').length
    document.getElementById('statError').textContent   = logs.filter(l => l.status === 'error').length

    if (!logs.length) {
      document.getElementById('smsList').innerHTML = "<div class='empty-state'>Aucun SMS envoyé pour l'instant</div>"
      return
    }

    const propName = id => id === '169567' ? 'Cœur de vie 23' : id === '209413' ? 'La bulle' : ''

    document.getElementById('smsList').innerHTML = logs.map(log => {
      const d = new Date(log.created_at)
      const t = d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' })
              + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })

      return `
        <div class="sms-item">
          <div class="sms-item-header">
            <span class="sms-to">${log.to_number}</span>
            <span class="sms-time">${t}</span>
          </div>
          <div class="sms-message">${log.message}</div>
          <div class="sms-footer">
            <span class="badge ${log.status === 'error' ? 'badge-error' : 'badge-ok'}">${log.status === 'error' ? '❌ Erreur' : '✅ Envoyé'}</span>
            ${log.context ? `<span class="badge badge-context">${log.context}</span>` : ''}
            ${log.property_id ? `<span class="badge badge-context">${propName(log.property_id)}</span>` : ''}
            ${log.error ? `<span style="font-size:11px;color:#E24B4A">${log.error}</span>` : ''}
          </div>
        </div>
      `
    }).join('')
  }
</script>

</body>
</html>
