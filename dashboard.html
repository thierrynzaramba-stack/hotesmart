<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-url" content="https://xxxx.supabase.co">
  <meta name="supabase-key" content="eyJxxx...">
  <title>HôteSmart — Dashboard</title>
  <link rel="stylesheet" href="../public/style.css">
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="welcome">Bonjour !</div>
        <div class="page-sub" id="status">Chargement...</div>
      </div>
    </div>

    <div class="content">

      <!-- Métriques -->
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Revenus ce mois</div>
          <div class="metric-value" id="stat-revenus">—</div>
          <div class="metric-delta" id="stat-revenus-delta"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Taux d'occupation</div>
          <div class="metric-value" id="stat-occupation">—</div>
          <div class="metric-delta" id="stat-occupation-delta"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Messages traités</div>
          <div class="metric-value" id="stat-messages">—</div>
          <div class="metric-delta">par l'Agent AI</div>
        </div>
        <div class="metric">
          <div class="metric-label">Note moyenne</div>
          <div class="metric-value" id="stat-note">—</div>
          <div class="metric-delta" id="stat-note-delta"></div>
        </div>
      </div>

      <!-- Apps -->
      <div class="section-title">Mes apps</div>
      <div class="apps-grid" id="apps-grid">
        <div class="app-card">Chargement...</div>
      </div>

      <!-- Messages récents -->
      <div class="section-title">Derniers messages traités</div>
      <div class="card" id="messages-list">
        <div class="msg-row">
          <div style="font-size:12px;color:var(--text2)">Chargement des messages...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '../components/auth-guard.js'
  import { renderSidebar } from '../components/sidebar.js'
  import { getUser } from '../shared/supabase.js'
  import CONFIG from '../shared/config.js'

  async function init() {
    const session = await requireAuth()
    if (!session) return

    const user = await getUser()

    // Sidebar
    await renderSidebar('accueil')

    // Bienvenue
    const name = user?.user_metadata?.full_name || user?.email?.split('@')[0] || 'là'
    document.getElementById('welcome').textContent = `Bonjour ${name} !`
    document.getElementById('status').textContent = 'Beds24 connecté · Dashboard en direct'

    // Apps grid
    renderApps()

    // Stats (placeholder — sera remplacé par vraies données Beds24)
    document.getElementById('stat-revenus').textContent = '—'
    document.getElementById('stat-occupation').textContent = '—'
    document.getElementById('stat-messages').textContent = '0'
    document.getElementById('stat-note').textContent = '—'
  }

  function renderApps() {
    const grid = document.getElementById('apps-grid')
    grid.innerHTML = CONFIG.apps.map(app => `
      <a class="app-card" href="/apps/${app.id}">
        <div class="app-icon" style="background:${app.color}">${app.icon}</div>
        <div class="app-name">${app.name}</div>
        <div class="app-desc">Cliquez pour configurer</div>
        <div class="app-status status-off">○ Inactif</div>
      </a>
    `).join('')
  }

  init()
</script>

</body>
</html>
