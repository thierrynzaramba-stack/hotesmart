<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-url" content="https://cjmrizpdyhrcurmgyrhs.supabase.co">
  <meta name="supabase-key" content="sb_publishable_cCOixH5aKHWUq5OzNPX7qw_ub0RQ5rD">
  <title>HôteSmart — Mot de passe oublié</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg2); }
    .auth-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 380px; }
    .auth-logo { font-size: 20px; font-weight: 500; margin-bottom: 6px; color: #C97B5C; }
    .auth-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .auth-back { display: inline-block; margin-top: 16px; font-size: 12px; color: var(--text2); text-decoration: none; }
    .auth-back:hover { color: var(--text); }
    .error { font-size: 12px; color: #E24B4A; margin-top: 12px; display: none; }
    .success { font-size: 13px; color: #065F46; background: #D1FAE5; border: 0.5px solid #6EE7B7; border-radius: var(--radius); padding: 12px; margin-top: 16px; line-height: 1.5; display: none; }
  </style>
</head>
<body>

<div class="auth-box">
  <div class="auth-logo">HôteSmart</div>
  <div class="auth-title">Mot de passe oublié ?</div>
  <div class="auth-sub">Entrez votre adresse email. Nous vous enverrons un lien pour choisir un nouveau mot de passe.</div>

  <div id="form-step">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="forgot-email" placeholder="vous@email.com">
    </div>
    <button class="btn btn-primary" style="width:100%" id="btn-send">Envoyer le lien</button>
    <div class="error" id="forgot-error"></div>
  </div>

  <div class="success" id="forgot-success">
    Si un compte existe avec cette adresse, un email vient d'être envoyé.<br>
    Vérifiez votre boîte de réception (et vos spams).
  </div>

  <a href="/pages/login.html" class="auth-back">← Retour à la connexion</a>
</div>

<script type="module">
  import { supabase } from '/shared/supabase.js'

  const btn = document.getElementById('btn-send')
  const errEl = document.getElementById('forgot-error')
  const formStep = document.getElementById('form-step')
  const successEl = document.getElementById('forgot-success')

  btn.addEventListener('click', async () => {
    const email = document.getElementById('forgot-email').value.trim()
    errEl.style.display = 'none'

    if (!email || !email.includes('@')) {
      errEl.textContent = 'Adresse email invalide'
      errEl.style.display = 'block'
      return
    }

    btn.disabled = true
    btn.textContent = 'Envoi en cours...'

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/pages/reset-password.html'
    })

    if (error) {
      errEl.textContent = error.message
      errEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Envoyer le lien'
      return
    }

    formStep.style.display = 'none'
    successEl.style.display = 'block'
  })
</script>

</body>
</html>
