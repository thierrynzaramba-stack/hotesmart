<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-url" content="https://cjmrizpdyhrcurmgyrhs.supabase.co">
  <meta name="supabase-key" content="sb_publishable_cCOixH5aKHWUq5OzNPX7qw_ub0RQ5rD">
  <title>HôteSmart — Nouveau mot de passe</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg2); }
    .auth-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 380px; }
    .auth-logo { font-size: 20px; font-weight: 500; margin-bottom: 6px; color: #C97B5C; }
    .auth-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .error { font-size: 12px; color: #E24B4A; margin-top: 12px; display: none; }
    .success { font-size: 13px; color: #065F46; background: #D1FAE5; border: 0.5px solid #6EE7B7; border-radius: var(--radius); padding: 12px; margin-top: 16px; line-height: 1.5; display: none; }
    .invalid { font-size: 13px; color: #991B1B; background: #FEE2E2; border: 0.5px solid #FCA5A5; border-radius: var(--radius); padding: 12px; line-height: 1.5; display: none; }
  </style>
</head>
<body>

<div class="auth-box">
  <div class="auth-logo">HôteSmart</div>
  <div class="auth-title">Choisir un nouveau mot de passe</div>
  <div class="auth-sub">Entrez votre nouveau mot de passe ci-dessous.</div>

  <div id="form-step">
    <div class="form-group">
      <label class="form-label">Nouveau mot de passe</label>
      <input class="form-input" type="password" id="new-password" placeholder="••••••••" minlength="8">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer le mot de passe</label>
      <input class="form-input" type="password" id="confirm-password" placeholder="••••••••" minlength="8">
    </div>
    <button class="btn btn-primary" style="width:100%" id="btn-update">Enregistrer</button>
    <div class="error" id="reset-error"></div>
  </div>

  <div class="success" id="reset-success">
    Mot de passe mis à jour. Redirection vers votre espace...
  </div>

  <div class="invalid" id="reset-invalid">
    Ce lien est invalide ou expiré. <a href="/pages/forgot-password.html" style="color:inherit;text-decoration:underline">Demander un nouveau lien</a>.
  </div>
</div>

<script type="module">
  import { supabase } from '/shared/supabase.js'

  const btn = document.getElementById('btn-update')
  const errEl = document.getElementById('reset-error')
  const formStep = document.getElementById('form-step')
  const successEl = document.getElementById('reset-success')
  const invalidEl = document.getElementById('reset-invalid')

  // A l'arrivee sur la page, Supabase a place un token dans l'URL hash
  // qu'il a deja consomme via onAuthStateChange. On verifie qu'on a une session.
  // Si pas de session : lien invalide ou expire.

  let recoveryReady = false
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true
    }
  })

  // Au cas ou onAuthStateChange n'a pas tire (page rechargee), on check la session apres 1s
  setTimeout(async () => {
    if (recoveryReady) return
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) {
      formStep.style.display = 'none'
      invalidEl.style.display = 'block'
    }
  }, 1500)

  btn.addEventListener('click', async () => {
    const pwd = document.getElementById('new-password').value
    const confirm = document.getElementById('confirm-password').value
    errEl.style.display = 'none'

    if (pwd.length < 8) {
      errEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères'
      errEl.style.display = 'block'
      return
    }
    if (pwd !== confirm) {
      errEl.textContent = 'Les mots de passe ne correspondent pas'
      errEl.style.display = 'block'
      return
    }

    btn.disabled = true
    btn.textContent = 'Enregistrement...'

    const { error } = await supabase.auth.updateUser({ password: pwd })

    if (error) {
      errEl.textContent = error.message
      errEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Enregistrer'
      return
    }

    formStep.style.display = 'none'
    successEl.style.display = 'block'
    setTimeout(() => { window.location.href = '/pages/index.html' }, 1500)
  })
</script>

</body>
</html>
