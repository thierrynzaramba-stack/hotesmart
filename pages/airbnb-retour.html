<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Retour Airbnb</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:#fafaf7; color:#1a1a1a; display:flex; align-items:center; justify-content:center;
      min-height:100vh; margin:0; padding:20px; }
    .box { background:#fff; border:1px solid #e5e5e5; border-radius:14px; padding:28px 26px;
      max-width:420px; width:100%; text-align:center; }
    .spin { width:22px; height:22px; border:3px solid #e5e5e5; border-top-color:#C97B5C;
      border-radius:50%; animation:rot .8s linear infinite; margin:6px auto 14px; }
    @keyframes rot { to { transform:rotate(360deg); } }
    h1 { font-size:16px; font-weight:600; margin:0 0 8px; }
    p { font-size:13px; color:#6b6b6b; line-height:1.5; margin:0; }
    .ok { color:#137333; }
    .err { color:#C5221F; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spin" id="spin"></div>
    <h1 id="t">Connexion Airbnb…</h1>
    <p id="m">Un instant, nous finalisons le retour depuis Airbnb.</p>
  </div>
  <script>
    // Page de retour OAuth Airbnb. Airbnb/Channex redirige ici avec
    // ?success=true&channel_id=X&token=Y (succes) ou ?failure=1 (echec).
    //
    // Deux modes :
    //   POPUP  : fenetre ouverte par l'assistant -> postMessage vers l'opener puis close.
    //   PLEINE PAGE (repli popup bloquee) : on stocke le retour en sessionStorage et on
    //   renvoie vers biens.html?airbnb_return=1 qui rouvre l'assistant a l'ecran B.
    (function () {
      var q = new URLSearchParams(location.search)
      var failure = q.get('failure') === '1' || q.get('success') === 'false'
      var channelId = q.get('channel_id') || ''
      var token = q.get('token') || ''
      var ok = !failure && !!token

      var t = document.getElementById('t')
      var m = document.getElementById('m')
      var spin = document.getElementById('spin')

      function done(success, title, msg) {
        spin.style.display = 'none'
        t.textContent = title
        t.className = success ? 'ok' : 'err'
        m.textContent = msg
      }

      var payload = { source: 'hotesmart-airbnb-return', ok: ok, channelId: channelId, token: token }

      // Mode POPUP : on a un opener de meme origine -> on lui passe la main.
      if (window.opener && window.opener !== window) {
        try {
          window.opener.postMessage(payload, location.origin)
          done(ok, ok ? 'Compte autorisé' : 'Connexion refusée',
            ok ? 'Vous pouvez fermer cette fenêtre, la suite se passe dans HôteSmart.'
               : 'Vous pouvez fermer cette fenêtre et réessayer.')
          setTimeout(function () { try { window.close() } catch (e) {} }, 1200)
          return
        } catch (e) { /* tombe sur le repli pleine page */ }
      }

      // Mode PLEINE PAGE (repli) : stocke et redirige vers l'assistant.
      try { sessionStorage.setItem('airbnb_return', JSON.stringify(payload)) } catch (e) {}
      done(ok, ok ? 'Compte autorisé' : 'Connexion refusée', 'Redirection vers HôteSmart…')
      setTimeout(function () { location.replace('/pages/biens.html?airbnb_return=1') }, 800)
    })()
  </script>
</body>
</html>
