<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HôteSmart — Calendrier</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    /* CSS spécifique au calendrier (conservé tel quel, ne dépend pas de style.css) */
    .cal-page * { box-sizing: border-box; }
    .cal-page { -webkit-user-select: none; user-select: none; }
    .cal-controls { background: var(--bg); padding: 14px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 20; }
    .cal-controls .left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .icon-btn { background: #f0f0f0; border: 1px solid #e5e5e7; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; color: #1d1d1f; }
    .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .toggle { display: inline-flex; background: #f0f0f0; border-radius: 8px; padding: 3px; }
    .toggle button { background: transparent; border: none; padding: 6px 12px; font-size: 13px; cursor: pointer; border-radius: 6px; color: #6e6e73; font-weight: 500; }
    .toggle button.active { background: #fff; color: #1d1d1f; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .multi-select { position: relative; }
    .multi-select .ms-trigger { padding: 7px 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; background: #fff; cursor: pointer; min-width: 190px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .multi-select .ms-panel { display: none; position: absolute; top: calc(100% + 4px); left: 0; background: #fff; border: 1px solid #d2d2d7; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); min-width: 250px; max-height: 320px; overflow-y: auto; z-index: 30; padding: 6px; }
    .multi-select.open .ms-panel { display: block; }
    .multi-select .ms-option { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; cursor: pointer; font-size: 14px; color:#1d1d1f; }
    .multi-select .ms-option:hover { background: #f5f5f7; }
    .period-select { padding: 7px 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; background: #fff; font-family: inherit; color:#1d1d1f; }
    .cal-main { padding: 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; color:#1d1d1f; }
    .month-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .month-pill { background: #fff; border: 1px solid #d2d2d7; border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer; color: #1d1d1f; font-weight: 500; text-transform: capitalize; }
    .month-pill:hover { background: #eef4ff; border-color: #007aff; }
    .month-pill.active { background: #007aff; color: #fff; border-color: #007aff; }
    .scroll-shell { background: #fff; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); overflow: hidden; }
    .scroll-area { overflow-x: auto; }
    table.month-band { border-collapse: collapse; table-layout: fixed; }
    table.month-band td { height: 26px; font-size: 12px; font-weight: 700; color: #1d1d1f; text-align: left; padding-left: 8px; white-space: nowrap; border-bottom: 1px solid #e5e5e7; text-transform: capitalize; }
    table.month-band td.month-start { border-left: 2px solid #007aff; }
    table.month-band .corner { width: 120px; min-width: 120px; position: sticky; left: 0; background: #fff; z-index: 5; border-bottom: 1px solid #e5e5e7; }
    .bien-section { padding: 0 0 16px; margin-bottom: 4px; }
    .bien-section:not(:last-child) { border-bottom: 3px solid #eef0f3; }
    .bien-title { font-size: 18px; font-weight: 700; margin: 16px 0 12px; padding: 0 14px; display: inline-flex; align-items: center; gap: 10px; position: sticky; left: 0; background: #fff; z-index: 6; max-width: 90vw; }
    table.cal .row-label.bien-head { font-size: 14px; font-weight: 700; color: #1d1d1f; border-left: 4px solid #007aff; vertical-align: middle; line-height: 1.2; }
    table.cal .row-label.bien-head .cap-h { display: block; font-size: 10px; font-weight: 400; color: #86868b; margin-top: 2px; }
    .bien-section { padding-top: 18px; }
    .bien-title::before { content: ''; width: 5px; height: 22px; background: #007aff; border-radius: 3px; display: inline-block; }
    .bien-title .cap { font-size: 12px; font-weight: 400; color: #86868b; }
    table.cal { border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    table.cal th, table.cal td { padding: 9px 1px; text-align: center; white-space: nowrap; width: 34px; min-width: 34px; }
    table.cal thead th { border-bottom: 1px solid #e5e5e7; }
    table.cal .row-label { text-align: left; padding-left: 8px; font-size: 11px; color: #6e6e73; width: 120px; min-width: 120px; background: #fff; position: sticky; left: 0; z-index: 2; border-right: 1px solid #e5e5e7; font-weight: 500; }
    table.cal thead .row-label { z-index: 4; }
    table.cal .day-num { font-weight: 600; font-size: 12px; color: #1d1d1f; }
    table.cal .day-name { font-size: 9px; color: #86868b; text-transform: uppercase; }
    table.cal .weekend { background: rgba(0,0,0,0.022); }
    table.cal .month-start { border-left: 2px solid #007aff; }
    table.cal .today { background: #e6f0ff !important; box-shadow: inset 2px 0 0 #007aff, inset -2px 0 0 #007aff; }
    table.cal td.edit-cell { cursor: pointer; position: relative; }
    table.cal td.edit-cell:hover { background: #eef4ff; }
    table.cal td.edit-cell.selected { background: #d4e4ff !important; box-shadow: inset 0 0 0 1px #007aff; }
    table.cal td.rate-cell { font-weight: 600; }
    table.cal td.maxrate-cell { font-weight: 500; color: #6e6e73; }
    table.cal td.modified::after { content: ''; position: absolute; top: 2px; right: 2px; width: 4px; height: 4px; background: #f59e0b; border-radius: 50%; }
    .rate-input { width: 100%; border: none; background: #fff; text-align: center; font-size: 12px; font-weight: 600; font-family: inherit; padding: 3px 0; outline: 2px solid #007aff; border-radius: 3px; }
    table.cal .resa-cell { position: relative; padding: 0 !important; height: 24px; }
    .resa-bar { position: absolute; top: 3px; bottom: 3px; color: white; font-size: 10px; font-weight: 600; display: flex; align-items: center; gap: 4px; padding: 0 6px 0 3px; white-space: nowrap; overflow: hidden; border-radius: 11px; }
    .resa-bar.blue { background: #0d4ea6; } .resa-bar.green { background: #1f6f23; } .resa-bar.red { background: #d52a44; }
    .resa-bar.airbnb { background: #d52a44; } .resa-bar.booking { background: #0d4ea6; } .resa-bar.direct { background: #1f6f23; }
    .resa-bar .ava { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .resa-bar .ava svg { width: 10px; height: 10px; }
    td.cell-closed { background: #ffeced !important; }
    td.cell-reserved { background: #dde7f5 !important; }
    .float-bar { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(140%); background: #1d1d1f; color: #fff; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.25); transition: transform 0.22s ease; z-index: 50; max-width: calc(100% - 32px); }
    .float-bar.visible { transform: translateX(-50%) translateY(0); }
    .float-bar .sel-info { font-size: 13px; } .float-bar .sel-info strong { font-weight: 600; }
    .float-bar button { border: none; border-radius: 9px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .float-bar .btn-params { background: #007aff; color: #fff; }
    .float-bar .btn-clear { background: transparent; color: #a1a1a6; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .overlay.visible { display: flex; }
    .popup-lg { background: #fff; border-radius: 16px; width: 100%; max-width: 740px; max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; color:#1d1d1f; }
    .popup-head { padding: 20px 24px 14px; border-bottom: 1px solid #f0f0f0; }
    .popup-head h3 { font-size: 17px; font-weight: 600; margin-bottom: 12px; }
    .range-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-size: 13px; }
    .range-row input[type=date] { padding: 7px 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 13px; font-family: inherit; }
    .popup-body { display: flex; flex: 1; min-height: 300px; overflow: hidden; }
    .popup-menu { width: 185px; min-width: 185px; border-right: 1px solid #f0f0f0; overflow-y: auto; padding: 8px; }
    .popup-menu .mi { padding: 9px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; color: #1d1d1f; margin-bottom: 2px; }
    .popup-menu .mi:hover { background: #f5f5f7; }
    .popup-menu .mi.active { background: #007aff; color: #fff; font-weight: 600; }
    .popup-menu .mi.config-dot::after { content: '\2022'; color: #f59e0b; margin-left: 6px; font-size: 16px; }
    .popup-menu .mi.active.config-dot::after { color: #fff; }
    .popup-menu .mi-sep { border-top: 1px solid #f0f0f0; margin: 8px 4px; }
    .popup-content { flex: 1; padding: 20px 24px; overflow-y: auto; }
    .popup-content h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .popup-content .desc { font-size: 12px; color: #86868b; margin-bottom: 16px; line-height: 1.5; }
    .dow-row { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .dow-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 9px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 12px; cursor: pointer; }
    .dow-chip input { margin: 0; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .field input[type=number], .field select { width: 100%; padding: 10px 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 15px; font-family: inherit; }
    .seg { display: inline-flex; border: 1px solid #d2d2d7; border-radius: 8px; overflow: hidden; }
    .seg button { background: #fff; border: none; padding: 8px 14px; font-size: 14px; cursor: pointer; border-right: 1px solid #d2d2d7; font-weight: 500; color: #6e6e73; }
    .seg button:last-child { border-right: none; }
    .seg button.active { background: #007aff; color: #fff; }
    .preview-box { background: #f0f9ff; border: 1px solid #cce4ff; border-radius: 8px; padding: 12px; font-size: 13px; color: #0d4ea6; line-height: 1.6; margin-top: 12px; }
    .display-list { display: flex; flex-direction: column; gap: 4px; }
    .display-list label { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .display-list label:hover { background: #f5f5f7; }
    .popup-foot { padding: 14px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .popup-foot .hint { font-size: 12px; color: #86868b; }
    .btn-cancel { background: #f0f0f0; color: #1d1d1f; border: none; border-radius: 9px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-apply { background: #007aff; color: #fff; border: none; border-radius: 9px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1f6f23; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 14px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); opacity: 0; transform: translateY(20px); transition: all 0.25s; z-index: 200; }
    .toast.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main cal-page">
    <div class="topbar">
      <div>
        <div class="page-title">📅 Calendrier</div>
        <div class="page-sub"><a href="/biens" style="color:var(--green);text-decoration:none">← Retour à Mes biens</a></div>
      </div>
    </div>

    <div class="cal-controls">
      <div class="left">
        <div class="multi-select" id="multi-select">
          <div class="ms-trigger" id="ms-trigger"><span id="ms-label">Choisir des biens</span><span>&#9662;</span></div>
          <div class="ms-panel" id="ms-panel"></div>
        </div>
        <select class="period-select" id="period-select"><option value="1">1 mois</option><option value="3">3 mois</option><option value="6">6 mois</option><option value="12">1 an</option></select>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-undo" title="Annuler" disabled>&#8634;</button>
        <div class="toggle"><button id="btn-simple" class="active">Simplifiee</button><button id="btn-complete">Complete</button></div>
      </div>
    </div>

    <div class="cal-main" id="main">
      <div class="month-pills" id="month-pills"></div>
      <div class="scroll-shell"><div class="scroll-area" id="scroll-area"><div id="month-band-wrap"></div><div id="blocks"></div></div></div>
    </div>
  </div>
</div>

  <div class="float-bar" id="float-bar">
    <span class="sel-info"><strong id="sel-count">0</strong> jour(s)</span>
    <button class="btn-params" id="btn-open-popup">Plus de parametres</button>
    <button class="btn-clear" id="btn-clear-sel">Annuler</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="popup-lg">
      <div class="popup-head">
        <h3 id="popup-title">Configurer les dates</h3>
        <div class="range-row"><span>Du</span><input type="date" id="range-start" /><span>au</span><input type="date" id="range-end" /></div>
      </div>
      <div class="popup-body">
        <div class="popup-menu" id="popup-menu"></div>
        <div class="popup-content" id="popup-content"></div>
      </div>
      <div class="popup-foot">
        <span class="hint">Chaque rubrique a ses propres jours. Enregistrer applique tout.</span>
        <div style="display:flex;gap:10px"><button class="btn-cancel" id="btn-cancel">Annuler</button><button class="btn-apply" id="btn-apply">Enregistrer</button></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Modifications enregistrees</div>

  <script type="module">
    import { requireAuth }   from '/components/auth-guard.js'
    import { renderSidebar } from '/components/sidebar.js'
    import { api } from '/shared/api-client.js'

    // Sur mobile : bascule vers la version tactile (PWA), en conservant l'ID du bien.
    if (window.innerWidth <= 768) {
      const m = window.location.pathname.match(/\/biens\/([^/]+)\/calendrier/)
      const bid = m ? m[1] : ''
      window.location.replace('/m/calendrier' + (bid ? '?bien=' + encodeURIComponent(bid) : ''))
    }

    const session = await requireAuth()
    if (!session) throw new Error('Non authentifié')
    await renderSidebar('biens-calendrier')

    // id du bien depuis l'URL /biens/:id/calendrier
    function bienIdFromUrl(){
      const m = window.location.pathname.match(/\/biens\/([^/]+)\/calendrier/)
      return m ? decodeURIComponent(m[1]) : null
    }
    const URL_BIEN_ID = bienIdFromUrl()

    const PARAMS = [
      { key:'rate',           label:'Prix de base',   type:'price', desc:'Tarif par nuit pour le nombre de voyageurs inclus.' },
      { key:'perPerson',      label:'Prix par personne', type:'perperson', desc:'Configuration globale du bien. Le prix de base couvre un nombre de voyageurs inclus ; au-dela, un supplement par personne s\u0027applique.' },
      { key:'avail',          label:'Disponibilite',  type:'openclosed', optOpen:'Ouvert', optClosed:'Ferme', desc:'Ouvre ou ferme la date a la reservation.' },
      { key:'minStayArr',     label:'Min nuits (arrivee)', type:'num', desc:'Nombre minimum de nuits si le voyageur arrive ce jour-la.' },
      { key:'minStayThrough', label:'Min nuits (sejour)',  type:'num', desc:'Nombre minimum de nuits pour tout sejour couvrant cette date.' },
      { key:'maxStay',        label:'Max nuits',      type:'num', desc:'Nombre maximum de nuits pour un sejour incluant cette date.' },
      { key:'cta',            label:'Arrivee',        type:'openclosed', optOpen:'Autorisee', optClosed:'Bloquee', desc:'Autorise ou bloque les arrivees ce jour-la.' },
      { key:'ctd',            label:'Depart',         type:'openclosed', optOpen:'Autorise', optClosed:'Bloque', desc:'Autorise ou bloque les departs ce jour-la.' },
      { key:'stopSell',       label:'Stop vente',     type:'openclosed', optOpen:'En vente', optClosed:'Stoppe', desc:'Arrete la vente sur tous les canaux sans modifier la disponibilite reelle.' }
    ]
    const ROW_DEFAULTS = { avail:'open', minStayArr:0, minStayThrough:0, maxStay:0, cta:'open', ctd:'open', stopSell:'open' }
    let pinnedSimple = new Set()

    let MONTHS=1, days=[]
    const dayNames=['DIM','LUN','MAR','MER','JEU','VEN','SAM']
    const dowOrder=[1,2,3,4,5,6,0]
    const dowLabels={1:'Lun',2:'Mar',3:'Mer',4:'Jeu',5:'Ven',6:'Sam',0:'Dim'}
    const monthShort=['jan','fev','mar','avr','mai','juin','juil','aout','sep','oct','nov','dec']
    const monthFull=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre']
    const fmtShort=(d)=>d.getDate()+' '+monthShort[d.getMonth()]
    const toISO=(d)=>d.toISOString().slice(0,10)
    const CELL_W=34

    function buildDays(){
      const t=new Date(); t.setHours(0,0,0,0)
      let n=Math.round(MONTHS*30)
      // remplir la largeur DISPONIBLE (conteneur calendrier, pas la fenêtre :
      // la sidebar occupe ~260px en desktop). Fallback sur innerWidth si besoin.
      try{
        const COLW=34, LABEL=120, PAD=48
        const main=document.getElementById('main')
        const containerW = (main && main.clientWidth) ? main.clientWidth : ((window.innerWidth||1200)-260)
        const avail=Math.max(0, containerW-LABEL-PAD)
        const fit=Math.floor(avail/COLW)
        if(fit>n) n=fit
      }catch(e){}
      days=[]; for(let i=0;i<n;i++){const d=new Date(t);d.setDate(t.getDate()+i);days.push(d)}
    }
    function isMonthStart(i){ return i===0||days[i].getDate()===1 }
    function isToday(i){ return i===0 }

    let BIENS=[]
    const ppConfig={}
    const invByBien={}

    const states={}
    function initState(b){
      const inv = invByBien[b.id] || {}
      states[b.id]=days.map(d=>{
        const iso=toISO(d)
        const r=inv[iso]
        const rate = (r && r.rate!=null) ? Number(r.rate) : b.base
        return {
          rate,
          avail: (r && r.stop_sell) ? 'closed' : 'open',
          minStayArr: (r && r.min_stay_arrival)||0,
          minStayThrough: (r && r.min_stay_through)||0,
          maxStay: (r && r.max_stay)||0,
          cta: (r && r.cta) ? 'closed' : 'open',
          ctd: (r && r.ctd) ? 'closed' : 'open',
          stopSell: (r && r.stop_sell) ? 'closed' : 'open',
          modified: false
        }
      })
    }

    function maxRateOf(bien, dayRate){ const cfg=ppConfig[bien.id]||{included:bien.included,extraFee:bien.extraFee}; const extra=Math.max(0, bien.capacity-cfg.included); return dayRate + extra*(cfg.extraFee||0) }
    function configuredRowParams(){ const setp=new Set(); selectedBiens.forEach(bid=>{const st=states[bid]; if(!st)return; st.forEach(s=>{for(const k in ROW_DEFAULTS){if(s[k]!==ROW_DEFAULTS[k])setp.add(k)}})}); return setp }

    let sel={bienId:null, idx:new Set(), row:'rate'}
    const undoStack=[]
    function pushUndo(bid){ undoStack.push({bid,snap:JSON.stringify(states[bid]),pp:JSON.stringify(ppConfig[bid])}); document.getElementById('btn-undo').disabled=false }
    function doUndo(){ if(!undoStack.length)return; const u=undoStack.pop(); states[u.bid]=JSON.parse(u.snap); ppConfig[u.bid]=JSON.parse(u.pp); if(!undoStack.length)document.getElementById('btn-undo').disabled=true; renderBlocks(); showToast('Action annulee') }

    let selectedBiens=[]
    function renderMultiSelect(){ const p=document.getElementById('ms-panel'); p.innerHTML=''; BIENS.forEach(b=>{const o=document.createElement('label');o.className='ms-option';if(b.provider==='beds24'){o.style.opacity='0.5';o.style.cursor='not-allowed';o.innerHTML='<input type="checkbox" disabled/> '+b.name+' <span style="color:#86868b;font-size:11px">(gere dans Beds24)</span>';p.appendChild(o);return}o.innerHTML='<input type="checkbox" value="'+b.id+'" '+(selectedBiens.includes(b.id)?'checked':'')+'/> '+b.name+' <span style="color:#86868b;font-size:12px">(cap. '+b.capacity+')</span>';o.querySelector('input').addEventListener('change',async e=>{if(e.target.checked){if(!selectedBiens.includes(b.id))selectedBiens.push(b.id)}else{selectedBiens=selectedBiens.filter(x=>x!==b.id)}updateMsLabel();savePrefsD();await reloadInventory()});p.appendChild(o)});updateMsLabel() }
    function updateMsLabel(){ const l=document.getElementById('ms-label'); if(!selectedBiens.length)l.textContent='Choisir des biens'; else if(selectedBiens.length===1){const b=BIENS.find(x=>x.id===selectedBiens[0]);l.textContent=b?b.name:'1 bien'}else l.textContent=selectedBiens.length+' biens' }
    document.getElementById('ms-trigger').addEventListener('click',()=>document.getElementById('multi-select').classList.toggle('open'))
    document.addEventListener('click',e=>{const ms=document.getElementById('multi-select');if(!ms.contains(e.target))ms.classList.remove('open')})

    function renderMonthPills(){ const w=document.getElementById('month-pills');w.innerHTML='';const seen=new Set();days.forEach((d,idx)=>{const k=d.getFullYear()+'-'+d.getMonth();if(!seen.has(k)){seen.add(k);const p=document.createElement('button');p.className='month-pill';p.textContent=monthFull[d.getMonth()];p.addEventListener('click',()=>{document.getElementById('scroll-area').scrollTo({left:idx*CELL_W,behavior:'smooth'});w.querySelectorAll('.month-pill').forEach(x=>x.classList.remove('active'));p.classList.add('active')});w.appendChild(p)}});const f=w.querySelector('.month-pill');if(f)f.classList.add('active') }

    let lastMouseX=0, autoScrollRAF=null
    function colIndexUnderX(clientX){
      const area=document.getElementById('scroll-area')
      const rect=area.getBoundingClientRect()
      const xInContent = (clientX - rect.left) + area.scrollLeft - 120
      let idx = Math.floor(xInContent / CELL_W)
      if(idx<0) idx=0; if(idx>days.length-1) idx=days.length-1
      return idx
    }
    function extendSelTo(idx){ const lo=Math.min(dragStart,idx),hi=Math.max(dragStart,idx); sel.idx=new Set(); for(let i=lo;i<=hi;i++)sel.idx.add(i); updateSelectionUI() }
    function autoScrollStep(){
      if(!isDragging){ autoScrollRAF=null; return }
      const area=document.getElementById('scroll-area')
      const rect=area.getBoundingClientRect()
      const EDGE=60, SPEED=18
      let scrolled=false
      if(lastMouseX > rect.right - EDGE){ area.scrollLeft += SPEED; scrolled=true }
      else if(lastMouseX < rect.left + 120 + EDGE){ area.scrollLeft -= SPEED; scrolled=true }
      if(scrolled){ extendSelTo(colIndexUnderX(lastMouseX)) }
      autoScrollRAF=requestAnimationFrame(autoScrollStep)
    }
    document.addEventListener('mousemove',e=>{
      if(!isDragging)return
      lastMouseX=e.clientX
      extendSelTo(colIndexUnderX(e.clientX))
      if(!autoScrollRAF) autoScrollRAF=requestAnimationFrame(autoScrollStep)
    })
    document.addEventListener('mouseup',()=>{ if(!isDragging)return; isDragging=false; if(autoScrollRAF){cancelAnimationFrame(autoScrollRAF);autoScrollRAF=null} if(sel.idx.size===0)return; showFloatBar() })

    function updateSelectionUI(){ blocksEl.querySelectorAll('.bien-section').forEach(section=>{const bid=section.dataset.bienId;section.querySelectorAll('.edit-cell').forEach(cell=>{const idx=parseInt(cell.dataset.idx,10);const row=cell.dataset.row;if(sel.bienId===bid&&sel.row===row&&sel.idx.has(idx))cell.classList.add('selected');else cell.classList.remove('selected')})}); if(sel.idx.size>0)showFloatBar() }

    function startInlineEdit(cell,idx,initial){ if(!cell||!sel.bienId)return;const st=states[sel.bienId];const field=sel.row;const current=st[idx][field];const sv=(initial!==undefined&&initial!=='')?initial:current;cell.innerHTML='<input class="rate-input" type="number" value="'+sv+'" />';const input=cell.querySelector('input');input.focus();if(initial!==undefined&&initial!==''){try{input.setSelectionRange(input.value.length,input.value.length)}catch(e){}}else{try{input.select()}catch(e){}};let done=false;const commit=async(apply)=>{if(done)return;done=true;if(apply){const v=parseFloat(input.value);if(!isNaN(v)&&v>0){pushUndo(sel.bienId);const bienId=sel.bienId;const targets=sel.idx.size>0?[...sel.idx]:[idx];targets.forEach(i=>{st[i][field]=v;st[i].modified=true});const n=targets.length;const segs=targets.map(i=>({date_from:toISO(days[i]),date_to:toISO(days[i]),rate:st[i].rate}));sel={bienId:null,idx:new Set(),row:'rate'};hideFloatBar();renderBlocks();showToast(n>1?'Enregistrement '+n+' jours...':'Enregistrement...');try{const resp=await api.calendar.save(bienId,segs);showToast(resp&&resp.warnings&&resp.warnings.length?'Enregistre ('+resp.warnings.length+' avert.)':'Enregistre et publie');await reloadInventory()}catch(err){showToast('Erreur: '+(err.message||'sauvegarde'))}return}}renderBlocks()};input.addEventListener('blur',()=>commit(true));input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit(true)}else if(e.key==='Escape'){commit(false)}}) }

    function dowChipsHtml(dow){ let h='<div class="dow-row">'; dowOrder.forEach(d=>{h+='<label class="dow-chip"><input type="checkbox" data-dow="'+d+'" '+(dow[d]?'checked':'')+'/> '+dowLabels[d]+'</label>'}); h+='</div>'; return h }

    function renderPopupContent(){
      const c=document.getElementById('popup-content')

        let h='<h4>Affichage</h4><div class="desc">Lignes a afficher en vue simplifiee. Reservations et Prix de base sont toujours visibles.</div><div class="display-list">'
        h+='<label><input type="checkbox" data-pin="maxRate" '+(pinnedSimple.has('maxRate')?'checked':'')+'/> Prix max</label>'
        PARAMS.forEach(p=>{if(p.key==='rate'||p.key==='perPerson')return;h+='<label><input type="checkbox" data-pin="'+p.key+'" '+(pinnedSimple.has(p.key)?'checked':'')+'/> '+p.label+'</label>'})

        document.getElementById('pp-inc').addEventListener('input',upd);document.getElementById('pp-extra').addEventListener('input',upd);upd()
        return

        c.innerHTML=h

        c.querySelector('#seg-unit').querySelectorAll('button').forEach(b=>{b.classList.toggle('active',b.dataset.unit===pv.unit);b.addEventListener('click',()=>{pv.unit=b.dataset.unit;c.querySelector('#seg-unit').querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));updatePvPreview()})})

        c.querySelector('#pv-num').addEventListener('input',e=>{pv.value=e.target.value})

    function computeNewRate(cur,mode,unit,val){if(isNaN(val))return cur;if(mode==='set')return unit==='pct'?Math.round(cur*(1+val/100)):val;if(mode==='inc')return unit==='pct'?Math.round(cur*(1+val/100)):cur+val;return unit==='pct'?Math.round(cur*(1-val/100)):cur-val}
    function updatePvPreview(){const pv=pending[activeParam];const box=document.getElementById('pv-preview');if(!box||!pv)return;const val=parseFloat(pv.value);if(isNaN(val)){box.textContent='Saisissez une valeur';return}const sample=states[popupBienId][popupIdxs[0]].rate;const r=computeNewRate(sample,pv.mode,pv.unit,val);const verb=pv.mode==='set'?'defini a':(pv.mode==='inc'?'augmente a':'reduit a');box.textContent='Exemple : '+sample+' EUR -> '+verb+' '+r+' EUR'}

    document.getElementById('btn-apply').addEventListener('click',async ()=>{
      if(!popupBienId){overlay.classList.remove('visible');return}
      const st=states[popupBienId];const bien=BIENS.find(b=>b.id===popupBienId)
      const sISO=document.getElementById('range-start').value,eISO=document.getElementById('range-end').value
      pushUndo(popupBienId)
      let touched=0
      const segments=[]
      if(pending.perPerson){ ppConfig[popupBienId]={included:pending.perPerson.included,extraFee:pending.perPerson.extraFee}; touched++
        segments.push({ kind:'perPerson', included:pending.perPerson.included, extra_guest_fee:pending.perPerson.extraFee })
      }
      PARAMS.forEach(p=>{
        if(p.type==='perperson')return
        const pv=pending[p.key]; if(!pv)return
        const hasVal = p.type==='price' ? (pv.value!==''&&!isNaN(parseFloat(pv.value))) : (p.type==='num' ? pv.value!=='' : pv.value!=='keep')
        if(!hasVal)return
        const daysArr=[]; for(const k in pv.dow){ if(pv.dow[k]) daysArr.push(parseInt(k,10)) }
        days.forEach((d,i)=>{ const iso=toISO(d); if(iso>=sISO&&iso<=eISO&&pv.dow[d.getDay()]){ if(p.type==='price'){st[i][p.key]=computeNewRate(st[i][p.key],pv.mode,pv.unit,parseFloat(pv.value));st[i].modified=true}else if(p.type==='num'){st[i][p.key]=parseInt(pv.value,10)||0;st[i].modified=true}else{st[i][p.key]=pv.value;st[i].modified=true} } })
        const seg={ date_from:sISO, date_to:eISO, days:daysArr }
        if(p.key==='rate'){
          if(pv.mode==='set'&&pv.unit==='eur'){ seg.rate=parseFloat(pv.value) }
          else { seg.__perDate=true }
        }
        else if(p.key==='minStayArr') seg.min_stay_arrival=parseInt(pv.value,10)||0
        else if(p.key==='minStayThrough') seg.min_stay_through=parseInt(pv.value,10)||0
        else if(p.key==='maxStay') seg.max_stay=parseInt(pv.value,10)||0
        else if(p.key==='cta') seg.cta=(pv.value==='closed')
        else if(p.key==='ctd') seg.ctd=(pv.value==='closed')
        else if(p.key==='stopSell') seg.stop_sell=(pv.value==='closed')
        else if(p.key==='avail') seg.stop_sell=(pv.value==='closed')
        segments.push(seg)
        touched++
      })

      const finalSegments=[]
      segments.forEach(seg=>{
        if(seg.kind==='perPerson'){ finalSegments.push(seg); return }
        if(seg.__perDate){
          days.forEach((d,i)=>{ const iso=toISO(d); if(iso>=seg.date_from&&iso<=seg.date_to&&(!seg.days.length||seg.days.includes(d.getDay()))){ finalSegments.push({ date_from:iso, date_to:iso, rate:st[i].rate }) } })
        } else { delete seg.__perDate; finalSegments.push(seg) }
      })

      overlay.classList.remove('visible');sel={bienId:null,idx:new Set(),row:'rate'};hideFloatBar();renderBlocks()

      if(touched>0){
        showToast('Enregistrement...')
        try{
          const resp=await api.calendar.save(popupBienId, finalSegments)
          const tids = resp && resp.task_ids ? [resp.task_ids.restrictions, resp.task_ids.availability].filter(Boolean) : []
          if(tids.length){ try{ await navigator.clipboard.writeText(tids.join('\n')) }catch(e){} }
          if(resp && resp.warnings && resp.warnings.length){ showToast('Enregistre (' + resp.warnings.length + ' avertissement)' + (tids.length?' — task ID copie':'')) }
          else { showToast('Enregistre et publie' + (tids.length?' — task ID copie : '+tids[0]:'')) }
          await reloadInventory()
        }catch(err){ showToast('Erreur: ' + (err.message||'sauvegarde')) }
      } else { showToast('Aucune modification') }
    })

    btnS.addEventListener('click',()=>{showComplete=false;btnS.classList.add('active');btnC.classList.remove('active');renderBlocks()})
    btnC.addEventListener('click',()=>{showComplete=true;btnC.classList.add('active');btnS.classList.remove('active');renderBlocks()})
    document.getElementById('period-select').addEventListener('change',async e=>{MONTHS=parseInt(e.target.value,10);savePrefsD();buildDays();Object.keys(states).forEach(k=>delete states[k]);sel={bienId:null,idx:new Set(),row:'rate'};hideFloatBar();renderMonthPills();renderMonthBand();await reloadInventory()})

    let toastTimer=null
    function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('visible');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('visible'),1800)}

    const COLORS_BY_SOURCE = { airbnb:'red', booking:'blue', direct:'green' }
    function rangeISO(){ return { start: toISO(days[0]), end: toISO(days[days.length-1]) } }

    function mapBien(p){
      return { id:p.id, name:p.name, capacity:p.capacity||1, base:Number(p.base_price)||0,
        included:p.included_guests||p.capacity||1, extraFee:Number(p.extra_guest_fee)||0,
        currency:p.currency||'EUR', provider:p.provider||'channex', resa:[] }
    }
    function mapResa(list){
      const SRC=['airbnb','booking','direct']
      return (list||[]).filter(function(b){return String(b.status||'').toLowerCase()!=='cancelled'}).map((b,idx)=>{
        const ci=new Date(b.checkin+'T00:00:00'), co=new Date(b.checkout+'T00:00:00')
        const span=Math.max(1, Math.round((co-ci)/86400000))
        const src=SRC[idx % 3]
        return { startISO:b.checkin, checkout:b.checkout, span, name:b.guest_name||'Reservation', source:src, color:COLORS_BY_SOURCE[src]||'green' }
      })
    }
    function platformLogo(src){
      if(src==='airbnb') return '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2c-1.1 0-2 .7-2.5 1.8C8 6.5 4 15 4 18a4 4 0 0 0 7 2.6A4 4 0 0 0 18 18c0-3-4-11.5-5.5-14.2C12 2.7 11.1 2 12 2zm0 12a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>'
      if(src==='booking') return '<svg viewBox="0 0 24 24" fill="#fff"><text x="12" y="17" font-size="15" font-weight="700" text-anchor="middle">B</text></svg>'
      return '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 3l9 7v11h-6v-6H9v6H3V10z"/></svg>'
    }

    const PREF_KEY_D='hs_cal_desktop_prefs'
    function savePrefsD(){ try{ localStorage.setItem(PREF_KEY_D, JSON.stringify({ biens:selectedBiens, months:MONTHS })) }catch(e){} }
    function loadPrefsD(){ try{ return JSON.parse(localStorage.getItem(PREF_KEY_D)||'null') }catch(e){ return null } }

    async function loadData(){
      let all=[]
      try { const r=await api.channel.listProperties(); all=r.properties||[] } catch(e){ showToast('Erreur chargement biens'); }
      BIENS = all.map(mapBien)
      const prefs=loadPrefsD()
      if(prefs && prefs.months){ MONTHS=prefs.months; const ps=document.getElementById('period-select'); if(ps) ps.value=String(MONTHS); buildDays(); renderMonthPills(); renderMonthBand() }
      const editable=b=>b && b.provider!=='beds24'
      if(prefs && Array.isArray(prefs.biens) && prefs.biens.length){ selectedBiens=prefs.biens.filter(id=>{const b=BIENS.find(x=>x.id===id);return editable(b)}) }
      if(!selectedBiens.length && URL_BIEN_ID && editable(BIENS.find(b=>b.id===URL_BIEN_ID))) selectedBiens=[URL_BIEN_ID]
      if(!selectedBiens.length){ const first=BIENS.find(editable); if(first) selectedBiens=[first.id] }
      BIENS.forEach(b=>{ ppConfig[b.id]={included:b.included, extraFee:b.extraFee} })
      renderMultiSelect()
      await reloadInventory()
    }

    async function reloadInventory(){
      if(!selectedBiens.length){ renderBlocks(); return }
      const {start,end}=rangeISO()
      try{
        const r=await api.calendar.load(selectedBiens, start, end)
        ;(selectedBiens).forEach(id=>{ invByBien[id]=(r.inventory&&r.inventory[id])||{} })
        if(r.bookings){ BIENS.forEach(b=>{ if(r.bookings[b.id]) b.resa=mapResa(r.bookings[b.id]) }) }
        if(r.properties){ r.properties.forEach(p=>{ ppConfig[p.id]={included:p.included_guests||p.capacity||1, extraFee:Number(p.extra_guest_fee)||0}
          const bb=BIENS.find(x=>x.id===p.id); if(bb){ bb.base=Number(p.base_price)||bb.base; bb.included=ppConfig[p.id].included; bb.extraFee=ppConfig[p.id].extraFee } }) }
      }catch(e){ showToast('Erreur chargement calendrier') }
      Object.keys(states).forEach(k=>delete states[k])
      renderBlocks()
    }

    buildDays(); renderMonthPills(); renderMonthBand()
    await loadData()
  </script>
</body>
</html>
