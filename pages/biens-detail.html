<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes tarifs et disponibilites - HoteSmart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1d1d1f;
    }
    header {
      background: #fff;
      padding: 16px 24px;
      border-bottom: 1px solid #e5e5e7;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header a.back {
      color: #007aff;
      text-decoration: none;
      font-size: 14px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    main {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .iframe-container {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      flex: 1;
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }
    iframe {
      width: 100%;
      flex: 1;
      border: none;
      min-height: 600px;
    }
    .status {
      padding: 40px;
      text-align: center;
      color: #6e6e73;
      font-size: 14px;
    }
    .status.error {
      color: #ff3b30;
    }
  </style>
</head>
<body>
  <header>
    <a href="/biens" class="back">&larr; Mes biens</a>
    <h1 id="property-name">Tarifs et disponibilites</h1>
  </header>
  <main>
    <div class="iframe-container">
      <div id="status" class="status">Chargement de l'interface...</div>
      <iframe id="channel-frame" style="display:none;" allow="clipboard-read; clipboard-write"></iframe>
    </div>
  </main>

  <script type="module">
    import { getUser } from '/shared/supabase.js'
    import { api } from '/shared/api-client.js'
    import { logger } from '/shared/logger.js'

    const user = await getUser()
    if (!user) {
      window.location.href = '/pages/login.html'
    }

    const statusEl = document.getElementById('status')
    const iframeEl = document.getElementById('channel-frame')
    const titleEl = document.getElementById('property-name')

    // Recuperer l'ID du bien depuis l'URL : /biens/<uuid>
    const pathParts = window.location.pathname.split('/').filter(Boolean)
    const hotesmartPropertyId = pathParts[pathParts.length - 1]

    if (!hotesmartPropertyId || !/^[0-9a-f-]{36}$/i.test(hotesmartPropertyId)) {
      statusEl.textContent = 'Identifiant de bien invalide.'
      statusEl.classList.add('error')
    } else {
      try {
        // 1. Recuperer le token via le backend (qui verifie l'ownership)
        const tokenData = await api.channel.getToken(hotesmartPropertyId)
        const { token, property_id } = tokenData
        if (!token || !property_id) {
          throw new Error('Reponse invalide')
        }

        // 2. Construire l'URL iframe (marque blanche, sans header/footer)
        const baseUrl = 'https://staging.channex.io'
        const params = new URLSearchParams({
          oauth_session_key: token,
          property_id: property_id,
          redirect_to: '/inventory',
          app_mode: 'headless',
          lng: 'en'
        })
        const iframeUrl = baseUrl + '/auth/exchange?' + params.toString()

        // 3. Charger l'iframe
        iframeEl.src = iframeUrl
        iframeEl.style.display = 'block'
        statusEl.style.display = 'none'

        logger.info('biens-detail', 'Iframe chargee', { hotesmartPropertyId })
      } catch (err) {
        logger.error('biens-detail', err.message)
        statusEl.textContent = 'Impossible de charger l\'interface. ' + err.message
        statusEl.classList.add('error')
      }
    }
  </script>
</body>
</html>
