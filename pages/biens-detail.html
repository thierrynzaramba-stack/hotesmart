<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Tarifs et disponibilités</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .iframe-container {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 140px);
      min-height: 600px;
    }
    .iframe-container iframe {
      width: 100%;
      flex: 1;
      border: none;
    }
    .status {
      padding: 40px;
      text-align: center;
      color: var(--text2);
      font-size: 14px;
    }
    .status.error { color: #E24B4A; }
  </style>
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="property-name">📅 Tarifs et disponibilités</div>
        <div class="page-sub"><a href="/biens" style="color:var(--green);text-decoration:none">← Retour à Mes biens</a></div>
      </div>
    </div>
    <div class="content">
      <div class="iframe-container">
        <div id="status" class="status">Chargement de l'interface…</div>
        <iframe id="channel-frame" style="display:none;" allow="clipboard-read; clipboard-write"></iframe>
      </div>
    </div>
  </div>
</div>

<script type="module">
  // [EN SOMMEIL - Option B] La route /biens/:id ouvrait l'iframe Channex (inventaire
  // brut) en auto-load. En beta, tout le detail bien vit sur /biens : on redirige.
  // Le chargement iframe self-service est conserve ci-dessous, commente, pour
  // reactivation post-beta. Aucun chemin appelable ne subsiste ici.
  window.location.replace('/biens')

  /* --- iframe self-service Channex (dormant, ne pas activer sans lever l'option B) ---
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { initErrorHandler } from '/shared/error-handler.js'
  import { api } from '/shared/api-client.js'
  import { logger } from '/shared/logger.js'

  initErrorHandler()
  const session = await requireAuth()
  if (!session) throw new Error('Non authentifié')
  await renderSidebar('biens-detail')

  const statusEl = document.getElementById('status')
  const iframeEl = document.getElementById('channel-frame')

  // Récupérer l'ID du bien depuis l'URL : /biens/<uuid>
  const pathParts = window.location.pathname.split('/').filter(Boolean)
  const hotesmartPropertyId = pathParts[pathParts.length - 1]

  if (!hotesmartPropertyId || !/^[0-9a-f-]{36}$/i.test(hotesmartPropertyId)) {
    statusEl.textContent = 'Identifiant de bien invalide.'
    statusEl.classList.add('error')
  } else {
    try {
      // 1. Récupérer le token via le backend (qui vérifie l'ownership)
      const tokenData = await api.channel.getToken(hotesmartPropertyId)
      const { token, property_id } = tokenData
      if (!token || !property_id) {
        throw new Error('Réponse invalide')
      }

      // 2. Construire l'URL iframe (marque blanche, sans header/footer).
      // La base vient du backend (CHANNEL_APP_BASE) pour suivre la bascule
      // d'environnement sans toucher au front. Fallback temporaire : staging.
      const baseUrl = tokenData.app_base || 'https://staging.channex.io'
      const params = new URLSearchParams({
        oauth_session_key: token,
        property_id: property_id,
        redirect_to: '/inventory',
        app_mode: 'headless',
        lng: 'en'
      })
      const iframeUrl = baseUrl + '/auth/exchange?' + params.toString()

      // 3. Charger l'iframe
      iframeEl.src = iframeUrl
      iframeEl.style.display = 'block'
      statusEl.style.display = 'none'

      logger.info('biens-detail', 'Iframe chargée', { hotesmartPropertyId })
    } catch (err) {
      logger.error('biens-detail', err.message)
      statusEl.textContent = 'Impossible de charger l\'interface. ' + err.message
      statusEl.classList.add('error')
    }
  }
  --- fin dormant --- */
</script>
</body>
</html>
