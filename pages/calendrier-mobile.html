<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#007aff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tarifs" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>Tarifs - HoteSmart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; -webkit-user-select: none; user-select: none; padding-bottom: env(safe-area-inset-bottom); }
    .topbar { background: #fff; padding: calc(12px + env(safe-area-inset-top)) 16px 12px; border-bottom: 1px solid #e5e5e7; position: sticky; top: 0; z-index: 20; }
    .topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-left: 44px; }
    .back { color: #007aff; text-decoration: none; font-size: 15px; white-space: nowrap; }
    .undo-btn { background: #f0f0f0; border: 1px solid #e5e5e7; border-radius: 9px; width: 40px; height: 40px; font-size: 17px; cursor: pointer; }
    .undo-btn:disabled { opacity: 0.35; }
    .selectors { display: flex; gap: 8px; margin-top: 10px; }
    .selectors select { flex: 1; padding: 9px 12px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 14px; background: #fff; font-family: inherit; }
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
    .month-nav button { background: #f0f0f0; border: none; border-radius: 10px; width: 40px; height: 40px; font-size: 18px; cursor: pointer; color: #1d1d1f; }
    .month-nav .month-label { font-size: 17px; font-weight: 700; text-transform: capitalize; }
    main { padding: 12px; }
    .dow-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
    .dow-header div { text-align: center; font-size: 11px; font-weight: 600; color: #86868b; text-transform: uppercase; padding: 4px 0; }
    .dow-header div.we { color: #007aff; }
    .grid { display: flex; flex-direction: column; gap: 4px; }
    .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; position: relative; }
    .cell { aspect-ratio: 1 / 1.15; border-radius: 10px; background: #fff; border: 1px solid #ececef; padding: 4px 3px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; cursor: pointer; position: relative; overflow: hidden; }
    /* barres de reservation en overlay (vue tarifs) */
    .resa-layer { position: absolute; left: 0; right: 0; top: 26px; pointer-events: none; z-index: 3; }
    .resa-bar { position: absolute; height: 22px; border-radius: 11px; display: flex; align-items: center; gap: 4px; padding: 0 6px 0 3px; font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; }
    .resa-bar .ava { width: 17px; height: 17px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .resa-bar .ava svg { width: 11px; height: 11px; }
    .resa-bar.airbnb { background: #d52a44; } .resa-bar.booking { background: #0d4ea6; } .resa-bar.direct { background: #1f6f23; }
    .resa-bar.cont-left { border-top-left-radius: 0; border-bottom-left-radius: 0; padding-left: 8px; }
    .resa-bar.cont-right { border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .cell.empty { background: transparent; border: none; cursor: default; }
    .cell.weekend { background: #f0f4fa; }
    .cell.past { opacity: 0.4; }
    .cell .dnum { font-size: 13px; font-weight: 600; color: #1d1d1f; line-height: 1.1; }
    .cell.today .dnum { background: #007aff; color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .cell .val { font-size: 12px; color: #6e6e73; margin-top: auto; font-weight: 600; }
    .cell .val.small { font-size: 10px; }
    .cell.unavailable { background: #ffeced; border-color: #f8c9cc; }
    .cell.unavailable .val { color: #d52a44; }
    .cell.reserved { background: #dde7f5; border-color: #b9cdec; }
    .cell.reserved.weekend { background: #d2def2; }
    .cell.has-options { background: #fafbfd; }
    .cell.has-options.weekend { background: #eef2f9; }
    .cell.orphan { background: #fff4e5 !important; border-color: #f59e0b; box-shadow: inset 0 0 0 2px #f59e0b; }
    .cell.orphan .alert { position: absolute; top: 3px; right: 3px; font-size: 11px; }
    .loading { text-align: center; padding: 40px; color: #86868b; font-size: 14px; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 14px; font-size: 11px; color: #6e6e73; justify-content: center; }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    /* Bottom sheet */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 100; align-items: flex-end; }
    .sheet-overlay.visible { display: flex; }
    .sheet { background: #fff; border-radius: 18px 18px 0 0; width: 100%; max-height: 88vh; overflow-y: auto; padding: 8px 18px calc(18px + env(safe-area-inset-bottom)); animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-grip { width: 40px; height: 4px; background: #d2d2d7; border-radius: 2px; margin: 8px auto 14px; }
    .sheet h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .sheet .sub { font-size: 13px; color: #6e6e73; margin-bottom: 16px; }
    .sheet-range { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; font-size: 13px; flex-wrap: wrap; }
    .sheet-range input[type=date] { padding: 8px 10px; border: 1px solid #d2d2d7; border-radius: 9px; font-size: 14px; font-family: inherit; flex: 1; }
    .acc { border: 1px solid #ececef; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
    .acc-head { padding: 14px; font-size: 15px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #fff; }
    .acc-head .chev { color: #86868b; transition: transform 0.2s; }
    .acc.open .acc-head .chev { transform: rotate(180deg); }
    .acc-body { display: none; padding: 0 14px 14px; }
    .acc.open .acc-body { display: block; }
    /* prix simplifie : champ + bouton mode discret */
    .price-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .price-row .fld { flex: 1; margin: 0; }
    .mode-btn { background: #f0f0f0; border: 1px solid #d2d2d7; border-radius: 9px; padding: 0 12px; height: 46px; font-size: 13px; font-weight: 600; cursor: pointer; color: #6e6e73; white-space: nowrap; }
    .mode-btn.active-mod { background: #007aff; color: #fff; border-color: #007aff; }
    .adv { font-size: 12px; color: #007aff; cursor: pointer; margin-bottom: 8px; display: inline-block; }
    .adv-box { display: none; gap: 8px; margin-bottom: 10px; }
    .adv-box.open { display: flex; }
    .seg { display: flex; border: 1px solid #d2d2d7; border-radius: 10px; overflow: hidden; flex: 1; }
    .seg button { flex: 1; background: #fff; border: none; padding: 9px; font-size: 13px; cursor: pointer; border-right: 1px solid #d2d2d7; font-weight: 500; color: #6e6e73; }
    .seg button:last-child { border-right: none; }
    .seg button.active { background: #007aff; color: #fff; }
    .fld { width: 100%; padding: 13px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 16px; font-family: inherit; margin-bottom: 10px; }
    .dow-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
    .dow-chips label { flex: 1; min-width: 38px; text-align: center; padding: 8px 0; border: 1px solid #d2d2d7; border-radius: 9px; font-size: 12px; }
    .dow-chips input { display: none; }
    .dow-chips label.on { background: #007aff; color: #fff; border-color: #007aff; }
    .preview { background: #f0f9ff; border: 1px solid #cce4ff; border-radius: 10px; padding: 12px; font-size: 13px; color: #0d4ea6; line-height: 1.6; margin-bottom: 10px; }
    .toggle-avail { display: flex; gap: 8px; }
    .toggle-avail button { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #d2d2d7; background: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
    .toggle-avail button.act-open { background: #1f6f23; color: #fff; border-color: #1f6f23; }
    .toggle-avail button.act-closed { background: #d52a44; color: #fff; border-color: #d52a44; }
    .sheet-foot { position: sticky; bottom: 0; background: #fff; padding-top: 12px; display: flex; gap: 10px; }
    .btn-save { flex: 1; background: #007aff; color: #fff; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .btn-close { background: #f0f0f0; color: #1d1d1f; border: none; border-radius: 12px; padding: 15px 18px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .toast { position: fixed; left: 50%; bottom: calc(20px + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(120%); background: #1d1d1f; color: #fff; padding: 13px 20px; border-radius: 12px; font-size: 14px; z-index: 200; transition: transform 0.25s; max-width: 90%; text-align: center; }
    .toast.visible { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="topbar">
    <div class="topbar-row">
      <span style="font-weight:700;font-size:16px">Tarifs</span>
      <button class="undo-btn" id="btn-undo" disabled>&#8634;</button>
    </div>
    <div class="selectors">
      <select id="bien-select"></select>
      <select id="view-select"></select>
    </div>
    <div class="month-nav">
      <button id="prev-month">&lsaquo;</button>
      <span class="month-label" id="month-label">-</span>
      <button id="next-month">&rsaquo;</button>
    </div>
  </div>

  <main>
    <div class="dow-header"><div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div class="we">Sam</div><div class="we">Dim</div></div>
    <div class="grid" id="grid"><div class="loading">Chargement...</div></div>
    <div class="legend">
      <span><i style="background:#dde7f5"></i> Reserve</span>
      <span><i style="background:#ffeced"></i> Ferme</span>
      <span><i style="background:#f0f4fa"></i> Week-end</span>
      <span><i style="background:#f59e0b"></i> Configure</span>
    </div>
  </main>

  <div class="sheet-overlay" id="sheet-overlay">
    <div class="sheet" id="sheet">
      <div class="sheet-grip"></div>
      <h3 id="sheet-title">Configurer</h3>
      <div class="sub" id="sheet-sub">-</div>
      <div class="sheet-range"><span>Du</span><input type="date" id="r-start" /><span>au</span><input type="date" id="r-end" /></div>
      <div id="acc-list"></div>
      <div class="sheet-foot">
        <button class="btn-close" id="btn-close">Fermer</button>
        <button class="btn-save" id="btn-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { requireAuth } from '/components/auth-guard.js'
    import { renderSidebar } from '/components/sidebar.js'
    import { api } from '/shared/api-client.js'
    const session = await requireAuth()
    if (!session) throw new Error('Non authentifie')
    await renderSidebar('biens-calendrier')
    if ('serviceWorker' in navigator) { try { await navigator.serviceWorker.register('/sw.js') } catch(e){} }

    const monthFull=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre']
    const toISO=(d)=>{ const z=new Date(d.getTime()-d.getTimezoneOffset()*60000); return z.toISOString().slice(0,10) }
    const todayISO=toISO(new Date())

    // Vues disponibles (ce que les cases affichent)
    const VIEWS=[
      { key:'rate', label:'Tarifs' },
      { key:'minStayArr', label:'Min nuits (arrivee)' },
      { key:'minStayThrough', label:'Min nuits (sejour)' },
      { key:'maxStay', label:'Max nuits' },
      { key:'avail', label:'Disponibilite' },
      { key:'cta', label:'Arrivee' },
      { key:'ctd', label:'Depart' }
    ]
    let currentView='rate'

    // --- persistance config (localStorage) ---
    const PREF_KEY='hs_cal_mobile_prefs'
    let orphanAutoFix=false  // reglage global persistant
    function savePrefs(){ try{ localStorage.setItem(PREF_KEY, JSON.stringify({ bienId: currentBien?currentBien.id:null, view: currentView, year: viewYear, month: viewMonth, orphanAutoFix })) }catch(e){} }
    function loadPrefs(){ try{ return JSON.parse(localStorage.getItem(PREF_KEY)||'null') }catch(e){ return null } }

    // Rubriques du sheet (sans stop vente)
    const PARAMS=[
      { key:'rate', label:'Prix de base', type:'price' },
      { key:'perPerson', label:'Prix par personne', type:'perperson' },
      { key:'avail', label:'Disponibilite', type:'avail' },
      { key:'minStayArr', label:'Min nuits (arrivee)', type:'num' },
      { key:'minStayThrough', label:'Min nuits (sejour)', type:'num' },
      { key:'maxStay', label:'Max nuits', type:'num' },
      { key:'cta', label:'Arrivee', type:'openclosed', optOpen:'Autorisee', optClosed:'Bloquee' },
      { key:'ctd', label:'Depart', type:'openclosed', optOpen:'Autorise', optClosed:'Bloque' },
      { key:'orphan', label:'Nuits orphelines', type:'orphan' }
    ]

    let BIENS=[], currentBien=null
    let viewYear, viewMonth
    let inv={}, resaSet=new Set(), resaList=[], ppConfig={included:1,extraFee:0}
    const undoStack=[]

    function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('visible'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('visible'),1900) }

    // selecteur de vue
    const vsel=document.getElementById('view-select')
    VIEWS.forEach(v=>{ const o=document.createElement('option'); o.value=v.key; o.textContent='Vue : '+v.label; vsel.appendChild(o) })
    vsel.addEventListener('change',e=>{ currentView=e.target.value; savePrefs(); renderGrid() })

    async function loadBiens(){
      try{ const r=await api.channel.listProperties(); BIENS=r.properties||[] }catch(e){ showToast('Erreur chargement biens'); BIENS=[] }
      const sel=document.getElementById('bien-select'); sel.innerHTML=''
      BIENS.forEach(b=>{ const o=document.createElement('option'); o.value=b.id; o.textContent=b.name; sel.appendChild(o) })
      const prefs=loadPrefs()
      if(prefs && typeof prefs.orphanAutoFix==='boolean') orphanAutoFix=prefs.orphanAutoFix
      if(BIENS.length){
        // bien : ?bien= dans l'URL (clic Calendrier) prioritaire, sinon pref, sinon premier
        const urlBien = new URLSearchParams(window.location.search).get('bien')
        if(urlBien && BIENS.find(b=>b.id===urlBien)) currentBien=BIENS.find(b=>b.id===urlBien)
        else if(prefs && prefs.bienId && BIENS.find(b=>b.id===prefs.bienId)) currentBien=BIENS.find(b=>b.id===prefs.bienId)
        else currentBien=BIENS[0]
        sel.value=currentBien.id
        // vue
        if(prefs && prefs.view && VIEWS.find(v=>v.key===prefs.view)){ currentView=prefs.view; document.getElementById('view-select').value=currentView }
        // mois
        if(prefs && typeof prefs.year==='number' && typeof prefs.month==='number'){ viewYear=prefs.year; viewMonth=prefs.month }
        else { const now=new Date(); viewYear=now.getFullYear(); viewMonth=now.getMonth() }
        await loadMonth()
      }
      else { document.getElementById('grid').innerHTML='<div class="loading">Aucun bien</div>' }
    }
    document.getElementById('bien-select').addEventListener('change', async e=>{ currentBien=BIENS.find(b=>b.id===e.target.value); savePrefs(); await loadMonth() })

    function monthBounds(){ return { start:toISO(new Date(viewYear,viewMonth,1)), end:toISO(new Date(viewYear,viewMonth+1,0)) } }

    async function loadMonth(){
      if(!currentBien)return
      document.getElementById('month-label').textContent=monthFull[viewMonth]+' '+viewYear
      const {start,end}=monthBounds(); inv={}; resaSet=new Set(); resaList=[]
      try{
        const r=await api.calendar.load([currentBien.id], start, end)
        inv=(r.inventory&&r.inventory[currentBien.id])||{}
        const p=(r.properties||[]).find(x=>x.id===currentBien.id)
        if(p){ ppConfig={included:p.included_guests||p.capacity||1, extraFee:Number(p.extra_guest_fee)||0}; currentBien.base_price=Number(p.base_price)||currentBien.base_price; currentBien.capacity=p.capacity||currentBien.capacity
          // config orphan depuis la base
          orphanAutoFix=!!p.orphan_autofix
          currentBien.orphanPrice={ enabled:!!p.orphan_price_enabled, mode:p.orphan_price_mode||'set', unit:p.orphan_price_unit||'eur', value:(p.orphan_price_value!=null?String(p.orphan_price_value):'') }
        }
        const bk=(r.bookings&&r.bookings[currentBien.id])||[]
        const SRC=['airbnb','booking','direct']
        bk.forEach((b,idx)=>{
          const ci=new Date(b.checkin+'T00:00:00'), co=new Date(b.checkout+'T00:00:00')
          for(let d=new Date(ci); d<co; d.setDate(d.getDate()+1)) resaSet.add(toISO(d))
          // source variee pour la demo (en attendant la vraie source via webhooks)
          const src = SRC[idx % 3]
          resaList.push({ checkin:b.checkin, checkout:b.checkout, name:(b.guest_name||'Reservation'), source:src })
        })
      }catch(e){ showToast('Erreur chargement') }
      renderGrid()
    }

    function rateFor(iso){ const r=inv[iso]; return (r&&r.rate!=null)?Number(r.rate):(Number(currentBien.base_price)||0) }
    function isUnavail(iso){ const r=inv[iso]; return !!(r&&r.stop_sell) }
    function isConfigured(iso){ const r=inv[iso]; if(!r)return false; return (r.min_stay_arrival||r.min_stay_through||r.max_stay||r.cta||r.ctd||r.stop_sell||r.rate!=null) }

    // nb d'options actives sur une date (pour l'epaisseur de l'indicateur)
    function optionCount(iso){ const r=inv[iso]; if(!r)return 0; let n=0; if(r.min_stay_arrival)n++; if(r.min_stay_through)n++; if(r.max_stay)n++; if(r.cta)n++; if(r.ctd)n++; if(r.stop_sell)n++; return n }

    // est-ce une date libre (ni reservee ni fermee) ?
    function isFree(iso){ return !resaSet.has(iso) && !isUnavail(iso) }

    // Detection orphelins : un jour libre est orphelin si AUCUN sejour valide ne peut le couvrir.
    // Un sejour [A,D[ est valide si : tous les jours A..D-1 libres, A sans CTA, D sans CTD,
    // duree (D-A) >= min-stay applicable (max des min_stay_arrival/through concernes, defaut 1).
    function computeOrphans(){
      const orphans=new Set()
      // bornes d'analyse : on etend un peu au-dela du mois pour les sejours a cheval
      const startD=new Date(viewYear,viewMonth,1); startD.setDate(startD.getDate()-10)
      const endD=new Date(viewYear,viewMonth+1,0); endD.setDate(endD.getDate()+10)
      const all=[]
      for(let d=new Date(startD); d<=endD; d.setDate(d.getDate()+1)) all.push(toISO(d))
      const idxOf={}; all.forEach((iso,i)=>idxOf[iso]=i)
      const freeAt=(iso)=> isFree(iso)
      const ctaAt=(iso)=>{ const r=inv[iso]; return !!(r&&r.cta) }
      const ctdAt=(iso)=>{ const r=inv[iso]; return !!(r&&r.ctd) }
      const minStayArrAt=(iso)=>{ const r=inv[iso]; return (r&&r.min_stay_arrival)?r.min_stay_arrival:1 }
      const minStayThroughAt=(iso)=>{ const r=inv[iso]; return (r&&r.min_stay_through)?r.min_stay_through:0 }

      // jours du mois affiche uniquement (ce qu'on colore)
      const monthDays=[]
      const last=new Date(viewYear,viewMonth+1,0).getDate()
      for(let day=1; day<=last; day++) monthDays.push(toISO(new Date(viewYear,viewMonth,day)))

      monthDays.forEach(J=>{
        if(!freeAt(J)) return  // seulement les jours libres
        const jIdx=idxOf[J]; if(jIdx==null) return
        let bookable=false
        // arrivees possibles A : de J en remontant tant que libre (A<=J)
        for(let ai=jIdx; ai>=0 && freeAt(all[ai]); ai--){
          const A=all[ai]
          if(ctaAt(A)) continue           // arrivee bloquee ce jour
          // departs possibles D : strictement apres J, tant que libre ; D doit etre > J
          for(let di=jIdx+1; di<all.length; di++){
            // tous les jours A..di-1 doivent etre libres (on avance tant que libre)
            if(!freeAt(all[di-1])) break
            const D=all[di]
            // D est le jour de depart (peut etre occupe : on part le matin) -> D doit juste ne pas avoir CTD
            if(ctdAt(D)) { continue }
            const nights=di-ai
            if(nights<1) continue
            // min-stay applicable
            let req=minStayArrAt(A)
            for(let k=ai;k<di;k++){ const mt=minStayThroughAt(all[k]); if(mt>req)req=mt }
            if(nights>=req){ bookable=true; break }
          }
          if(bookable) break
        }
        if(!bookable) orphans.add(J)
      })
      return orphans
    }
    let orphanSet=new Set()

    // valeur affichee selon la vue courante
    function cellValue(iso){
      const r=inv[iso]||{}
      switch(currentView){
        case 'rate': return rateFor(iso)+'\u20ac'
        case 'minStayArr': return r.min_stay_arrival>0?('\u{1F319}'+r.min_stay_arrival):''
        case 'minStayThrough': return r.min_stay_through>0?(''+r.min_stay_through+'n'):''
        case 'maxStay': return r.max_stay>0?('max '+r.max_stay):''
        case 'avail': return isUnavail(iso)?'Ferme':'Ouvert'
        case 'cta': return r.cta?'\u274C':''
        case 'ctd': return r.ctd?'\u26D4':''
      }
      return ''
    }

    // logos plateforme (SVG inline, white-label safe)
    function platformLogo(src){
      if(src==='airbnb') return '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2c-1.1 0-2 .7-2.5 1.8C8 6.5 4 15 4 18a4 4 0 0 0 7 2.6A4 4 0 0 0 18 18c0-3-4-11.5-5.5-14.2C12 2.7 11.1 2 12 2zm0 12a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>'
      if(src==='booking') return '<svg viewBox="0 0 24 24" fill="#fff"><text x="12" y="17" font-size="15" font-weight="700" text-anchor="middle">B</text></svg>'
      return '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 3l9 7v11h-6v-6H9v6H3V10z"/></svg>'
    }

    function renderGrid(){
      orphanSet=computeOrphans()
      const grid=document.getElementById('grid'); grid.innerHTML=''
      const first=new Date(viewYear,viewMonth,1)
      let startDow=first.getDay(); startDow=(startDow===0)?6:startDow-1 // Lun=0
      const last=new Date(viewYear,viewMonth+1,0).getDate()
      // construire la liste lineaire des cellules (avec vides en debut)
      const cells=[] // {day|null, iso|null}
      for(let i=0;i<startDow;i++) cells.push({day:null})
      for(let day=1; day<=last; day++){ const d=new Date(viewYear,viewMonth,day); cells.push({day, iso:toISO(d), dow:d.getDay()}) }
      while(cells.length%7!==0) cells.push({day:null})
      const showResa = (currentView==='rate')

      // rendu par semaine
      for(let w=0; w<cells.length/7; w++){
        const slice=cells.slice(w*7,w*7+7)
        const week=document.createElement('div'); week.className='week'
        slice.forEach(c=>{
          const cell=document.createElement('div')
          if(c.day===null){ cell.className='cell empty'; week.appendChild(cell); return }
          cell.className='cell'
          const dow=c.dow
          if(dow===0||dow===6) cell.classList.add('weekend')
          if(c.iso===todayISO) cell.classList.add('today')
          if(c.iso<todayISO) cell.classList.add('past')
          if(isUnavail(c.iso)) cell.classList.add('unavailable')
          else if(resaSet.has(c.iso) && !showResa) cell.classList.add('reserved')
          // indicateur discret : fond legerement teinte si options actives
          const oc=optionCount(c.iso)
          if(oc>0) cell.classList.add('has-options')
          // jour orphelin
          let alertIcon=''
          if(orphanSet.has(c.iso)){ cell.classList.add('orphan'); alertIcon='<span class="alert">\u26A0\uFE0F</span>' }
          const val=cellValue(c.iso)
          const small=(currentView!=='rate')?' small':''
          cell.innerHTML='<span class="dnum">'+c.day+'</span>'+alertIcon+'<span class="val'+small+'">'+val+'</span>'
          cell.addEventListener('click',()=>openSheet(c.iso, orphanSet.has(c.iso)?'orphan':null))
          week.appendChild(cell)
        })
        // overlay barres resa (vue tarifs uniquement)
        if(showResa){
          const layer=document.createElement('div'); layer.className='resa-layer'
          const weekStartISO=slice.find(c=>c.iso)?slice[slice.findIndex(c=>c.iso)].iso:null
          // dates de la semaine (index 0..6 -> iso)
          const isoByCol=slice.map(c=>c.iso)
          resaList.forEach(rz=>{
            // intersection de [checkin, checkout] avec cette semaine, en demi-journees
            // la barre couvre de la moitie du jour d'arrivee a la moitie du jour de depart
            const ci=rz.checkin, co=rz.checkout
            // jours occupes "visuellement" : de checkin a checkout inclus (le depart = demi-journee)
            let segStart=-1, segEnd=-1
            for(let col=0; col<7; col++){
              const iso=isoByCol[col]; if(!iso)continue
              if(iso>=ci && iso<=co){ if(segStart<0)segStart=col; segEnd=col }
            }
            if(segStart<0)return
            const colW=100/7
            const startsHere = (isoByCol[segStart]===ci)   // le jour d'arrivee est dans cette semaine
            const endsHere = (isoByCol[segEnd]===co)        // le jour de depart est dans cette semaine
            const contLeft = !startsHere   // vient de la semaine precedente
            const contRight = !endsHere    // continue la semaine suivante
            // demi-journee : +0.5 case au debut si arrivee ici, -0.5 case a la fin si depart ici
            let leftCol = segStart + (startsHere ? 0.5 : 0)
            let rightCol = segEnd + (endsHere ? 0.5 : 1)   // depart = milieu ; sinon jusqu'au bord droit
            const leftPct=leftCol*colW
            const widthPct=(rightCol-leftCol)*colW
            const bar=document.createElement('div')
            bar.className='resa-bar '+rz.source+(contLeft?' cont-left':'')+(contRight?' cont-right':'')
            bar.style.left='calc('+leftPct+'% + 2px)'
            bar.style.width='calc('+widthPct+'% - 4px)'
            const nameShort = rz.name.length>14?rz.name.slice(0,13)+'.':rz.name
            bar.innerHTML='<span class="ava">'+platformLogo(rz.source)+'</span>'+(contLeft?'':nameShort)
            layer.appendChild(bar)
          })
          week.appendChild(layer)
        }
        grid.appendChild(week)
      }
    }

    document.getElementById('prev-month').addEventListener('click', async ()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--} savePrefs(); await loadMonth() })
    document.getElementById('next-month').addEventListener('click', async ()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++} savePrefs(); await loadMonth() })

    // ---- undo ----
    function pushUndo(){ undoStack.push(JSON.stringify(inv)); document.getElementById('btn-undo').disabled=false }
    document.getElementById('btn-undo').addEventListener('click', async ()=>{
      if(!undoStack.length)return
      // undo local d'affichage (note: ne re-pousse pas au serveur en V1)
      inv=JSON.parse(undoStack.pop()); if(!undoStack.length)document.getElementById('btn-undo').disabled=true
      renderGrid(); showToast('Annule (affichage)')
    })

    let sheetMode='normal'
    const overlay=document.getElementById('sheet-overlay')
    let pending={}, sheetDate=null, forceOpenKey=null
    function defaultDow(){ return {1:true,2:true,3:true,4:true,5:true,6:true,0:true} }
    function openSheet(iso, openKey){
      sheetMode='normal'; sheetDate=iso; pending={}; forceOpenKey=openKey||null
      document.getElementById('sheet-title').textContent='Configurer'
      document.getElementById('sheet-sub').textContent='Date : '+iso
      document.getElementById('r-start').value=iso; document.getElementById('r-end').value=iso
      renderAccordions(); overlay.classList.add('visible')
    }
    function closeSheet(){ overlay.classList.remove('visible') }
    document.getElementById('btn-close').addEventListener('click', closeSheet)
    overlay.addEventListener('click', e=>{ if(e.target===overlay) closeSheet() })

    function dowChipsHtml(pk, dow){ let h='<div class="dow-chips">'; const order=[1,2,3,4,5,6,0]; const lbl={1:'L',2:'M',3:'M',4:'J',5:'V',6:'S',0:'D'}; order.forEach(d=>{ h+='<label class="'+(dow[d]?'on':'')+'" data-pk="'+pk+'" data-dow="'+d+'"><input type="checkbox" '+(dow[d]?'checked':'')+'/>'+lbl[d]+'</label>' }); h+='</div>'; return h }

    function renderAccordions(){
      const wrap=document.getElementById('acc-list'); wrap.innerHTML=''
      // ouvrir : rubrique forcee (clic orphelin) sinon rubrique de la vue courante sinon prix de base
      const openKey = forceOpenKey || (PARAMS.find(p=>p.key===currentView)?currentView:'rate')
      PARAMS.forEach(p=>{
        const acc=document.createElement('div'); acc.className='acc'; acc.dataset.pk=p.key
        let body=''
        if(p.type==='perperson'){
          if(!pending.perPerson)pending.perPerson={included:ppConfig.included,extraFee:ppConfig.extraFee}
          body+='<label style="font-size:13px;font-weight:600">Voyageurs inclus</label><input class="fld" type="number" id="pp-inc" value="'+pending.perPerson.included+'" min="1" max="'+(currentBien.capacity||1)+'"/>'
          body+='<label style="font-size:13px;font-weight:600">Supplement / pers. sup. (EUR)</label><input class="fld" type="number" id="pp-extra" value="'+pending.perPerson.extraFee+'" min="0"/>'
          body+='<div class="preview" id="pp-prev"></div>'
        } else if(p.type==='price'){
          // valeur actuelle pre-remplie (prix de la date cliquee), mode 'modifier' par defaut
          if(!pending[p.key])pending[p.key]={mode:'set',unit:'eur',value:String(rateFor(sheetDate)),dow:defaultDow()}
          const pv=pending[p.key]
          body+=dowChipsHtml(p.key,pv.dow)
          body+='<div class="price-row"><input class="fld" type="number" inputmode="decimal" data-val="'+p.key+'" value="'+pv.value+'"/><button class="mode-btn '+(pv.mode==='set'?'active-mod':'')+'" data-modebtn="'+p.key+'">'+(pv.mode==='set'?'Modifier':(pv.mode==='inc'?'+ Ajouter':'- Soustraire'))+'</button></div>'
          body+='<span class="adv" data-adv="'+p.key+'">Options avancees</span>'
          body+='<div class="adv-box" data-advbox="'+p.key+'"><div class="seg" data-seg="mode" data-pk="'+p.key+'"><button data-v="set" class="'+(pv.mode==='set'?'active':'')+'">Definir</button><button data-v="inc" class="'+(pv.mode==='inc'?'active':'')+'">+</button><button data-v="dec" class="'+(pv.mode==='dec'?'active':'')+'">-</button></div><div class="seg" data-seg="unit" data-pk="'+p.key+'"><button data-v="eur" class="'+(pv.unit==='eur'?'active':'')+'">EUR</button><button data-v="pct" class="'+(pv.unit==='pct'?'active':'')+'">%</button></div></div>'
        } else if(p.type==='num'){
          if(!pending[p.key])pending[p.key]={value:'',dow:defaultDow()}
          const pv=pending[p.key]
          body+=dowChipsHtml(p.key,pv.dow)
          body+='<input class="fld" type="number" inputmode="numeric" placeholder="Nombre de nuits (0=aucune)" data-val="'+p.key+'" value="'+pv.value+'"/>'
        } else if(p.type==='openclosed'){
          if(!pending[p.key])pending[p.key]={value:'keep',dow:defaultDow()}
          const pv=pending[p.key]
          body+=dowChipsHtml(p.key,pv.dow)
          body+='<div class="seg" data-seg="oc" data-pk="'+p.key+'"><button data-v="keep" class="'+(pv.value==='keep'?'active':'')+'">Inchange</button><button data-v="open" class="'+(pv.value==='open'?'active':'')+'">'+p.optOpen+'</button><button data-v="closed" class="'+(pv.value==='closed'?'active':'')+'">'+p.optClosed+'</button></div>'
        } else if(p.type==='avail'){
          if(!pending.avail)pending.avail={value:'keep',dow:defaultDow()}
          const pv=pending.avail
          body+=dowChipsHtml('avail',pv.dow)
          body+='<div class="toggle-avail" data-seg="avail"><button data-v="open" class="'+(pv.value==='open'?'act-open':'')+'">Disponible</button><button data-v="closed" class="'+(pv.value==='closed'?'act-closed':'')+'">Ferme</button></div>'
        } else if(p.type==='orphan'){
          const nb=orphanSet.size
          if(!pending.orphan)pending.orphan={autofix:orphanAutoFix, price:(currentBien.orphanPrice?{...currentBien.orphanPrice}:{enabled:false,mode:'set',unit:'eur',value:''})}
          const o=pending.orphan
          body+='<div style="font-size:12px;color:#92600a;background:#fff4e5;border-radius:8px;padding:10px;margin-bottom:12px">&#9888;&#65039; '+nb+' nuit(s) orpheline(s) ce mois-ci. Ces dates ne peuvent pas etre reservees a cause des contraintes.</div>'
          body+='<label style="display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;margin-bottom:6px"><input type="checkbox" id="o-autofix" '+(o.autofix?'checked':'')+'/> Correction automatique</label>'
          body+='<div style="font-size:12px;color:#6e6e73;margin-bottom:14px">Ajuste le minimum de nuits et leve les blocages arrivee/depart sur les nuits orphelines pour les rendre reservables. Reglage conserve.</div>'
          body+='<label style="display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;margin-bottom:6px"><input type="checkbox" id="o-price-en" '+(o.price.enabled?'checked':'')+'/> Prix special nuits orphelines</label>'
          body+='<div id="o-price-fields" style="display:'+(o.price.enabled?'block':'none')+'"><div class="price-row"><input class="fld" type="number" inputmode="decimal" id="o-price-val" placeholder="Valeur" value="'+o.price.value+'"/></div>'
          body+='<div class="seg" id="o-price-mode"><button data-v="set" class="'+(o.price.mode==='set'?'active':'')+'">Definir</button><button data-v="inc" class="'+(o.price.mode==='inc'?'active':'')+'">+</button><button data-v="dec" class="'+(o.price.mode==='dec'?'active':'')+'">-</button></div>'
          body+='<div class="seg" id="o-price-unit" style="margin-top:8px"><button data-v="eur" class="'+(o.price.unit==='eur'?'active':'')+'">EUR</button><button data-v="pct" class="'+(o.price.unit==='pct'?'active':'')+'">%</button></div></div>'
        }
        acc.innerHTML='<div class="acc-head">'+p.label+(p.key==='orphan'&&orphanSet.size>0?'<span style="background:#f59e0b;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px">'+orphanSet.size+'</span>':'')+'<span class="chev">&#9662;</span></div><div class="acc-body">'+body+'</div>'
        if(p.key===openKey) acc.classList.add('open')
        wrap.appendChild(acc)
      })
      bindAccordion()
    }

    function bindAccordion(){
      const wrap=document.getElementById('acc-list')
      wrap.querySelectorAll('.acc-head').forEach(h=>h.addEventListener('click',()=>h.parentElement.classList.toggle('open')))
      wrap.querySelectorAll('.dow-chips label').forEach(l=>l.addEventListener('click',e=>{ e.preventDefault(); const pk=l.dataset.pk, dw=parseInt(l.dataset.dow,10); pending[pk].dow[dw]=!pending[pk].dow[dw]; l.classList.toggle('on') }))
      // options avancees prix
      wrap.querySelectorAll('.adv').forEach(a=>a.addEventListener('click',()=>{ const box=wrap.querySelector('.adv-box[data-advbox="'+a.dataset.adv+'"]'); box.classList.toggle('open') }))
      wrap.querySelectorAll('.seg').forEach(seg=>{ const type=seg.dataset.seg, pk=seg.dataset.pk; seg.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ seg.querySelectorAll('button').forEach(x=>x.classList.remove('active')); const v=b.dataset.v; b.classList.add('active'); if(type==='mode'){pending[pk].mode=v; const mb=wrap.querySelector('.mode-btn[data-modebtn="'+pk+'"]'); if(mb){mb.textContent=(v==='set'?'Modifier':(v==='inc'?'+ Ajouter':'- Soustraire')); mb.classList.toggle('active-mod',v==='set')}} else if(type==='unit'){pending[pk].unit=v} else if(type==='oc'){pending[pk].value=v} })) })
      wrap.querySelectorAll('.toggle-avail button').forEach(b=>b.addEventListener('click',()=>{ const p=b.parentElement; p.querySelectorAll('button').forEach(x=>x.classList.remove('act-open','act-closed')); const v=b.dataset.v; pending.avail.value=v; b.classList.add(v==='open'?'act-open':'act-closed') }))
      // bouton mode discret (cycle modifier -> + -> -)
      wrap.querySelectorAll('.mode-btn').forEach(mb=>mb.addEventListener('click',()=>{ const pk=mb.dataset.modebtn; const cur=pending[pk].mode; const next=cur==='set'?'inc':(cur==='inc'?'dec':'set'); pending[pk].mode=next; mb.textContent=(next==='set'?'Modifier':(next==='inc'?'+ Ajouter':'- Soustraire')); mb.classList.toggle('active-mod',next==='set'); const seg=wrap.querySelector('.seg[data-seg="mode"][data-pk="'+pk+'"]'); if(seg){seg.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x.dataset.v===next))} }))
      wrap.querySelectorAll('input[data-val]').forEach(inp=>inp.addEventListener('input',e=>{ pending[e.target.dataset.val].value=e.target.value }))
      const ppi=wrap.querySelector('#pp-inc'), ppe=wrap.querySelector('#pp-extra')
      if(ppi&&ppe){ const upd=()=>{ pending.perPerson={included:parseInt(ppi.value,10)||currentBien.capacity, extraFee:parseFloat(ppe.value)||0}; let l='Base '+(currentBien.base_price||0)+' EUR :<br>'; for(let pr=pending.perPerson.included+1;pr<=(currentBien.capacity||1);pr++){ l+=pr+'e pers : '+((currentBien.base_price||0)+(pr-pending.perPerson.included)*pending.perPerson.extraFee)+' EUR<br>' } if(pending.perPerson.extraFee===0)l+='(aucun supplement)'; wrap.querySelector('#pp-prev').innerHTML=l }; ppi.addEventListener('input',upd); ppe.addEventListener('input',upd); upd() }
      // rubrique orphan
      const oaf=wrap.querySelector('#o-autofix')
      if(oaf){ oaf.addEventListener('change',e=>{ pending.orphan.autofix=e.target.checked }) }
      const open=wrap.querySelector('#o-price-en')
      if(open){ open.addEventListener('change',e=>{ pending.orphan.price.enabled=e.target.checked; wrap.querySelector('#o-price-fields').style.display=e.target.checked?'block':'none' }) }
      const opv=wrap.querySelector('#o-price-val'); if(opv) opv.addEventListener('input',e=>{ pending.orphan.price.value=e.target.value })
      const om=wrap.querySelector('#o-price-mode'); if(om) om.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ pending.orphan.price.mode=b.dataset.v; om.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b)) }))
      const ou=wrap.querySelector('#o-price-unit'); if(ou) ou.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ pending.orphan.price.unit=b.dataset.v; ou.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b)) }))
    }

    document.getElementById('btn-save').addEventListener('click', async ()=>{
      if(!currentBien)return
      const sISO=document.getElementById('r-start').value, eISO=document.getElementById('r-end').value
      const segments=[]
      if(pending.perPerson) segments.push({ kind:'perPerson', included:pending.perPerson.included, extra_guest_fee:pending.perPerson.extraFee })
      const computeFinal=(cur,mode,unit,val)=>{ if(isNaN(val))return cur; if(mode==='set')return unit==='pct'?Math.round(cur*(1+val/100)):val; if(mode==='inc')return unit==='pct'?Math.round(cur*(1+val/100)):cur+val; return unit==='pct'?Math.round(cur*(1-val/100)):cur-val }
      // --- rubrique nuits orphelines ---
      if(pending.orphan){
        const o=pending.orphan
        orphanAutoFix=!!o.autofix
        // persister la config en base (properties)
        segments.push({ kind:'orphanConfig', orphan_autofix:o.autofix, orphan_price_enabled:o.price.enabled, orphan_price_mode:o.price.mode, orphan_price_unit:o.price.unit, orphan_price_value:(o.price.value!==''?o.price.value:null) })
        // appliquer la correction aux orphelines actuelles si autofix
        if(o.autofix && orphanSet.size){
          [...orphanSet].sort().forEach(iso=>{
            const seg={ date_from:iso, date_to:iso, days:[], min_stay_arrival:1, min_stay_through:0, cta:false, ctd:false, stop_sell:false }
            if(o.price.enabled && o.price.value!=='' && !isNaN(parseFloat(o.price.value))){ seg.rate=computeFinal(rateFor(iso),o.price.mode,o.price.unit,parseFloat(o.price.value)) }
            segments.push(seg)
          })
        }
      }
      PARAMS.forEach(p=>{
        if(p.type==='perperson')return
        const pv=pending[p.key]; if(!pv)return
        const daysArr=[]; for(const k in pv.dow){ if(pv.dow[k]) daysArr.push(parseInt(k,10)) }
        if(p.type==='price'){
          if(pv.value===''||isNaN(parseFloat(pv.value)))return
          if(pv.mode==='set'&&pv.unit==='eur'){ segments.push({date_from:sISO,date_to:eISO,days:daysArr,rate:parseFloat(pv.value)}) }
          else { const d=new Date(sISO+'T00:00:00'), last=new Date(eISO+'T00:00:00'); while(d<=last){ const dow=d.getDay(); if(!daysArr.length||daysArr.includes(dow)){ const iso=toISO(d); segments.push({date_from:iso,date_to:iso,rate:computeFinal(rateFor(iso),pv.mode,pv.unit,parseFloat(pv.value))}) } d.setDate(d.getDate()+1) } }
        } else if(p.type==='num'){ if(pv.value==='')return; const seg={date_from:sISO,date_to:eISO,days:daysArr}; if(p.key==='minStayArr')seg.min_stay_arrival=parseInt(pv.value,10)||0; else if(p.key==='minStayThrough')seg.min_stay_through=parseInt(pv.value,10)||0; else if(p.key==='maxStay')seg.max_stay=parseInt(pv.value,10)||0; segments.push(seg) }
        else if(p.type==='openclosed'){ if(pv.value==='keep')return; const seg={date_from:sISO,date_to:eISO,days:daysArr}; if(p.key==='cta')seg.cta=(pv.value==='closed'); else if(p.key==='ctd')seg.ctd=(pv.value==='closed'); segments.push(seg) }
        else if(p.type==='avail'){ if(pv.value==='keep')return; segments.push({date_from:sISO,date_to:eISO,days:daysArr,stop_sell:(pv.value==='closed')}) }
      })
      if(!segments.length){ showToast('Aucune modification'); return }
      pushUndo()
      showToast('Enregistrement...')
      try{ const resp=await api.calendar.save(currentBien.id, segments); showToast(resp&&resp.warnings&&resp.warnings.length?'Enregistre ('+resp.warnings.length+' alerte)':'Enregistre'); closeSheet(); await loadMonth() }
      catch(err){ showToast('Erreur: '+(err.message||'sauvegarde')) }
    })

    await loadBiens()
  </script>
