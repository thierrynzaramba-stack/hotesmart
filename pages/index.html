<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-url" content="https://cjmrizpdyhrcurmgyrhs.supabase.co">
  <meta name="supabase-key" content="sb_publishable_cCOixH5aKHWUq5OzNPX7qw_ub0RQ5rD>
  <title>HôteSmart — Dashboard</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="welcome">Bonjour !</div>
        <div class="page-sub" id="status">Chargement...</div>
      </div>
    </div>

    <div class="content">

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Revenus ce mois</div>
          <div class="metric-value" id="stat-revenus">—</div>
          <div class="metric-delta"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Taux d'occupation</div>
          <div class="metric-value" id="stat-occupation">—</div>
          <div class="metric-delta"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Messages traités</div>
          <div class="metric-value" id="stat-messages">0</div>
          <div class="metric-delta">par l'Agent AI</div>
        </div>
        <div class="metric">
          <div class="metric-label">Note moyenne</div>
          <div class="metric-value" id="stat-note">—</div>
          <div class="metric-delta"></div>
        </div>
      </div>

      <div class="section-title">Mes apps</div>
      <div class="apps-grid" id="apps-grid">
        <div class="app-card">Chargement...</div>
      </div>

      <div class="section-title">Derniers messages traités</div>
      <div class="card" id="messages-list">
        <div class="msg-row">
          <div style="font-size:12px;color:var(--text2)">Aucun message pour l'instant</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { getUser } from '/shared/supabase.js'
  import CONFIG from '/shared/config.js'

  async function init() {
    const session = await requireAuth()
    if (!session) return

    const user = await getUser()

    await renderSidebar('accueil')

    const name = user?.user_metadata?.full_name || user?.email?.split('@')[0] || 'là'
    document.getElementById('welcome').textContent = `Bonjour ${name} !`
    document.getElementById('status').textContent = 'Bienvenue sur HôteSmart'

    renderApps()
  }

  function renderApps() {
    const grid = document.getElementById('apps-grid')
    grid.innerHTML = CONFIG.apps.map(app => `
      <a class="app-card" href="/apps/${app.id}">
        <div class="app-icon" style="background:${app.color}">${app.icon}</div>
        <div class="app-name">${app.name}</div>
        <div class="app-desc">Cliquez pour configurer</div>
        <div class="app-status status-off">○ Inactif</div>
      </a>
    `).join('')
  }

  init()
</script>

</body>
</html>
