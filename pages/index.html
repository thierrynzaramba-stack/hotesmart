<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Dashboard</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="welcome">Bonjour !</div>
        <div class="page-sub" id="status">Chargement...</div>
      </div>
    </div>

    <div class="content">

      <div class="section-title">Mes biens</div>
      <div class="apps-grid" id="properties-grid">
        <div class="app-card">Chargement...</div>
      </div>

      <div class="section-title">Mes apps</div>
      <div class="apps-grid" id="apps-grid">
        <div class="app-card">Chargement...</div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { getUser, supabase } from '/shared/supabase.js'
  import CONFIG from '/shared/config.js'
  import { initErrorHandler } from '/shared/error-handler.js'
  import { logger } from '/shared/logger.js'

  initErrorHandler()

  async function init() {
    try {
      const session = await requireAuth()
      if (!session) return

      const user = await getUser()
      logger.info('Dashboard', 'Connecté', { email: user?.email })

      await renderSidebar('accueil')

      const name = user?.user_metadata?.full_name || user?.email?.split('@')[0] || 'là'
      document.getElementById('welcome').textContent = `Bonjour ${name} !`

      // Charge les propriétés Beds24
      await loadProperties(session)

      // Charge les apps
      renderApps()

    } catch (err) {
      logger.error('Dashboard', err.message, err)
    }
  }

  async function loadProperties(session) {
    try {
      const res = await fetch('/api/beds24', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ action: 'getProperties' })
      })

      const data = await res.json()

      if (data.properties && data.properties.length > 0) {
        document.getElementById('status').textContent = `${data.properties.length} bien(s) connecté(s) via Beds24`

        const grid = document.getElementById('properties-grid')
        grid.innerHTML = data.properties.map(p => `
          <div class="app-card">
            <div class="app-icon" style="background:#E1F5EE">🏠</div>
            <div class="app-name">${p.name}</div>
            <div class="app-desc">${p.address}, ${p.city}</div>
            <div class="app-desc" style="margin-top:4px">Check-in : ${p.checkInStart} · Check-out : ${p.checkOutEnd}</div>
            <div class="app-status status-on">● Connecté</div>
          </div>
        `).join('')

        logger.info('Dashboard', `${data.properties.length} propriétés chargées`)
      } else {
        document.getElementById('properties-grid').innerHTML = '<div class="app-card"><div class="app-desc">Aucun bien trouvé — configurez votre clé Beds24</div></div>'
        document.getElementById('status').textContent = 'Beds24 non configuré'
      }
    } catch (err) {
      logger.error('Dashboard', 'Erreur chargement propriétés', err)
    }
  }

  function renderApps() {
    const grid = document.getElementById('apps-grid')
    grid.innerHTML = CONFIG.apps.filter(app => app.active !== false).map(app => `
      <a class="app-card" href="/apps/${app.id}">
        <div class="app-icon" style="background:${app.color}">${app.icon}</div>
        <div class="app-name">${app.name}</div>
        <div class="app-desc">Cliquez pour configurer</div>
        <div class="app-status status-off">○ Inactif</div>
      </a>
    `).join('')
  }

  init()
</script>

</body>
</html>
