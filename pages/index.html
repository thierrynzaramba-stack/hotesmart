<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Dashboard</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="welcome">Bonjour !</div>
        <div class="page-sub" id="status">Chargement...</div>
      </div>
    </div>

    <div class="content">

      <div class="section-header">
        <div class="section-title">Mes biens</div>
        <a href="/biens/nouveau" class="btn btn-primary">+ Ajouter un bien</a>
      </div>
      <div class="apps-grid" id="properties-grid">
        <div class="app-card">Chargement...</div>
      </div>

      <div class="section-title">Mes apps</div>
      <div class="apps-grid" id="apps-grid">
        <div class="app-card">Chargement...</div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { getUser, supabase } from '/shared/supabase.js'
  import CONFIG from '/shared/config.js'
  import { initErrorHandler } from '/shared/error-handler.js'
  import { logger } from '/shared/logger.js'
  import {
    loadAllProperties, provenanceBadge, hydrateChannelBadges, escapeHtml
  } from '/shared/properties.js'

  initErrorHandler()

  async function init() {
    try {
      const session = await requireAuth()
      if (!session) return

      const user = await getUser()
      logger.info('Dashboard', 'Connecté', { email: user?.email })

      await renderSidebar('accueil')

      const name = user?.user_metadata?.full_name || user?.email?.split('@')[0] || 'là'
      document.getElementById('welcome').textContent = `Bonjour ${name} !`

      // Charge les biens (Beds24 + channel manager)
      await loadProperties()

      // Charge les apps
      renderApps()

    } catch (err) {
      logger.error('Dashboard', err.message, err)
    }
  }

  // Carte compacte de l'accueil. Le chrome differe de /pages/biens (.app-card vs
  // .property-card, pas de boutons d'action ici) ; seules la SOURCE des biens et
  // les badges sont partages, via /shared/properties.js.
  function renderPropertyCard(p) {
    const card = document.createElement('div')
    card.className = 'app-card'

    // Beds24 expose address/city + horaires ; le channel manager expose city/country.
    const location = p._source === 'beds24'
      ? [p.address, p.city].filter(Boolean).join(', ')
      : [p.city, p.country].filter(Boolean).join(', ')

    const hours = (p.checkInStart && p.checkOutEnd)
      ? `<div class="app-desc" style="margin-top:4px">Check-in : ${escapeHtml(p.checkInStart)} · Check-out : ${escapeHtml(p.checkOutEnd)}</div>`
      : ''

    card.innerHTML = `
      <div class="app-icon" style="background:#E1F5EE">🏠</div>
      <div class="app-name">${escapeHtml(p.name)}</div>
      <div class="app-desc">${escapeHtml(location)}</div>
      ${hours}
      <span class="badge">${escapeHtml(provenanceBadge(p))}</span>
      <div class="channel-badges" data-channels></div>
    `
    return card
  }

  async function loadProperties() {
    const grid = document.getElementById('properties-grid')
    const status = document.getElementById('status')

    try {
      const { properties, allFailed } = await loadAllProperties()

      if (allFailed) {
        grid.innerHTML = '<div class="app-card"><div class="app-desc">Erreur de chargement des biens.</div></div>'
        status.textContent = 'Chargement impossible'
        return
      }

      if (!properties.length) {
        // Le bouton "Ajouter un bien" de l'en-tete reste le seul point d'entree.
        grid.innerHTML = '<div class="app-card"><div class="app-desc">Aucun bien pour le moment.</div></div>'
        status.textContent = 'Aucun bien'
        return
      }

      // Libelle neutre : l'accueil ne parle plus de Beds24, les deux backends coexistent.
      status.textContent = `${properties.length} bien(s)`

      grid.innerHTML = ''
      for (const p of properties) {
        const card = renderPropertyCard(p)
        grid.appendChild(card)
        // Canaux charges en differe : la carte s'affiche sans attendre Channex.
        hydrateChannelBadges(p, card.querySelector('[data-channels]'))
      }
    } catch (err) {
      logger.error('Dashboard', 'Erreur chargement biens', err)
      grid.innerHTML = '<div class="app-card"><div class="app-desc">Erreur de chargement des biens.</div></div>'
    }
  }

  function renderApps() {
    const grid = document.getElementById('apps-grid')
    // Pas de ligne de statut ici : elle etait ecrite en dur ("○ Inactif") et
    // affichait donc Inactif pour toutes les apps, y compris celles utilisees.
    // `app.active` ne mesure pas l'usage, il dit si l'app est livree (filtre
    // du catalogue ci-dessous). Un vrai indicateur (plutot "configure / a
    // parametrer", pour l'onboarding) demandera une source d'usage par app.
    grid.innerHTML = CONFIG.apps.filter(app => app.active !== false).map(app => `
      <a class="app-card" href="/apps/${app.id}">
        <div class="app-icon" style="background:${app.color}">${app.icon}</div>
        <div class="app-name">${app.name}</div>
        <div class="app-desc">Cliquez pour configurer</div>
      </a>
    `).join('')
  }

  init()
</script>

</body>
</html>
