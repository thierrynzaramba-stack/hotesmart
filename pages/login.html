<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-url" content="https://cjmrizpdyhrcurmgyrhs.supabase.co">
  <meta name="supabase-key" content="sb_publishable_cCOixH5aKHWUq5OzNPX7qw_ub0RQ5rD">
  <title>HôteSmart — Connexion</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg2); }
    .login-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 380px; }
    .login-logo { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
    .error { font-size: 12px; color: #E24B4A; margin-top: 12px; display: none; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 0.5px solid var(--border); }
    .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--text); border-bottom-color: var(--green); font-weight: 500; }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">HôteSmart</div>
  <div class="login-sub">Gérez votre location courte durée</div>

  <div class="tabs">
    <div class="tab active">Connexion</div>
    <div class="tab">Inscription</div>
  </div>

  <div id="form-login">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="login-email" placeholder="vous@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input class="form-input" type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%" id="btn-login">Se connecter</button>
    <div class="error" id="login-error"></div>
    <div style="text-align:center;margin-top:14px"><a href="/pages/forgot-password.html" style="font-size:12px;color:var(--text2);text-decoration:none">Mot de passe oublié ?</a></div>
  </div>

  <div id="form-register" style="display:none">
    <div class="form-group">
      <label class="form-label">Prénom</label>
      <input class="form-input" type="text" id="reg-first-name" placeholder="Thierry">
    </div>
    <div class="form-group">
      <label class="form-label">Nom</label>
      <input class="form-input" type="text" id="reg-last-name" placeholder="Dupont">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="reg-email" placeholder="vous@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input class="form-input" type="password" id="reg-password" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label class="form-label">Société <span style="color:var(--text2);font-weight:400">(optionnel)</span></label>
      <input class="form-input" type="text" id="reg-company" placeholder="Ma conciergerie">
    </div>
    <div class="form-group">
      <label class="form-label">Sur combien de biens HôteSmart peut vous aider ?</label>
      <input class="form-input" type="number" id="reg-property-count" min="1" placeholder="1">
    </div>
    <div class="form-group">
      <label class="form-label">Qu'attendez-vous d'HôteSmart ?</label>
      <div id="reg-expectations" style="display:flex;flex-direction:column;gap:8px;margin-top:6px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" value="revenus"> Augmenter mes revenus</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" value="ia_voyageurs"> Une IA qui répond à mes voyageurs</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" value="menages"> Gérer les ménages</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" value="arrivees"> Automatiser les arrivées (codes d'accès, instructions)</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" value="calendriers"> Centraliser mes calendriers</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" value="gain_temps"> Gagner du temps au quotidien</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" value="multi_biens"> Piloter plusieurs biens facilement</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:400;cursor:pointer"><input type="checkbox" value="autre" id="reg-exp-autre"> Autre :</label>
        <input class="form-input" type="text" id="reg-expectations-other" placeholder="Précisez…" style="display:none">
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%" id="btn-register">Créer mon compte</button>
    <div class="error" id="reg-error"></div>
  </div>
</div>

<script type="module">
  import { supabase, getSession } from '/shared/supabase.js'

  const session = await getSession()
  if (session) window.location.href = '/pages/index.html'

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      this.classList.add('active')
      const isLogin = this.textContent.trim() === 'Connexion'
      document.getElementById('form-login').style.display = isLogin ? 'block' : 'none'
      document.getElementById('form-register').style.display = isLogin ? 'none' : 'block'
    })
  })

  document.getElementById('btn-login').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value
    const password = document.getElementById('login-password').value
    const err = document.getElementById('login-error')
    const { error } = await supabase.auth.signInWithPassword({ email, password })
    if (error) {
      err.textContent = 'Email ou mot de passe incorrect'
      err.style.display = 'block'
    } else {
      window.location.href = '/pages/index.html'
    }
  })

  document.getElementById('reg-exp-autre').addEventListener('change', function() {
    document.getElementById('reg-expectations-other').style.display = this.checked ? 'block' : 'none'
  })

  document.getElementById('btn-register').addEventListener('click', async () => {
    const firstName = document.getElementById('reg-first-name').value.trim()
    const lastName = document.getElementById('reg-last-name').value.trim()
    const email = document.getElementById('reg-email').value
    const password = document.getElementById('reg-password').value
    const company = document.getElementById('reg-company').value.trim()
    const propertyCount = parseInt(document.getElementById('reg-property-count').value, 10)
    const expectations = Array.from(document.querySelectorAll('#reg-expectations input[type=checkbox]:checked')).map(c => c.value)
    const expectationsOther = document.getElementById('reg-expectations-other').value.trim()
    const err = document.getElementById('reg-error')

    if (!firstName || !lastName) { err.textContent = 'Prénom et nom requis'; err.style.display = 'block'; return }
    if (!propertyCount || propertyCount < 1) { err.textContent = 'Indiquez le nombre de biens (min. 1)'; err.style.display = 'block'; return }

    const { error } = await supabase.auth.signUp({
      email, password,
      options: { data: {
        first_name: firstName,
        last_name: lastName,
        full_name: `${firstName} ${lastName}`,
        company: company || null,
        property_count: propertyCount,
        expectations,
        expectations_other: expectations.includes('autre') ? (expectationsOther || null) : null
      } }
    })
    if (error) {
      err.textContent = error.message
      err.style.display = 'block'
    } else {
      window.location.href = '/pages/index.html'
    }
  })
</script>

</body>
</html>
