<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes biens - HoteSmart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      color: #1d1d1f;
    }
    header {
      background: #fff;
      padding: 16px 24px;
      border-bottom: 1px solid #e5e5e7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .actions { display: flex; gap: 8px; }
    .btn-primary {
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #1d1d1f;
      border: 1px solid #e5e5e7;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    .empty-state {
      background: #fff;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .empty-state h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    .empty-state p {
      color: #6e6e73;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .property-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .property-card h3 {
      font-size: 16px;
      font-weight: 600;
    }
    .property-card .meta {
      font-size: 13px;
      color: #6e6e73;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .property-card .actions {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .loader {
      text-align: center;
      padding: 48px;
      color: #6e6e73;
    }
    .badge {
      display: inline-block;
      background: #f0f0f0;
      color: #6e6e73;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mes biens</h1>
    <div class="actions">
      <a href="/biens/nouveau" class="btn-primary">+ Ajouter un bien</a>
    </div>
  </header>
  <main>
    <div id="loader" class="loader">Chargement...</div>
    <div id="empty" class="empty-state" style="display:none;">
      <h2>Aucun bien pour l'instant</h2>
      <p>Ajoutez votre premier bien pour commencer a gerer vos tarifs et vos reservations.</p>
      <a href="/biens/nouveau" class="btn-primary">+ Ajouter mon premier bien</a>
    </div>
    <div id="grid" class="grid" style="display:none;"></div>
  </main>

  <script type="module">
    import { getUser } from '/shared/supabase.js'
    import { api } from '/shared/api-client.js'
    import { logger } from '/shared/logger.js'

    const user = await getUser()
    if (!user) {
      window.location.href = '/pages/login.html'
    }

    const loader = document.getElementById('loader')
    const empty = document.getElementById('empty')
    const grid = document.getElementById('grid')

    function escapeHtml(s) {
      if (s == null) return ''
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]))
    }

    function renderProperty(p) {
      const card = document.createElement('div')
      card.className = 'property-card'
      const cityLine = p.city ? `<span>${escapeHtml(p.city)}, ${escapeHtml(p.country || 'FR')}</span>` : ''
      card.innerHTML = `
        <div>
          <h3>${escapeHtml(p.name)}</h3>
          <span class="badge">${escapeHtml(p.provider || 'channex')}</span>
        </div>
        <div class="meta">
          ${cityLine}
          <span>Capacite : ${escapeHtml(p.capacity)} personne(s)</span>
          <span>Devise : ${escapeHtml(p.currency || 'EUR')}</span>
        </div>
        <div class="actions">
          <a href="/biens/${p.id}/calendrier" class="btn-secondary">Calendrier</a>
          <a href="/biens/${p.id}" class="btn-secondary">Gerer les tarifs</a>
        </div>
      `
      return card
    }

    try {
      const result = await api.channel.listProperties()
      const properties = result.properties || []
      logger.info('biens', `${properties.length} biens charges`)

      loader.style.display = 'none'

      if (properties.length === 0) {
        empty.style.display = 'block'
      } else {
        grid.style.display = 'grid'
        for (const p of properties) {
          grid.appendChild(renderProperty(p))
        }
      }
    } catch (err) {
      logger.error('biens', err.message)
      loader.textContent = 'Erreur de chargement : ' + err.message
    }
  </script>
</body>
</html>
