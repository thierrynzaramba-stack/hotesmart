<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Mes biens</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .biens-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .property-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .property-card h3 { font-size: 15px; font-weight: 600; color: var(--text); }
    .property-card .meta {
      font-size: 13px;
      color: var(--text2);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .property-card .card-actions {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      background: var(--bg2);
      color: var(--text2);
      border: 0.5px solid var(--border);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 4px;
    }
    .empty-state {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 24px;
      text-align: center;
    }
    .empty-state h2 { font-size: 17px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
    .loader { text-align: center; padding: 48px; color: var(--text2); }
  </style>
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">🏠 Mes biens</div>
        <div class="page-sub">Gérez vos logements, tarifs et calendriers</div>
      </div>
      <a href="/biens/nouveau" class="btn btn-primary">+ Ajouter un bien</a>
    </div>
    <div class="content">
      <div id="loader" class="loader">Chargement…</div>
      <div id="empty" class="empty-state" style="display:none;">
        <h2>Aucun bien pour l'instant</h2>
        <p>Ajoutez votre premier bien pour commencer à gérer vos tarifs et vos réservations.</p>
        <a href="/biens/nouveau" class="btn btn-primary">+ Ajouter mon premier bien</a>
      </div>
      <div id="grid" class="biens-grid" style="display:none;"></div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/components/auth-guard.js'
  import { renderSidebar } from '/components/sidebar.js'
  import { initErrorHandler } from '/shared/error-handler.js'
  import { api } from '/shared/api-client.js'
  import { logger } from '/shared/logger.js'

  initErrorHandler()
  const session = await requireAuth()
  if (!session) throw new Error('Non authentifié')
  await renderSidebar('biens')

  const loader = document.getElementById('loader')
  const empty  = document.getElementById('empty')
  const grid   = document.getElementById('grid')

  function escapeHtml(s) {
    if (s == null) return ''
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]))
  }

  // Libellé provider en marque blanche : jamais le nom technique du gestionnaire.
  function providerLabel(provider) {
    if (provider === 'beds24') return 'Beds24'
    return 'HôteSmart'
  }

  function renderProperty(p) {
    const card = document.createElement('div')
    card.className = 'property-card'
    const cityLine = p.city ? `<span>${escapeHtml(p.city)}, ${escapeHtml(p.country || 'FR')}</span>` : ''
    card.innerHTML = `
      <div>
        <h3>${escapeHtml(p.name)}</h3>
        <span class="badge">${providerLabel(p.provider)}</span>
      </div>
      <div class="meta">
        ${cityLine}
        <span>Capacité : ${escapeHtml(p.capacity)} personne(s)</span>
        <span>Devise : ${escapeHtml(p.currency || 'EUR')}</span>
      </div>
      <div class="card-actions">
        <a href="/biens/${p.id}/calendrier" class="btn">Calendrier</a>
        <a href="/biens/${p.id}" class="btn">Gérer les tarifs</a>
      </div>
    `
    return card
  }

  try {
    const result = await api.channel.listProperties()
    const properties = result.properties || []
    logger.info('biens', `${properties.length} biens chargés`)

    loader.style.display = 'none'

    if (properties.length === 0) {
      empty.style.display = 'block'
    } else {
      grid.style.display = 'grid'
      for (const p of properties) {
        grid.appendChild(renderProperty(p))
      }
    }
  } catch (err) {
    logger.error('biens', err.message)
    loader.textContent = 'Erreur de chargement : ' + err.message
  }
</script>
</body>
</html>
