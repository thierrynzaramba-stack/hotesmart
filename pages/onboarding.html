<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HôteSmart — Configuration</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --primary: #C97B5C;
      --primary-dark: #A85F44;
      --primary-light: #F4E4DC;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --border: #e5e5e5;
      --bg: #fafaf7;
      --bg-card: #ffffff;
      --success: #4a9d6e;
      --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .ob-shell { max-width: 880px; margin: 0 auto; padding: 32px 24px 64px; }
    .ob-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .ob-logo { font-weight: 700; font-size: 20px; color: var(--primary); letter-spacing: -0.02em; }
    .ob-logout { font-size: 14px; color: var(--text-muted); text-decoration: none; padding: 6px 12px; border-radius: 6px; }
    .ob-logout:hover { background: var(--border); }
    .ob-stepper { display: flex; gap: 6px; margin-bottom: 32px; flex-wrap: wrap; }
    .ob-step-dot { flex: 1; min-width: 32px; height: 4px; background: var(--border); border-radius: 2px; transition: background 0.2s; }
    .ob-step-dot.done, .ob-step-dot.active { background: var(--primary); }
    .ob-step-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
    .ob-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 40px; box-shadow: var(--shadow); }
    .ob-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.02em; }
    .ob-card h2 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
    .ob-card p { color: var(--text-muted); margin-bottom: 16px; font-size: 15px; }
    .ob-card .lead { font-size: 17px; color: var(--text); margin-bottom: 24px; }
    .ob-field { margin-bottom: 18px; }
    .ob-field label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .ob-field input, .ob-field textarea, .ob-field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; background: #fff; transition: border 0.15s; }
    .ob-field input:focus, .ob-field textarea:focus, .ob-field select:focus { outline: none; border-color: var(--primary); }
    .ob-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin: 20px 0; }
    .ob-option { border: 2px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.15s; background: #fff; text-align: center; font-weight: 500; font-size: 15px; }
    .ob-option:hover { border-color: var(--primary-light); background: var(--primary-light); }
    .ob-option.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); }
    .ob-option .badge { display: inline-block; font-size: 11px; padding: 2px 6px; background: var(--success); color: #fff; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    .ob-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    .ob-btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .ob-btn-primary { background: var(--primary); color: #fff; }
    .ob-btn-primary:hover { background: var(--primary-dark); }
    .ob-btn-primary:disabled { background: var(--border); cursor: not-allowed; }
    .ob-btn-ghost { background: transparent; color: var(--text-muted); }
    .ob-btn-ghost:hover { color: var(--text); }
    .ob-skip { font-size: 14px; color: var(--text-muted); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: inherit; }
    .ob-skip:hover { color: var(--text); }
    .ob-error { background: #fee; color: #c0392b; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .ob-empty { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 14px; font-style: italic; }
    @media (max-width: 640px) {
      .ob-shell { padding: 20px 16px 48px; }
      .ob-card { padding: 24px 20px; }
      .ob-card h1 { font-size: 24px; }
      .ob-options { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="ob-shell">
  <header class="ob-header">
    <div class="ob-logo">HôteSmart</div>
    <a href="#" class="ob-logout" id="logout-link">Se déconnecter</a>
  </header>

  <div class="ob-step-label" id="step-label">Étape 1 sur 8</div>
  <div class="ob-stepper" id="stepper"></div>

  <div class="ob-card" id="ob-content">
    <div class="ob-empty">Chargement…</div>
  </div>
</div>

<script type="module">
import { supabase, getUser, signOut } from '/shared/supabase.js';
import { markOnboardingCompleted } from '/components/auth-guard.js';

(async function onboardingApp() {
  const TOTAL_STEPS = 8;
  const content = document.getElementById('ob-content');
  const stepper = document.getElementById('stepper');
  const stepLabel = document.getElementById('step-label');

  const user = await getUser();
  if (!user) { window.location.replace('/pages/login.html'); return; }

  let { data: state } = await supabase
    .from('onboarding_state')
    .select('*')
    .eq('user_id', user.id)
    .maybeSingle();

  if (!state) {
    const { data: created } = await supabase
      .from('onboarding_state')
      .insert({ user_id: user.id, current_step: 0, completed: false })
      .select()
      .single();
    state = created;
  }

  if (state.completed) {
    markOnboardingCompleted();
    window.location.replace('/pages/index.html');
    return;
  }

  let currentStep = state.current_step || 0;
  let stepData = state.data || {};

  function renderStepper() {
    const path = getPath();
    const currentIdx = path.indexOf(currentStep);
    stepper.innerHTML = '';
    for (let i = 0; i < path.length; i++) {
      const dot = document.createElement('div');
      dot.className = 'ob-step-dot';
      if (currentIdx === -1) {
        // étape hors path : tout en done sauf la dernière
        if (i < path.length - 1) dot.classList.add('done');
      } else {
        if (i < currentIdx) dot.classList.add('done');
        if (i === currentIdx) dot.classList.add('active');
      }
      stepper.appendChild(dot);
    }
    const displayIdx = currentIdx === -1 ? path.length : currentIdx + 1;
    stepLabel.textContent = 'Étape ' + displayIdx + ' sur ' + path.length;
  }

  async function saveState(patch) {
    const next = Object.assign({}, stepData, patch || {});
    stepData = next;
    const { error } = await supabase
      .from('onboarding_state')
      .update({ current_step: currentStep, data: next })
      .eq('user_id', user.id);
    if (error) console.error('[onboarding] save failed:', error);
  }

  // Renvoie le tableau ordonné des étapes du parcours actuel
  // selon stepData.channel_manager. Sert pour stepper + label.
  function getPath() {
    const cm = stepData.channel_manager;
    if (cm && cm !== 'beds24') {
      // Parcours non-Beds24 : Bienvenue, CM, Mes biens, Serrures, Contact
      return [0, 1, 8, 3, 9];
    }
    // Parcours Beds24 ou CM pas encore choisi (assume parcours complet)
    return [0, 1, 2, 3, 4, 5, 6, 7];
  }

  // Routage conditionnel centralisé.
  // Lit stepData.channel_manager et décide la prochaine étape.
  function getNextStep(current) {
    const path = getPath();
    const idx = path.indexOf(current);
    if (idx === -1 || idx === path.length - 1) return null; // hors path ou dernière étape
    return path[idx + 1];
  }

  async function goToStep(n) {
    if (n === null || n === undefined) return; // signal "on reste où on est"
    if (n < 0 || n > 9) return;
    currentStep = n;
    await saveState();
    renderStep();
  }

  async function finishOnboarding() {
    await supabase
      .from('onboarding_state')
      .update({
        current_step: 7,
        completed: true,
        completed_at: new Date().toISOString()
      })
      .eq('user_id', user.id);
    markOnboardingCompleted();
    window.location.replace('/pages/index.html');
  }

  const steps = {
    0: renderStep0,
    1: renderStep1Placeholder,
    2: renderStep2Placeholder,
    3: renderStep3Placeholder,
    4: renderStep4Placeholder,
    5: renderStep5Placeholder,
    6: renderStep6Placeholder,
    7: renderStep7Placeholder,
    8: renderStep8MesBiens,
    9: renderStep9Contact
  };

  function renderStep() {
    renderStepper();
    content.innerHTML = '';
    const fn = steps[currentStep] || renderUnknown;
    fn(content);
  }

  function renderStep0(c) {
    c.innerHTML = [
      '<h1>Bienvenue sur HôteSmart 👋</h1>',
      '<p class="lead">En 5 minutes, on configure tout pour que vos voyageurs reçoivent des réponses automatiques 24h/24, même à 23h quand vous dormez.</p>',
      '<p>Vous allez connecter :</p>',
      '<ul style="margin: 12px 0 24px 20px; color: var(--text-muted);">',
      '<li>Votre channel manager (Beds24 ou autre)</li>',
      '<li>Vos serrures connectées (optionnel)</li>',
      '<li>L\'agent IA qui répond aux voyageurs</li>',
      '<li>Les SMS d\'alerte (optionnel)</li>',
      '</ul>',
      '<p>La plupart des étapes sont skippables. Vous pourrez tout reconfigurer plus tard.</p>',
      '<div class="ob-actions"><span></span><button class="ob-btn ob-btn-primary" id="btn-start">Commencer →</button></div>'
    ].join('');
    document.getElementById('btn-start').onclick = function () { goToStep(1); };
  }

  function placeholder(stepNum, title, description, skippable) {
    return function (c) {
      const skipBtn = skippable ? '<button class="ob-skip" id="btn-skip">Passer cette étape</button>' : '';
      const path = getPath();
      const isLast = (path.indexOf(stepNum) === path.length - 1);
      const nextLabel = isLast ? 'Terminer' : 'Suivant →';
      c.innerHTML = [
        '<h2>' + title + '</h2>',
        '<p class="lead">' + description + '</p>',
        '<div class="ob-empty">Cette étape sera implémentée au prochain commit.</div>',
        '<div class="ob-actions">',
        '<button class="ob-btn ob-btn-ghost" id="btn-back">← Retour</button>',
        '<div style="display:flex; gap:16px; align-items:center;">',
        skipBtn,
        '<button class="ob-btn ob-btn-primary" id="btn-next">' + nextLabel + '</button>',
        '</div></div>'
      ].join('');
      document.getElementById('btn-back').onclick = function () {
        const p = getPath();
        const idx = p.indexOf(currentStep);
        if (idx > 0) goToStep(p[idx - 1]);
      };
      const bs = document.getElementById('btn-skip');
      if (bs) bs.onclick = function () { goToStep(getNextStep(currentStep)); };
      document.getElementById('btn-next').onclick = function () {
        if (isLast) finishOnboarding();
        else goToStep(getNextStep(currentStep));
      };
    };
  }

  function renderStep1Placeholder(c) {
    const providers = [
      { id: 'beds24',    label: 'Beds24'    },
      { id: 'smoobu',    label: 'Smoobu'    },
      { id: 'hostaway',  label: 'Hostaway'  },
      { id: 'lodgify',   label: 'Lodgify'   },
      { id: 'superhote', label: 'SuperHote' },
      { id: 'autre',     label: 'Autre'     }
    ];

    let selected = stepData.channel_manager || null;
    let customName = stepData.channel_manager_custom || '';

    function render() {
      const optionsHtml = providers.map(function (p) {
        const isSel = selected === p.id;
        return '<div class="ob-option' + (isSel ? ' selected' : '') + '" data-id="' + p.id + '">' + p.label + '</div>';
      }).join('');

      const customField = (selected === 'autre')
        ? '<div class="ob-field" style="margin-top:20px;"><label>Précisez le nom de votre channel manager</label><input type="text" id="cm-custom" placeholder="Ex: Hostify, Guesty..." value="' + customName.replace(/"/g, '&quot;') + '"></div>'
        : '';

      const nextDisabled = !selected || (selected === 'autre' && !customName.trim());

      c.innerHTML = [
        '<h2>Votre channel manager</h2>',
        '<p class="lead">Sur quelle plateforme gérez-vous vos réservations ?</p>',
        '<div class="ob-options">', optionsHtml, '</div>',
        customField,
        '<div class="ob-actions">',
        '<span></span>',
        '<button class="ob-btn ob-btn-primary" id="btn-next"' + (nextDisabled ? ' disabled' : '') + '>Suivant →</button>',
        '</div>'
      ].join('');

      // Click sur option
      c.querySelectorAll('.ob-option').forEach(function (el) {
        el.onclick = function () {
          selected = el.getAttribute('data-id');
          render();
        };
      });

      // Input custom
      const customInput = document.getElementById('cm-custom');
      if (customInput) {
        customInput.oninput = function () {
          customName = customInput.value;
          // Mettre à jour l'état disabled sans tout re-rendre (perdre le focus)
          document.getElementById('btn-next').disabled = !customName.trim();
        };
      }

      // Bouton Suivant
      document.getElementById('btn-next').onclick = async function () {
        if (!selected) return;
        if (selected === 'autre' && !customName.trim()) return;

        const btn = document.getElementById('btn-next');
        btn.disabled = true;
        btn.textContent = 'Enregistrement…';

        // Cas Beds24 : parcours complet, on passe à l'étape 2 (clés API)
        if (selected === 'beds24') {
          await saveState({ channel_manager: 'beds24' });
          goToStep(getNextStep(1));
          return;
        }

        // Cas autre CM : on enregistre la demande d'intégration et on continue
        // vers l'étape serrures (3) pour collecter aussi la marque de serrures.
        // L'écran "merci" sera affiché par l'étape 3 quand CM ≠ beds24.
        const providerName = (selected === 'autre') ? customName.trim() : providers.find(function (p) { return p.id === selected; }).label;

        let requestId = stepData.cm_request_id;
        if (requestId) {
          await supabase
            .from('integration_requests')
            .update({ provider_name: providerName })
            .eq('id', requestId)
            .eq('user_id', user.id);
        } else {
          const { data: inserted, error: insErr } = await supabase
            .from('integration_requests')
            .insert({
              user_id: user.id,
              type: 'channel_manager',
              provider_name: providerName,
              status: 'pending'
            })
            .select()
            .single();
          if (insErr) {
            console.error('[onboarding] integration_request insert failed:', insErr);
            btn.disabled = false;
            btn.textContent = 'Suivant →';
            return;
          }
          requestId = inserted.id;
        }

        await saveState({
          channel_manager: selected,
          channel_manager_custom: customName,
          cm_request_id: requestId
        });

        goToStep(getNextStep(1));
      };
    }

    render();
  }

  function renderWaitingScreen() {
    // Vide le stepper visuel
    stepper.innerHTML = '';
    stepLabel.textContent = 'Demande enregistrée';

    content.innerHTML = [
      '<h1>Merci, on s\'occupe de vous</h1>',
      '<p class="lead">Votre demande d\'intégration a bien été enregistrée. Un développeur va la traiter rapidement.</p>',
      '<p>Vous recevrez un email dès que votre channel manager sera disponible sur HôteSmart. En attendant, vous pouvez fermer cette fenêtre.</p>',
      '<div class="ob-actions"><span></span>',
      '<button class="ob-btn ob-btn-ghost" id="btn-logout-waiting">Se déconnecter</button>',
      '</div>'
    ].join('');

    document.getElementById('btn-logout-waiting').onclick = async function () {
      sessionStorage.clear();
      await signOut();
    };
  }
  function renderStep2Placeholder(c) { return placeholder(2, 'Connexion Beds24', 'Saisissez vos clés API Beds24 pour récupérer vos biens.', false)(c); }
  function renderStep3Placeholder(c) {
    const brands = [
      { id: 'none',      label: 'Aucune / Pas encore' },
      { id: 'igloohome', label: 'Igloohome' },
      { id: 'nuki',      label: 'Nuki' },
      { id: 'yale',      label: 'Yale' },
      { id: 'august',    label: 'August' },
      { id: 'schlage',   label: 'Schlage' },
      { id: 'salto',     label: 'Salto' },
      { id: 'autre',     label: 'Autre' }
    ];

    let selected = stepData.smart_lock || null;
    let customName = stepData.smart_lock_custom || '';

    const cm = stepData.channel_manager;
    // L'étape 3 n'est jamais la dernière du path (Beds24: suivi par 4, non-Beds24: suivi par 9)
    const isLastInPath = false;

    function render() {
      const optionsHtml = brands.map(function (b) {
        const isSel = selected === b.id;
        return '<div class="ob-option' + (isSel ? ' selected' : '') + '" data-id="' + b.id + '">' + b.label + '</div>';
      }).join('');

      const customField = (selected === 'autre')
        ? '<div class="ob-field" style="margin-top:20px;"><label>Précisez la marque de votre serrure</label><input type="text" id="lock-custom" placeholder="Ex: Welock, TTLock..." value="' + customName.replace(/"/g, '&quot;') + '"></div>'
        : '';

      const nextDisabled = !selected || (selected === 'autre' && !customName.trim());
      const nextLabel = isLastInPath ? 'Terminer' : 'Suivant →';

      c.innerHTML = [
        '<h2>Serrures connectées</h2>',
        '<p class="lead">Quelle marque de serrures utilisez-vous pour vos biens ?</p>',
        '<div class="ob-options">', optionsHtml, '</div>',
        customField,
        '<div class="ob-actions">',
        '<button class="ob-btn ob-btn-ghost" id="btn-back">← Retour</button>',
        '<div style="display:flex; gap:16px; align-items:center;">',
        (cm === 'beds24' ? '<button class="ob-skip" id="btn-skip">Passer cette étape</button>' : ''),
        '<button class="ob-btn ob-btn-primary" id="btn-next"' + (nextDisabled ? ' disabled' : '') + '>' + nextLabel + '</button>',
        '</div></div>'
      ].join('');

      // Click sur option
      c.querySelectorAll('.ob-option').forEach(function (el) {
        el.onclick = function () {
          selected = el.getAttribute('data-id');
          render();
        };
      });

      // Input custom
      const customInput = document.getElementById('lock-custom');
      if (customInput) {
        customInput.oninput = function () {
          customName = customInput.value;
          document.getElementById('btn-next').disabled = !customName.trim();
        };
      }

      // Bouton Retour : étape précédente dans le path
      document.getElementById('btn-back').onclick = function () {
        const p = getPath();
        const idx = p.indexOf(currentStep);
        if (idx > 0) goToStep(p[idx - 1]);
      };

      // Bouton Passer : équivalent à "Aucune", seulement présent si Beds24
      const skipBtn = document.getElementById('btn-skip');
      if (skipBtn) {
        skipBtn.onclick = async function () {
          await saveState({ smart_lock: 'none', smart_lock_custom: '' });
          await proceedFromStep3();
        };
      }

      // Bouton Suivant / Terminer
      document.getElementById('btn-next').onclick = async function () {
        if (!selected) return;
        if (selected === 'autre' && !customName.trim()) return;

        const btn = document.getElementById('btn-next');
        btn.disabled = true;
        btn.textContent = 'Enregistrement…';

        // Si "Autre" : INSERT integration_request smart_lock
        if (selected === 'autre') {
          const providerName = customName.trim();
          let requestId = stepData.lock_request_id;
          if (requestId) {
            await supabase
              .from('integration_requests')
              .update({ provider_name: providerName })
              .eq('id', requestId)
              .eq('user_id', user.id);
          } else {
            const { data: inserted, error: insErr } = await supabase
              .from('integration_requests')
              .insert({
                user_id: user.id,
                type: 'smart_lock',
                provider_name: providerName,
                status: 'pending'
              })
              .select()
              .single();
            if (insErr) {
              console.error('[onboarding] smart_lock integration_request insert failed:', insErr);
              btn.disabled = false;
              btn.textContent = nextLabel;
              return;
            }
            requestId = inserted.id;
          }
          await saveState({
            smart_lock: selected,
            smart_lock_custom: customName,
            lock_request_id: requestId
          });
        } else {
          await saveState({
            smart_lock: selected,
            smart_lock_custom: ''
          });
        }

        await proceedFromStep3();
      };
    }

    // Fonction commune : décide la suite selon le path actuel
    // - Beds24 : étape 4 (Agent IA)
    // - non-Beds24 : étape 9 (Contact), c'est elle qui terminera l'onboarding
    async function proceedFromStep3() {
      goToStep(getNextStep(currentStep));
    }

    render();
  }
  function renderStep4Placeholder(c) { return placeholder(4, 'Agent IA', 'Renseignez l\'adresse, le wifi et les horaires de check-in.', true)(c); }
  function renderStep5Placeholder(c) { return placeholder(5, 'SMS d\'alerte', 'Activez les SMS pour être prévenu en cas d\'urgence.', true)(c); }
  function renderStep6Placeholder(c) { return placeholder(6, 'Base de connaissances ✨', 'L\'IA analyse vos anciennes conversations et génère automatiquement les réponses aux 50 questions les plus posées.', true)(c); }
  function renderStep7Placeholder(c) {
    c.innerHTML = [
      '<h1>C\'est prêt 🎉</h1>',
      '<p class="lead">Votre agent IA est configuré et opérationnel. Vous pouvez maintenant accéder à votre tableau de bord.</p>',
      '<div class="ob-actions">',
      '<button class="ob-btn ob-btn-ghost" id="btn-back">← Retour</button>',
      '<button class="ob-btn ob-btn-primary" id="btn-finish">Accéder au tableau de bord</button>',
      '</div>'
    ].join('');
    document.getElementById('btn-back').onclick = function () {
      const p = getPath();
      const idx = p.indexOf(currentStep);
      if (idx > 0) goToStep(p[idx - 1]);
    };
    document.getElementById('btn-finish').onclick = function () { finishOnboarding(); };
  }

  // ====================================================================
  // Étape 8 — Mes biens (parcours non-Beds24 uniquement)
  // ====================================================================
  function renderStep8MesBiens(c) {
    let count = Number(stepData.properties_count) || 1;
    let urls = Array.isArray(stepData.properties_urls) ? stepData.properties_urls.slice() : [];
    // Aligner urls.length sur count
    while (urls.length < count) urls.push('');
    if (urls.length > count) urls = urls.slice(0, count);

    function render() {
      const urlInputs = urls.map(function (u, i) {
        return [
          '<div class="ob-field" style="margin-bottom:12px;">',
          '<label>Lien de l\'annonce du bien ' + (i + 1) + '</label>',
          '<input type="url" class="prop-url" data-idx="' + i + '" placeholder="https://www.airbnb.fr/rooms/..." value="' + (u || '').replace(/"/g, '&quot;') + '">',
          '</div>'
        ].join('');
      }).join('');

      const allFilled = urls.every(function (u) { return u && u.trim().length > 0; });
      const validCount = count >= 1 && count <= 20;
      const nextDisabled = !allFilled || !validCount;

      c.innerHTML = [
        '<h2>Vos biens</h2>',
        '<p class="lead">Combien de biens en location courte durée gérez-vous ?</p>',
        '<div class="ob-field">',
        '<label>Nombre de biens</label>',
        '<input type="number" id="prop-count" min="1" max="20" value="' + count + '" style="max-width:120px;">',
        '</div>',
        '<div style="margin-top:24px;">',
        urlInputs,
        '</div>',
        '<div class="ob-actions">',
        '<button class="ob-btn ob-btn-ghost" id="btn-back">← Retour</button>',
        '<button class="ob-btn ob-btn-primary" id="btn-next"' + (nextDisabled ? ' disabled' : '') + '>Suivant →</button>',
        '</div>'
      ].join('');

      const countInput = document.getElementById('prop-count');
      countInput.oninput = function () {
        const newCount = Math.max(1, Math.min(20, Number(countInput.value) || 1));
        if (newCount !== count) {
          count = newCount;
          while (urls.length < count) urls.push('');
          if (urls.length > count) urls = urls.slice(0, count);
          render();
        }
      };

      c.querySelectorAll('.prop-url').forEach(function (input) {
        input.oninput = function () {
          const idx = Number(input.getAttribute('data-idx'));
          urls[idx] = input.value;
          // Recalcul disabled sans tout re-rendre
          const ok = urls.every(function (u) { return u && u.trim().length > 0; });
          document.getElementById('btn-next').disabled = !ok;
        };
      });

      document.getElementById('btn-back').onclick = function () {
        const p = getPath();
        const idx = p.indexOf(currentStep);
        if (idx > 0) goToStep(p[idx - 1]);
      };

      document.getElementById('btn-next').onclick = async function () {
        if (!urls.every(function (u) { return u && u.trim().length > 0; })) return;
        await saveState({
          properties_count: count,
          properties_urls: urls.map(function (u) { return u.trim(); })
        });
        goToStep(getNextStep(currentStep));
      };
    }

    render();
  }

  // ====================================================================
  // Étape 9 — Contact (parcours non-Beds24, finalise l'onboarding)
  // ====================================================================
  function renderStep9Contact(c) {
    let firstName = stepData.contact_first_name || '';
    let lastName  = stepData.contact_last_name  || '';
    let phone     = stepData.contact_phone      || '';
    const email   = user.email || '';

    function render() {
      const valid = firstName.trim() && lastName.trim() && phone.trim().length >= 6;

      c.innerHTML = [
        '<h2>Comment vous contacter ?</h2>',
        '<p class="lead">Pour finaliser votre demande d\'intégration, on a besoin de pouvoir vous joindre rapidement.</p>',
        '<div class="ob-field">',
        '<label>Prénom</label>',
        '<input type="text" id="ct-first" value="' + firstName.replace(/"/g, '&quot;') + '" autocomplete="given-name">',
        '</div>',
        '<div class="ob-field">',
        '<label>Nom</label>',
        '<input type="text" id="ct-last" value="' + lastName.replace(/"/g, '&quot;') + '" autocomplete="family-name">',
        '</div>',
        '<div class="ob-field">',
        '<label>Téléphone</label>',
        '<input type="tel" id="ct-phone" value="' + phone.replace(/"/g, '&quot;') + '" placeholder="06 12 34 56 78" autocomplete="tel">',
        '</div>',
        '<div class="ob-field">',
        '<label>Email (du compte)</label>',
        '<input type="email" value="' + email + '" disabled style="background:#f4f4f0;color:var(--text-muted);">',
        '</div>',
        '<div class="ob-actions">',
        '<button class="ob-btn ob-btn-ghost" id="btn-back">← Retour</button>',
        '<button class="ob-btn ob-btn-primary" id="btn-finish"' + (valid ? '' : ' disabled') + '>Terminer</button>',
        '</div>'
      ].join('');

      document.getElementById('ct-first').oninput = function (e) {
        firstName = e.target.value;
        document.getElementById('btn-finish').disabled = !(firstName.trim() && lastName.trim() && phone.trim().length >= 6);
      };
      document.getElementById('ct-last').oninput = function (e) {
        lastName = e.target.value;
        document.getElementById('btn-finish').disabled = !(firstName.trim() && lastName.trim() && phone.trim().length >= 6);
      };
      document.getElementById('ct-phone').oninput = function (e) {
        phone = e.target.value;
        document.getElementById('btn-finish').disabled = !(firstName.trim() && lastName.trim() && phone.trim().length >= 6);
      };

      document.getElementById('btn-back').onclick = function () {
        const p = getPath();
        const idx = p.indexOf(currentStep);
        if (idx > 0) goToStep(p[idx - 1]);
      };

      document.getElementById('btn-finish').onclick = async function () {
        if (!(firstName.trim() && lastName.trim() && phone.trim().length >= 6)) return;
        const btn = document.getElementById('btn-finish');
        btn.disabled = true;
        btn.textContent = 'Enregistrement…';

        // Sauvegarder en local d'abord
        await saveState({
          contact_first_name: firstName.trim(),
          contact_last_name: lastName.trim(),
          contact_phone: phone.trim()
        });

        // UPDATE de la ligne integration_requests créée à l'étape 1 avec les colonnes contact + biens
        const requestId = stepData.cm_request_id;
        if (requestId) {
          const { error: updErr } = await supabase
            .from('integration_requests')
            .update({
              contact_first_name: firstName.trim(),
              contact_last_name: lastName.trim(),
              contact_phone: phone.trim(),
              contact_email: email,
              properties_count: stepData.properties_count || null,
              properties_urls: stepData.properties_urls || null
            })
            .eq('id', requestId)
            .eq('user_id', user.id);
          if (updErr) {
            console.error('[onboarding] contact update failed:', updErr);
            btn.disabled = false;
            btn.textContent = 'Terminer';
            return;
          }
        } else {
          console.warn('[onboarding] cm_request_id manquant, contact non rattaché');
        }

        // Marquer pending_integration et completed
        await supabase
          .from('onboarding_state')
          .update({
            status: 'pending_integration',
            completed: true,
            completed_at: new Date().toISOString()
          })
          .eq('user_id', user.id);

        markOnboardingCompleted();
        renderWaitingScreen();
      };
    }

    render();
  }

  function renderUnknown(c) {
    c.innerHTML = '<div class="ob-error">Étape inconnue. Retour au début.</div>';
    setTimeout(function () { goToStep(0); }, 1500);
  }

  document.getElementById('logout-link').onclick = async function (e) {
    e.preventDefault();
    sessionStorage.clear();
    await signOut();
  };

  renderStep();
})();
</script>
